<script id="fca-reporting-patch-script">
(function(){
  if (window.__fca_reporting_patch__) return;
  window.__fca_reporting_patch__ = true;

  function fcaEsc(s){
    s = (s == null) ? '' : String(s);
    return s.replace(/[&<>"]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; });
  }
  function fcaPrice(n){ return '£' + Number(n || 0).toFixed(2); }
  function fcaYearStart(year){ return String(year) + '-01-01'; }
  function fcaYearEnd(year){ return String(year) + '-12-31'; }
  function fcaDateInYear(d, year){
    const s = String(d || '').slice(0,10);
    return !!s && s >= fcaYearStart(year) && s <= fcaYearEnd(year);
  }
  function ensureFCACompany(){
    window.db = window.db || {};
    db.company = db.company || {};
    db.company.fca = db.company.fca || {};
    const f = db.company.fca;
    if (!Array.isArray(f.marketingChannels)) f.marketingChannels = [];
    if (!Array.isArray(f.financeTypes)) f.financeTypes = [];
    if (!Array.isArray(f.consumerChannels)) f.consumerChannels = [];
    if (!Array.isArray(f.addonsNotIncluded)) f.addonsNotIncluded = [];
    if (!Array.isArray(f.addonsIncluded)) f.addonsIncluded = [];
    if (typeof f.tradeBodyMember !== 'string') f.tradeBodyMember = '';
    if (typeof f.tradeBodyName !== 'string') f.tradeBodyName = '';
    if (typeof f.vehicleCondition !== 'string') f.vehicleCondition = 'Used';
    if (typeof f.arrangesVehicleType !== 'string') f.arrangesVehicleType = 'Motor vehicles';
    if (typeof f.creditEngageWith !== 'string') f.creditEngageWith = 'Lenders';
    if (typeof f.notes !== 'string') f.notes = '';
    return f;
  }
  function ensureSaleFCA(s){
    if (!s) return s;
    if (typeof s.fcaIsCreditBrokered !== 'string') s.fcaIsCreditBrokered = '';
    if (typeof s.fcaRemuneration !== 'string') s.fcaRemuneration = '';
    if (typeof s.fcaCommissionEarned !== 'number') s.fcaCommissionEarned = Number(s.fcaCommissionEarned || 0);
    if (typeof s.fcaFeeFromIndividual !== 'number') s.fcaFeeFromIndividual = Number(s.fcaFeeFromIndividual || 0);
    if (typeof s.fcaOtherRevenue !== 'number') s.fcaOtherRevenue = Number(s.fcaOtherRevenue || 0);
    if (typeof s.fcaCommissionPaid !== 'number') s.fcaCommissionPaid = Number(s.fcaCommissionPaid || 0);
    if (typeof s.fcaCustomerChannel !== 'string') s.fcaCustomerChannel = '';
    if (typeof s.fcaCommissionDisclosure !== 'string') s.fcaCommissionDisclosure = '';
    if (typeof s.fcaCommissionValueDisclosure !== 'string') s.fcaCommissionValueDisclosure = '';
    return s;
  }
  function getSaleCommissionAddon(s){
    return (Array.isArray(s && s.addons) ? s.addons : []).reduce(function(t, a){
      const type = String((a && a.type) || '').toLowerCase();
      const desc = String((a && a.description) || '').toLowerCase();
      const isComm = type === 'commission' || desc.indexOf('commission') >= 0 || desc.indexOf('finance') >= 0;
      return t + (isComm ? Number((a && a.sellAmount) || 0) : 0);
    }, 0);
  }
  function getSaleOtherAddonRevenue(s){
    return (Array.isArray(s && s.addons) ? s.addons : []).reduce(function(t, a){
      const type = String((a && a.type) || '').toLowerCase();
      const isOther = type === 'admin fee' || type === 'delivery' || type === 'other';
      return t + (isOther ? Number((a && a.sellAmount) || 0) : 0);
    }, 0);
  }
  function isFinanceSaleForFCA(s){
    if (typeof window.isRealSale === 'function' && !window.isRealSale(s)) return false;
    return !!(
      String((s && s.financeCompany) || '').trim() ||
      Number((s && s.finance) || 0) > 0 ||
      String((s && s.fcaIsCreditBrokered) || '').toLowerCase() === 'yes'
    );
  }
  function normaliseChannel(v){
    const s = String(v || '').trim();
    return s || '(Not set)';
  }
  function buildFCAYearData(year){
    ensureFCACompany();
    const sales = (db.sales || []).map(ensureSaleFCA);
    const complaints = db.complaints || [];
    const yearSales = sales.filter(function(s){ return fcaDateInYear(s && s.date, year); });
    const realSales = yearSales.filter(function(s){
      return (typeof window.isRealSale === 'function') ? window.isRealSale(s) : true;
    });
    const financeSales = realSales.filter(isFinanceSaleForFCA);
    const cashSales = realSales.filter(function(s){ return !isFinanceSaleForFCA(s); });

    const out = {
      year: Number(year),
      totalSales: realSales.length,
      financeSales: financeSales.length,
      cashSales: cashSales.length,
      introductions: financeSales.length,
      complaints: complaints.filter(function(c){ return fcaDateInYear(c && (c.date || c.createdAt), year); }).length,
      totalCreditBrokingRevenue: 0,
      totalCommissionEarned: 0,
      totalFeesFromIndividuals: 0,
      totalOtherRevenue: 0,
      totalCommissionPaid: 0,
      lenders: {},
      channels: {},
      remuneration: {},
      disclosure: { proactive: 0, value: 0, notSet: 0 },
      dataIssues: [],
      rows: []
    };

    financeSales.forEach(function(s){
      const commissionEarned = Number(s.fcaCommissionEarned || getSaleCommissionAddon(s) || 0);
      const feesFromIndividuals = Number(s.fcaFeeFromIndividual || 0);
      const otherRevenue = Number(s.fcaOtherRevenue || getSaleOtherAddonRevenue(s) || 0);
      const commissionPaid = Number(s.fcaCommissionPaid || 0);
      const remuneration = String(s.fcaRemuneration || '').trim() || '(Not set)';
      const lender = String(s.financeCompany || '').trim() || '(Not set)';
      const channel = normaliseChannel(s.fcaCustomerChannel || s.leadSource);

      out.totalCommissionEarned += commissionEarned;
      out.totalFeesFromIndividuals += feesFromIndividuals;
      out.totalOtherRevenue += otherRevenue;
      out.totalCommissionPaid += commissionPaid;
      out.totalCreditBrokingRevenue += (commissionEarned + feesFromIndividuals + otherRevenue);

      out.lenders[lender] = out.lenders[lender] || { introductions: 0, revenue: 0, commissionPaid: 0 };
      out.lenders[lender].introductions += 1;
      out.lenders[lender].revenue += (commissionEarned + feesFromIndividuals + otherRevenue);
      out.lenders[lender].commissionPaid += commissionPaid;

      out.channels[channel] = (out.channels[channel] || 0) + 1;
      out.remuneration[remuneration] = (out.remuneration[remuneration] || 0) + 1;

      if (String(s.fcaCommissionDisclosure || '').toLowerCase() === 'yes') out.disclosure.proactive += 1;
      if (String(s.fcaCommissionValueDisclosure || '').toLowerCase() === 'yes') out.disclosure.value += 1;
      if (!String(s.fcaCommissionDisclosure || '').trim() || !String(s.fcaCommissionValueDisclosure || '').trim()) out.disclosure.notSet += 1;

      const issues = [];
      if (!String(s.financeCompany || '').trim()) issues.push('Finance company not set');
      if (!String(s.fcaRemuneration || '').trim()) issues.push('Remuneration not set');
      if (!(commissionEarned || feesFromIndividuals || otherRevenue) && remuneration !== 'No remuneration') issues.push('Broking revenue empty');
      if (!String(s.fcaCustomerChannel || s.leadSource || '').trim()) issues.push('Customer channel missing');
      if (issues.length){
        out.dataIssues.push({
          id: s.id || '',
          date: s.date || '',
          invNo: s.invNo || '',
          reg: ((db.vehicles || []).find(function(v){ return v.id === s.vehicleId; }) || {}).reg || '',
          customer: s.buyer || '',
          issues: issues.join('; ')
        });
      }

      out.rows.push({
        date: s.date || '',
        invoice: s.invNo || '',
        reg: ((db.vehicles || []).find(function(v){ return v.id === s.vehicleId; }) || {}).reg || '',
        customer: s.buyer || '',
        financeCompany: lender,
        financeAmount: Number(s.finance || 0),
        commissionEarned: commissionEarned,
        feesFromIndividuals: feesFromIndividuals,
        otherRevenue: otherRevenue,
        commissionPaid: commissionPaid,
        remuneration: remuneration,
        customerChannel: channel,
        proactiveCommissionDisclosure: s.fcaCommissionDisclosure || '',
        proactiveValueDisclosure: s.fcaCommissionValueDisclosure || ''
      });
    });

    return out;
  }
  window.buildFCAYearData = buildFCAYearData;

  function toCsvRow(arr){
    return arr.map(function(v){
      v = (v == null) ? '' : String(v);
      return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(',');
  }

  function exportFCACSV(year){
    const r = buildFCAYearData(year);
    const rows = [];
    rows.push(['Metric','Value']);
    rows.push(['Reporting year', r.year]);
    rows.push(['Total completed sales', r.totalSales]);
    rows.push(['Finance / broking sales', r.financeSales]);
    rows.push(['Cash sales', r.cashSales]);
    rows.push(['Total introductions', r.introductions]);
    rows.push(['Complaints', r.complaints]);
    rows.push(['Total credit broking revenue', r.totalCreditBrokingRevenue.toFixed(2)]);
    rows.push(['Total commission earned', r.totalCommissionEarned.toFixed(2)]);
    rows.push(['Total fees from individuals', r.totalFeesFromIndividuals.toFixed(2)]);
    rows.push(['Other revenue received', r.totalOtherRevenue.toFixed(2)]);
    rows.push(['Total commission / merchant fees paid', r.totalCommissionPaid.toFixed(2)]);
    rows.push([]);
    rows.push(['Lender','Introductions','Revenue','Commission / merchant fees paid']);
    Object.keys(r.lenders).sort().forEach(function(k){
      const x = r.lenders[k];
      rows.push([k, x.introductions, x.revenue.toFixed(2), x.commissionPaid.toFixed(2)]);
    });
    rows.push([]);
    rows.push(['Date','Invoice','Reg','Customer','Finance Company','Finance Amount','Commission Earned','Fees From Individuals','Other Revenue','Commission Paid','Remuneration','Customer Channel','Proactive Commission Disclosure','Proactive Value Disclosure']);
    r.rows.forEach(function(x){
      rows.push([x.date,x.invoice,x.reg,x.customer,x.financeCompany,x.financeAmount,x.commissionEarned,x.feesFromIndividuals,x.otherRevenue,x.commissionPaid,x.remuneration,x.customerChannel,x.proactiveCommissionDisclosure,x.proactiveValueDisclosure]);
    });
    const csv = rows.map(toCsvRow).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'fca_ccr009_' + String(year) + '.csv';
    a.click();
  }
  function exportFCAJSON(year){
    const r = buildFCAYearData(year);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(r, null, 2)], {type:'application/json'}));
    a.download = 'fca_ccr009_' + String(year) + '.json';
    a.click();
  }
  function exportFCAXLSX(year){
    const r = buildFCAYearData(year);
    if (!window.XLSX) return exportFCACSV(year);
    const wb = XLSX.utils.book_new();

    const summary = [
      ['Metric','Value'],
      ['Reporting year', r.year],
      ['Total completed sales', r.totalSales],
      ['Finance / broking sales', r.financeSales],
      ['Cash sales', r.cashSales],
      ['Total introductions', r.introductions],
      ['Complaints', r.complaints],
      ['Total credit broking revenue', r.totalCreditBrokingRevenue],
      ['Total commission earned', r.totalCommissionEarned],
      ['Total fees from individuals', r.totalFeesFromIndividuals],
      ['Other revenue received', r.totalOtherRevenue],
      ['Total commission / merchant fees paid', r.totalCommissionPaid]
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Summary');

    const lenders = [['Lender','Introductions','Revenue','Commission / merchant fees paid']];
    Object.keys(r.lenders).sort().forEach(function(k){
      const x = r.lenders[k];
      lenders.push([k, x.introductions, x.revenue, x.commissionPaid]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(lenders), 'Lenders');

    const sales = [['Date','Invoice','Reg','Customer','Finance Company','Finance Amount','Commission Earned','Fees From Individuals','Other Revenue','Commission Paid','Remuneration','Customer Channel','Proactive Commission Disclosure','Proactive Value Disclosure']];
    r.rows.forEach(function(x){
      sales.push([x.date,x.invoice,x.reg,x.customer,x.financeCompany,x.financeAmount,x.commissionEarned,x.feesFromIndividuals,x.otherRevenue,x.commissionPaid,x.remuneration,x.customerChannel,x.proactiveCommissionDisclosure,x.proactiveValueDisclosure]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sales), 'Sales');

    if (r.dataIssues.length){
      const issues = [['Date','Invoice','Reg','Customer','Issues']];
      r.dataIssues.forEach(function(x){ issues.push([x.date,x.invNo,x.reg,x.customer,x.issues]); });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(issues), 'Data issues');
    }

    XLSX.writeFile(wb, 'fca_ccr009_' + String(year) + '.xlsx');
  }
  window.exportFCACSV = exportFCACSV;
  window.exportFCAJSON = exportFCAJSON;
  window.exportFCAXLSX = exportFCAXLSX;

  function renderFCAReportInto(wrap){
    const yearEl = wrap.querySelector('#fca_year');
    const outEl = wrap.querySelector('#fca_out');
    const year = Number((yearEl && yearEl.value) || new Date().getFullYear());
    const r = buildFCAYearData(year);

    const lenderRows = Object.keys(r.lenders).sort(function(a,b){
      return (r.lenders[b].introductions - r.lenders[a].introductions) || a.localeCompare(b);
    }).map(function(k){
      const x = r.lenders[k];
      return '<tr><td>' + fcaEsc(k) + '</td><td class="right">' + x.introductions + '</td><td class="right">' + fcaPrice(x.revenue) + '</td><td class="right">' + fcaPrice(x.commissionPaid) + '</td></tr>';
    }).join('') || '<tr><td colspan="4" class="small">No finance / broking sales in this year.</td></tr>';

    const channelRows = Object.keys(r.channels).sort().map(function(k){
      return '<tr><td>' + fcaEsc(k) + '</td><td class="right">' + r.channels[k] + '</td></tr>';
    }).join('') || '<tr><td colspan="2" class="small">No channels recorded.</td></tr>';

    const issuesHtml = r.dataIssues.length
      ? '<div class="fcaIssueWarn"><b>Data quality needs attention:</b> ' + r.dataIssues.length + ' finance sale(s) have missing FCA fields.</div>'
      : '<div class="fcaIssueGood"><b>Data quality looks good:</b> no missing FCA essentials found for finance sales.</div>';

    const issueRows = r.dataIssues.slice(0, 50).map(function(x){
      return '<tr><td>' + fcaEsc(ddmmyyyy(x.date || '')) + '</td><td>' + fcaEsc(x.invNo) + '</td><td>' + fcaEsc(x.reg) + '</td><td>' + fcaEsc(x.customer) + '</td><td>' + fcaEsc(x.issues) + '</td></tr>';
    }).join('') || '<tr><td colspan="5" class="small">No issues found.</td></tr>';

    outEl.innerHTML = ''
      + '<div class="fcaGrid">'
      +   '<div class="fcaMetric"><div class="lbl">Completed sales</div><div class="val">' + r.totalSales + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Finance / broking sales</div><div class="val">' + r.financeSales + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Cash sales</div><div class="val">' + r.cashSales + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Introductions</div><div class="val">' + r.introductions + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Broking revenue</div><div class="val">' + fcaPrice(r.totalCreditBrokingRevenue) + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Commission earned</div><div class="val">' + fcaPrice(r.totalCommissionEarned) + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Fees from individuals</div><div class="val">' + fcaPrice(r.totalFeesFromIndividuals) + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Commission / fees paid</div><div class="val">' + fcaPrice(r.totalCommissionPaid) + '</div></div>'
      +   '<div class="fcaMetric"><div class="lbl">Complaints logged</div><div class="val">' + r.complaints + '</div></div>'
      + '</div>'
      + '<div class="grid2" style="margin-top:12px">'
      +   '<div class="card flat">'
      +     '<div class="fcaSectionTitle">Lender breakdown</div>'
      +     '<div class="tableWrap"><table class="table compact"><thead><tr><th>Lender</th><th class="right">Introductions</th><th class="right">Revenue</th><th class="right">Commission paid</th></tr></thead><tbody>' + lenderRows + '</tbody></table></div>'
      +   '</div>'
      +   '<div class="card flat">'
      +     '<div class="fcaSectionTitle">Customer channel breakdown</div>'
      +     '<div class="tableWrap"><table class="table compact"><thead><tr><th>Channel</th><th class="right">Deals</th></tr></thead><tbody>' + channelRows + '</tbody></table></div>'
      +     '<div class="small" style="margin-top:8px">Proactive commission disclosure: <b>' + r.disclosure.proactive + '</b> • Proactive value disclosure: <b>' + r.disclosure.value + '</b> • Not set: <b>' + r.disclosure.notSet + '</b></div>'
      +   '</div>'
      + '</div>'
      + '<div class="card flat" style="margin-top:12px">'
      +   '<div class="fcaSectionTitle">CCR009 readiness</div>'
      +   '<div class="fcaNote">' + issuesHtml + '<div class="small" style="margin-top:6px">This dashboard is built for your internal tracking and export pack. Final My FCA answers still depend on your permissions and business model.</div></div>'
      +   '<div class="tableWrap" style="margin-top:10px"><table class="table compact"><thead><tr><th>Date</th><th>Invoice</th><th>Reg</th><th>Customer</th><th>Issue</th></tr></thead><tbody>' + issueRows + '</tbody></table></div>'
      + '</div>';
  }

  function saveFCACompanyFromWrap(wrap){
    const f = ensureFCACompany();
    function val(id){ const el = wrap.querySelector(id); return el ? String(el.value || '').trim() : ''; }
    function checks(name){
      return [].slice.call(wrap.querySelectorAll('input[name="' + name + '"]:checked')).map(function(el){ return el.value; });
    }
    f.tradeBodyMember = val('#fca_tradeBodyMember');
    f.tradeBodyName = val('#fca_tradeBodyName');
    f.vehicleCondition = val('#fca_vehicleCondition') || 'Used';
    f.arrangesVehicleType = val('#fca_vehicleType') || 'Motor vehicles';
    f.creditEngageWith = val('#fca_creditEngageWith') || 'Lenders';
    f.notes = val('#fca_notes');
    f.marketingChannels = checks('fca_marketing');
    f.financeTypes = checks('fca_financeType');
    f.consumerChannels = checks('fca_consumerChannel');
    f.addonsNotIncluded = checks('fca_addonNotIncluded');
    f.addonsIncluded = checks('fca_addonIncluded');
    saveDB();
    if (typeof addAudit === 'function') addAudit('edit','settings','','Saved FCA reporting profile');
  }

  function injectFCAReports(wrap){
    if (!wrap || wrap.querySelector('#rep_fca_ccr009')) return wrap;
    ensureFCACompany();
    const f = ensureFCACompany();

    const financeTile = wrap.querySelector('[data-jump="#rep_finance"]');
    if (financeTile){
      const tile = document.createElement('div');

  function readFCASaleFields(wrap){
    function v(id){ const el = wrap.querySelector(id); return el ? String(el.value || '').trim() : ''; }

      fcaIsCreditBrokered: v('#sale_fcaIsCreditBrokered'),
      fcaRemuneration: v('#sale_fcaRemuneration'),
      fcaCommissionEarned: n('#sale_fcaCommissionEarned'),
      fcaFeeFromIndividual: n('#sale_fcaFeeFromIndividual'),
      fcaOtherRevenue: n('#sale_fcaOtherRevenue'),
      fcaCommissionPaid: n('#sale_fcaCommissionPaid'),
      fcaCustomerChannel: v('#sale_fcaCustomerChannel'),
      fcaCommissionDisclosure: v('#sale_fcaCommissionDisclosure'),
      fcaCommissionValueDisclosure: v('#sale_fcaCommissionValueDisclosure')
    };
  }
  function writeFCASaleFields(wrap, sale){
    sale = ensureSaleFCA(sale || {});
    function set(id, value){ const el = wrap.querySelector(id); if (el) el.value = (value == null ? '' : value); }
    set('#sale_fcaIsCreditBrokered', sale.fcaIsCreditBrokered || '');
    set('#sale_fcaRemuneration', sale.fcaRemuneration || '');
    set('#sale_fcaCommissionEarned', sale.fcaCommissionEarned || 0);
    set('#sale_fcaFeeFromIndividual', sale.fcaFeeFromIndividual || 0);
    set('#sale_fcaOtherRevenue', sale.fcaOtherRevenue || 0);
    set('#sale_fcaCommissionPaid', sale.fcaCommissionPaid || 0);
    set('#sale_fcaCustomerChannel', sale.fcaCustomerChannel || '');
    set('#sale_fcaCommissionDisclosure', sale.fcaCommissionDisclosure || '');
    set('#sale_fcaCommissionValueDisclosure', sale.fcaCommissionValueDisclosure || '');
  }
  function resetFCASaleFields(wrap){
    writeFCASaleFields(wrap, {});
  }
  function findSavedSaleByContext(ctx){
    const all = db.sales || [];
    let matches = all.slice();
    if (ctx.id) {
      const exact = all.find(function(s){ return s.id === ctx.id; });
      if (exact) return exact;
    }
    if (ctx.vehicleId) matches = matches.filter(function(s){ return s.vehicleId === ctx.vehicleId; });
    if (ctx.invNo) {
      const exactInv = matches.find(function(s){ return String(s.invNo || '').trim() === ctx.invNo; });
      if (exactInv) return exactInv;
    }
    if (ctx.date) matches = matches.filter(function(s){ return String(s.date || '') === ctx.date; });
    return matches.sort(function(a,b){
      return String(b.date || '').localeCompare(String(a.date || '')) || String(b.id || '').localeCompare(String(a.id || ''));
    })[0] || null;
  }
  function injectFCASales(wrap){
    if (!wrap || wrap.querySelector('#sale_fcaWrap')) return wrap;

    const finSection = wrap.querySelector('#sale_fin_section');
    const saveCard = wrap.querySelector('.salesWizardPane[data-sale-step="4"] .salesSectionCard');
    const host = finSection || saveCard;
    if (!host) return wrap;

    const box = document.createElement('div');

    box.className = 'salesSectionCard';

    box.innerHTML = ''

      + '<div class="salesSectionHint">Use these fields for RegData / CCR009 reporting. They do not affect the customer invoice total.</div>'

      +   '<label>Credit brokered?<select id="sale_fcaIsCreditBrokered"><option value="">Auto / Not set</option><option value="yes">Yes</option><option value="no">No</option></select></label>'

      +   '<label>Customer channel<select id="sale_fcaCustomerChannel"><option value="">Not set</option><option>In person</option><option>Phone</option><option>Email</option><option>Website</option><option>Social media</option><option>Referral</option><option>Other</option></select></label>'
      +   '<label>Proactive commission disclosure<select id="sale_fcaCommissionDisclosure"><option value="">Not set</option><option>Yes</option><option>No</option><option>Not applicable</option></select></label>'
      +   '<label>Proactive value disclosure<select id="sale_fcaCommissionValueDisclosure"><option value="">Not set</option><option>Yes</option><option>No</option><option>Not applicable</option></select></label>'
      + '</div>'
      + '<div class="row" style="margin-top:10px">'
      +   '<label>Commission earned £<input id="sale_fcaCommissionEarned" type="number" step="0.01" placeholder="0"></label>'
      +   '<label>Fees from individual £<input id="sale_fcaFeeFromIndividual" type="number" step="0.01" placeholder="0"></label>'
      +   '<label>Other broking revenue £<input id="sale_fcaOtherRevenue" type="number" step="0.01" placeholder="0"></label>'
      +   '<label>Commission / merchant fees paid £<input id="sale_fcaCommissionPaid" type="number" step="0.01" placeholder="0"></label>'
      + '</div>'
      + '<div class="small" style="margin-top:8px">Tip: if you leave commission earned empty, the FCA dashboard will still try to pick up add-ons typed as Commission.</div>';

    if (finSection) finSection.insertAdjacentElement('afterend', box);
    else host.insertAdjacentElement('beforeend', box);

    const saleBtn = wrap.querySelector('#sale_add');
    if (saleBtn && !saleBtn.dataset.fcaWrapped){
      const old = saleBtn.onclick;
      saleBtn.onclick = function(ev){
        const reg = String((wrap.querySelector('#sale_reg') || {}).value || '').toUpperCase().trim();
        const invNo = String((wrap.querySelector('#sale_invNo') || {}).value || '').trim();
        const date = String((wrap.querySelector('#sale_date') || {}).value || '').trim();
        const vehicleId = (typeof findVehicleIdByReg === 'function') ? findVehicleIdByReg(reg) : null;
        const editId = wrap.dataset.fcaEditingSaleId || '';
        const fcaData = readFCASaleFields(wrap);

        if (typeof old === 'function') old.call(this, ev);

        setTimeout(function(){
          const saved = findSavedSaleByContext({id: editId, vehicleId: vehicleId, invNo: invNo, date: date});
          if (!saved) return;
          Object.assign(saved, fcaData);
          ensureSaleFCA(saved);
          autoPopulateFCASale(saved);
          saveDB();
          wrap.dataset.fcaEditingSaleId = saved.id || '';
          if (typeof addAudit === 'function') addAudit('edit','sale',saved.id || '', 'Saved FCA reporting fields');
        }, 0);
      };
      saleBtn.dataset.fcaWrapped = '1';
    }

    wrap.addEventListener('click', function(e){
      const b = e.target && e.target.closest && e.target.closest('button[data-act]');
      if (!b) return;
      if (b.dataset.act === 'edit'){
        const saleId = b.dataset.id || '';
        wrap.dataset.fcaEditingSaleId = saleId;
        setTimeout(function(){
          const s = (db.sales || []).find(function(x){ return x.id === saleId; }) || {};
          writeFCASaleFields(wrap, s);
        }, 0);
      } else if (b.dataset.act === 'del'){
        if ((wrap.dataset.fcaEditingSaleId || '') === (b.dataset.id || '')) wrap.dataset.fcaEditingSaleId = '';
      }
    }, true);

    const regInput = wrap.querySelector('#sale_reg');
    if (regInput && !regInput.dataset.fcaResetBound){
      regInput.addEventListener('input', function(){
        if (!String(regInput.value || '').trim()) {
          wrap.dataset.fcaEditingSaleId = '';
          resetFCASaleFields(wrap);
        }
      });
      regInput.dataset.fcaResetBound = '1';
    }

    const hasFinance = wrap.querySelector('#sale_hasFinance');
    if (hasFinance && !hasFinance.dataset.fcaBound){
      hasFinance.addEventListener('change', function(){
        const brokered = wrap.querySelector('#sale_fcaIsCreditBrokered');
        if (brokered && !brokered.value) brokered.value = hasFinance.checked ? 'yes' : '';
      });
      hasFinance.dataset.fcaBound = '1';
    }

    return wrap;
  }

  if (typeof window.viewReports === 'function'){
    const origViewReports = window.viewReports;
    window.viewReports = function(){
      const wrap = origViewReports.apply(this, arguments);
      try { injectFCAReports(wrap); } catch (e) { console.error('FCA reports patch failed', e); }
      return wrap;
    };
  }

  if (typeof window.viewSales === 'function'){
    const origViewSales = window.viewSales;
    window.viewSales = function(){
      const wrap = origViewSales.apply(this, arguments);
      try { injectFCASales(wrap); } catch (e) { console.error('FCA sales patch failed', e); }
      return wrap;
    };
  }
})();
</script>


<script>
/* ===== Paid DMS Professional Upgrade Pack v1 ===== */
(function(){
  if(window.__starcars_paid_dms_upgrade_v1__) return;
  window.__starcars_paid_dms_upgrade_v1__ = true;

  function esc(v){
    if(typeof escapeHtml === 'function') return escapeHtml(String(v ?? ''));
    return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function money(v){ return (typeof fmtMoney === 'function') ? fmtMoney(v) : ('£' + Number(v||0).toFixed(2)); }
  function date(v){ return (typeof ddmmyyyy === 'function') ? ddmmyyyy(v) : (v || ''); }
  function saleIsLive(s){ const st=String(s && (s.saleStatus||s.status||'completed')).toLowerCase(); return s && !s.refunded && ['completed','complete','sold'].includes(st); }
  function vehicleIsSold(v){
    if(String(v.status||'').toLowerCase()==='sold') return true;
    return (db.sales||[]).some(s => saleIsLive(s) && s.vehicleId === v.id);
  }
  function motDays(v){
    const raw = v && (v.motExpiry || v.lastMotExpiry || v.mot || v.motDue || v.mot_expiry);
    if(!raw) return null;
    const d = new Date(raw); if(isNaN(d)) return null;
    const t = new Date(); t.setHours(0,0,0,0); d.setHours(0,0,0,0);
    return Math.ceil((d-t)/(1000*60*60*24));
  }
  function statusClass(v){
    const d = motDays(v);
    if(d !== null && d < 0) return 'bad';
    if(d !== null && d <= 30) return 'warn';
    if(String(v.status||'').toLowerCase()==='sold') return 'ok';
    if(v.readyForSale) return 'ok';
    return 'warn';
  }
  function statusText(v){
    const d = motDays(v);
    if(d !== null && d < 0) return 'MOT expired';
    if(d !== null && d <= 30) return 'MOT due';
    if(String(v.status||'').toLowerCase()==='sold') return 'Sold';
    if(v.readyForSale) return 'Ready';
    return v.prepStage || v.status || 'In stock';
  }
  function expensesForVehicle(id){ return (db.vehicleExpenses||[]).filter(e=>e.vehicleId===id).reduce((t,e)=>t+Number(e.amount||0),0); }
  function saleForVehicle(id){ return (db.sales||[]).filter(s=>s.vehicleId===id && saleIsLive(s)).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')))[0] || null; }
  function vehicleProfit(v){
    const s = saleForVehicle(v.id);
    const salePrice = Number(s && s.salePrice || 0);
    const cost = Number(v.purchase||0) + expensesForVehicle(v.id);
    return {sale:s, salePrice, cost, profit: salePrice - cost};
  }

  window.openVehicleProfileModal = function(id){
    const v = (db.vehicles||[]).find(x=>x.id===id);
    if(!v) return alert('Vehicle not found');

    const expRows = (db.vehicleExpenses||[]).filter(e=>e.vehicleId===id).slice(-8).reverse();
    const complaints = (db.complaints||[]).filter(c=>c.vehicleId===id || String(c.reg||'').toUpperCase()===String(v.reg||'').toUpperCase());
    const motD = motDays(v);
    const motLabel = motD === null ? 'Not entered' : (motD < 0 ? `Expired ${Math.abs(motD)} days` : `${motD} days left`);
    const sale = p.sale;
    const body = `
      <div class="vehicleProfileHead">
        <div>
          <div><span class="vehicleProfileReg">${esc((v.reg||'').toUpperCase())}</span><span class="dmsStatus ${statusClass(v)}">${esc(statusText(v))}</span></div>
          <div class="vehicleProfileTitle">${esc([v.make,v.model].filter(Boolean).join(' ') || 'Vehicle Profile')}</div>
          <div class="dmsSub">${esc([v.colour,v.fuel,v.engineSize? v.engineSize+'cc':'',v.mileage? 'Mileage '+v.mileage:''].filter(Boolean).join(' • '))}</div>
        </div>
        <div class="dmsActions">
          <button class="primary" onclick="scHideModal(); currentTab='Vehicles'; render(); setTimeout(()=>{const b=[...document.querySelectorAll('button[data-act=edit]')].find(x=>x.dataset.id==='${esc(id)}'); if(b) b.click();},150)">Edit Vehicle</button>
          <button onclick="scHideModal(); currentTab='Sales'; render();">Go to Sales</button>
        </div>
      </div>
      <div class="profileGrid">
        <div class="profileCard"><h4>Stock Details</h4>
          <div class="profileLine"><span>Purchase date</span><b>${date(v.purchaseDate)}</b></div>
          <div class="profileLine"><span>First reg</span><b>${date(v.firstReg)}</b></div>
          <div class="profileLine"><span>VIN</span><b>${esc(v.vin||'-')}</b></div>
          <div class="profileLine"><span>Supplier</span><b>${esc(v.supplier||'-')}</b></div>
          <div class="profileLine"><span>Owner type</span><b>${esc(v.ownerType||'owned')}</b></div>
        </div>
        <div class="profileCard"><h4>MOT / Prep</h4>
          <div class="profileLine"><span>MOT expiry</span><b>${date(v.motExpiry || v.lastMotExpiry)}</b></div>
          <div class="profileLine"><span>MOT status</span><b>${esc(motLabel)}</b></div>
          <div class="profileLine"><span>Ready for sale</span><b>${v.readyForSale ? 'Yes' : 'No'}</b></div>
          <div class="profileLine"><span>Prep stage</span><b>${esc(v.prepStage||'-')}</b></div>
          <div class="profileLine"><span>Reason</span><b>${esc(v.notReadyReason||'-')}</b></div>
        </div>
        <div class="profileCard"><h4>Money</h4>
          <div class="profileLine"><span>Purchase</span><b>${money(v.purchase||0)}</b></div>
          <div class="profileLine"><span>Prep expenses</span><b>${money(expensesForVehicle(v.id))}</b></div>
          <div class="profileLine"><span>Total cost</span><b>${money(p.cost)}</b></div>
          <div class="profileLine"><span>Sale price</span><b>${sale ? money(p.salePrice) : '-'}</b></div>
          <div class="profileMoney">${sale ? money(p.profit) : 'In stock'}</div>
        </div>
        <div class="profileCard"><h4>Sale / Customer</h4>
          <div class="profileLine"><span>Status</span><b>${sale ? 'Sold' : 'Not sold'}</b></div>
          <div class="profileLine"><span>Sale date</span><b>${sale ? date(sale.date) : '-'}</b></div>
          <div class="profileLine"><span>Buyer</span><b>${esc(sale && sale.buyer || '-')}</b></div>
          <div class="profileLine"><span>Invoice</span><b>${esc(sale && sale.invNo || '-')}</b></div>
          <div class="profileLine"><span>Finance</span><b>${esc(sale && sale.financeCompany || '-')}</b></div>
        </div>
      </div>
      <div class="profileGrid" style="margin-top:12px">
        <div class="profileCard"><h4>Recent Expenses</h4>${expRows.length ? expRows.map(e=>`<div class="profileLine"><span>${date(e.date)} ${esc(e.category||e.type||'Expense')}</span><b>${money(e.amount||0)}</b></div>`).join('') : '<div class="dmsSub">No vehicle expenses recorded.</div>'}</div>

  window.viewDashboard = function(){

    const stock = vehicles.filter(v=>!vehicleIsSold(v));
    const soldThisMonth = liveSales.filter(s=>String(s.date||'').startsWith(new Date().toISOString().slice(0,7))).length;
    const stockValue = stock.reduce((t,v)=>t+Number(v.purchase||0)+expensesForVehicle(v.id),0);
    const totalSalesThisMonth = liveSales.filter(s=>String(s.date||'').startsWith(new Date().toISOString().slice(0,7))).reduce((t,s)=>t+Number(s.salePrice||0),0);
    const profitThisMonth = liveSales.filter(s=>String(s.date||'').startsWith(new Date().toISOString().slice(0,7))).reduce((t,s)=>{
      const v=vehicles.find(x=>x.id===s.vehicleId)||{}; return t + Number(s.salePrice||0) - Number(v.purchase||0) - expensesForVehicle(v.id);

        <div class="dmsHeroPanel">

          <div class="dmsSub">Professional stock, sales, prep, finance, complaints and reporting control panel.</div>

          </div>

        <div class="dmsHeroPanel">

          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">

            <span class="dmsStatus ${financeOutstanding?'warn':'ok'}">Finance payout: ${financeOutstanding}</span>
            <span class="dmsStatus ${complaintsOpen?'bad':'ok'}">Open complaints: ${complaintsOpen}</span>
            <span class="dmsStatus ${notReady?'warn':'ok'}">Prep not ready: ${notReady}</span>
          </div>
        </div>
      </div>
      <div class="dmsKpiGrid">
        <div class="dmsKpi"><div class="lbl">Vehicles In Stock</div><div class="val">${stock.length}</div><div class="note">Live unsold stock</div></div>
        <div class="dmsKpi"><div class="lbl">Current Stock Value</div><div class="val">${money(stockValue)}</div><div class="note">Purchase + vehicle expenses</div></div>

        <div class="dmsKpi"><div class="lbl">Sales This Month</div><div class="val">${money(totalSalesThisMonth)}</div><div class="note">Gross sales value</div></div>
        ${(typeof canProfit==='function' ? canProfit() : true) ? `<div class="dmsKpi"><div class="lbl">Profit This Month</div><div class="val">${money(profitThisMonth)}</div><div class="note">Sale minus purchase/prep</div></div>` : ''}
        <div class="dmsKpi"><div class="lbl">Open Complaints</div><div class="val">${complaintsOpen}</div><div class="note">Needs action</div></div>
      </div>
      <div class="dmsPanelGrid">
        <div class="card flat"><div class="card-head"><h3>Latest Stock</h3><button onclick="currentTab='Vehicles';render();">View All</button></div><div class="dmsList">
          ${latestStock.length ? latestStock.map(v=>`<div class="dmsListItem"><div><div class="dmsListTitle">${esc((v.reg||'').toUpperCase())} — ${esc([v.make,v.model].filter(Boolean).join(' '))}</div><div class="dmsListSub">${esc(v.status||'in stock')} • MOT ${date(v.motExpiry||v.lastMotExpiry)||'-'}</div></div><button class="small" onclick="openVehicleProfileModal('${esc(v.id)}')">Profile</button></div>`).join('') : '<div class="dmsSub">No stock found.</div>'}
        </div></div>
        <div class="card flat"><div class="card-head"><h3>Recent Sales</h3><button onclick="currentTab='Sold';render();">Sold List</button></div><div class="dmsList">
          ${latestSales.length ? latestSales.map(s=>{const v=vehicles.find(x=>x.id===s.vehicleId)||{}; return `<div class="dmsListItem"><div><div class="dmsListTitle">${esc((v.reg||'').toUpperCase())} — ${esc(s.buyer||'Customer')}</div><div class="dmsListSub">${date(s.date)} • ${money(s.salePrice||0)} • ${esc(s.financeCompany||'')}</div></div>${v.id?`<button class="small" onclick="openVehicleProfileModal('${esc(v.id)}')">Profile</button>`:''}</div>`}).join('') : '<div class="dmsSub">No recent sales found.</div>'}
        </div></div>
      </div>`;
    return wrap;
  };

  const oldViewVehicles = window.viewVehicles;
  if(typeof oldViewVehicles === 'function'){
    window.viewVehicles = function(){
      const w = oldViewVehicles.apply(this, arguments);
      function enhance(){
        try{
          w.querySelectorAll('button[data-act="edit"][data-id]').forEach(btn=>{
            const id=btn.dataset.id;
            const cell=btn.closest('td');
            if(!cell || cell.querySelector('button[data-act="profile"][data-id="'+CSS.escape(id)+'"]')) return;
            const b=document.createElement('button'); b.type='button'; b.className='primary small'; b.dataset.act='profile'; b.dataset.id=id; b.textContent='Profile';
            b.onclick=function(ev){ev.preventDefault(); ev.stopPropagation(); openVehicleProfileModal(id);};
            cell.insertBefore(b, cell.firstChild);
            cell.insertBefore(document.createTextNode(' '), btn);
          });
        }catch(e){console.warn('profile button enhance failed', e);}
      }
      setTimeout(enhance,50);
      const mo = new MutationObserver(()=>setTimeout(enhance,0));
      mo.observe(w,{childList:true,subtree:true});
      return w;
    };
  }
})();
</script>

<script>
/* ===== Paid DMS Upgrade Pack v3: Business Control Centre + Accounts Reports ===== */
(function(){
  if(window.__starcars_paid_dms_upgrade_v3__) return;
  window.__starcars_paid_dms_upgrade_v3__ = true;

  function esc(v){
    if(typeof escapeHtml === 'function') return escapeHtml(String(v ?? ''));
    return String(v ?? '').replace(/[&<>\"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));
  }
  function money(v){ return (typeof fmtMoney === 'function') ? fmtMoney(v) : ('£' + Number(v||0).toFixed(2)); }
  function dmy(v){ return (typeof ddmmyyyy === 'function') ? ddmmyyyy(v) : (v || ''); }
  function todayYM(){ return new Date().toISOString().slice(0,7); }
  function lower(v){ return String(v||'').toLowerCase().trim(); }
  function saleLive(s){ const st=lower(s && (s.saleStatus||s.status||'completed')); return s && !s.refunded && ['completed','complete','sold'].includes(st); }
  function vehSoldIds(){ return new Set((db.sales||[]).filter(saleLive).map(s=>s.vehicleId).filter(Boolean)); }
  function vehExpenses(id){ return (db.vehicleExpenses||[]).filter(e=>e.vehicleId===id).reduce((t,e)=>t+Number(e.amount||0),0); }
  function vehicleCost(v){ return Number(v.purchase||v.purchasePrice||0) + vehExpenses(v.id); }
  function saleVehicle(s){ return (db.vehicles||[]).find(v=>v.id===s.vehicleId) || {}; }
  function monthOf(d){ return String(d||'').slice(0,7); }
  function daysBetween(d){ if(!d) return null; const dt=new Date(String(d).slice(0,10)); if(isNaN(dt)) return null; return Math.floor((Date.now()-dt.getTime())/86400000); }
  function isInStock(v){ return !vehSoldIds().has(v.id) && lower(v.status) !== 'sold'; }
  function expenseDate(e){ return e.date || e.createdAt || e.paidDate || ''; }
  function saleProfit(s){ const v=saleVehicle(s); return Number(s.salePrice||0) - vehicleCost(v); }
  function getSelectedMonth(){ const el=document.getElementById('bizMonth'); return (el && el.value) || todayYM(); }

  function businessNumbers(month){
    const vehicles=db.vehicles||[], sales=(db.sales||[]).filter(saleLive), stock=vehicles.filter(isInStock);
    const ms=sales.filter(s=>monthOf(s.date)===month);
    const vehicleExpenseMonth=(db.vehicleExpenses||[]).filter(e=>monthOf(expenseDate(e))===month).reduce((t,e)=>t+Number(e.amount||0),0);
    const showroomExpenseMonth=(db.showroomExpenses||[]).filter(e=>monthOf(expenseDate(e))===month).reduce((t,e)=>t+Number(e.amount||0),0);
    const revenue=ms.reduce((t,s)=>t+Number(s.salePrice||0),0);
    const grossProfit=ms.reduce((t,s)=>t+saleProfit(s),0);
    const netProfit=grossProfit - showroomExpenseMonth;
    const stockValue=stock.reduce((t,v)=>t+vehicleCost(v),0);
    const prepNotReady=stock.filter(v=>!v.readyForSale && !['ready','advertised','live'].includes(lower(v.status))).length;
    const financeOutstanding=sales.filter(s=>{const exp=Number(s.financePayout||s.financeAmount||s.finance||0); const rec=Number(s.financePayoutAmount||0); return exp>0 && (!s.financePayoutPaid || rec+0.01<exp);});
    const complaintsOpen=(db.complaints||[]).filter(c=>!['closed','close','sorted','resolved'].includes(lower(c.status))).length;
    const motDue=stock.filter(v=>{ if(typeof motDays==='function'){ const d=motDays(v); return d!==null && d<=30; } return false; }).length;
    const marginVat=Math.max(0,grossProfit) / 6;
    const aged60=stock.filter(v=>{const d=daysBetween(v.purchaseDate||v.createdAt); return d!==null && d>=60;}).length;
    return {month, vehicles, sales, stock, ms, revenue, grossProfit, netProfit, vehicleExpenseMonth, showroomExpenseMonth, stockValue, prepNotReady, financeOutstanding, financeOutstandingValue:financeOutstanding.reduce((t,s)=>t+Math.max(0,Number(s.financePayout||s.financeAmount||s.finance||0)-Number(s.financePayoutAmount||0)),0), complaintsOpen, motDue, marginVat, aged60};
  }

  function stockAgeRows(){
    const rows=(db.vehicles||[]).filter(isInStock).map(v=>({v,age:daysBetween(v.purchaseDate||v.createdAt)})).sort((a,b)=>(b.age||0)-(a.age||0)).slice(0,8);
    return rows.length ? rows.map(x=>`<tr><td>${esc(String(x.v.reg||'').toUpperCase())}</td><td>${esc([x.v.make,x.v.model].filter(Boolean).join(' '))}</td><td class="right">${x.age==null?'-':x.age}</td><td class="right">${money(vehicleCost(x.v))}</td><td>${esc(x.v.status||'')}</td></tr>`).join('') : '<tr><td colspan="5" class="small">No live stock found.</td></tr>';
  }

  function financeRows(){
    const rows=businessNumbers(getSelectedMonth()).financeOutstanding.slice(0,8);
    return rows.length ? rows.map(s=>{const v=saleVehicle(s); const exp=Number(s.financePayout||s.financeAmount||s.finance||0); const rec=Number(s.financePayoutAmount||0); return `<tr><td>${dmy(s.date)}</td><td>${esc(String(v.reg||'').toUpperCase())}</td><td>${esc(s.buyer||'')}</td><td>${esc(s.financeCompany||'')}</td><td class="right">${money(Math.max(0,exp-rec))}</td></tr>`;}).join('') : '<tr><td colspan="5" class="small">No outstanding finance payouts found.</td></tr>';
  }

  function profitRows(month){
    const rows=businessNumbers(month).ms.slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,10);
    return rows.length ? rows.map(s=>{const v=saleVehicle(s); return `<tr><td>${dmy(s.date)}</td><td>${esc(String(v.reg||'').toUpperCase())}</td><td>${esc(s.buyer||'')}</td><td class="right">${money(s.salePrice||0)}</td><td class="right">${money(vehicleCost(v))}</td><td class="right">${money(saleProfit(s))}</td></tr>`;}).join('') : '<tr><td colspan="6" class="small">No sales for this month.</td></tr>';
  }

  function exportBusinessCSV(month){
    const b=businessNumbers(month);
    const lines=[];
    function q(v){ const s=String(v==null?'':v); return /[,"\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
    lines.push('Star Cars Business Control Report'); lines.push('Month,'+q(month)); lines.push('');
    [['Sales count',b.ms.length],['Revenue',b.revenue],['Gross profit',b.grossProfit],['Showroom expenses',b.showroomExpenseMonth],['Net profit estimate',b.netProfit],['Margin VAT estimate',b.marginVat],['Stock units',b.stock.length],['Stock value',b.stockValue],['Finance outstanding value',b.financeOutstandingValue]].forEach(r=>lines.push(r.map(q).join(',')));
    lines.push(''); lines.push('Date,Reg,Customer,Sale Price,Cost,Profit');
    b.ms.forEach(s=>{const v=saleVehicle(s); lines.push([s.date,String(v.reg||'').toUpperCase(),s.buyer||'',Number(s.salePrice||0),vehicleCost(v),saleProfit(s)].map(q).join(','));});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
    a.download='starcars_business_control_'+month+'.csv';
    a.click();
  }
  window.exportBusinessCSV = exportBusinessCSV;

  window.viewBusinessControl = function(){

    wrap.innerHTML = `
      <div class="pageTitle">Business Control Centre</div>
      <div class="pageSub">Paid-DMS style management screen for profit, stock ageing, finance payouts, MOT risk and month-end accounts.</div>
      <div class="card">
        <div class="bizTopBar">
          <div><h3>Month-End Control</h3><div class="card-sub">Use this before sending figures to your accountant or checking cashflow.</div></div>
          <div class="bizPeriod"><label>Month<input id="bizMonth" type="month" value="${esc(month)}" onchange="render()"></label><button class="primary" onclick="exportBusinessCSV(getSelectedMonth())">Export CSV</button><button onclick="backupJSON()">Backup</button></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="bizStatus ${b.motDue?'warn':'ok'}">MOT due ${b.motDue}</span>
          <span class="bizStatus ${b.financeOutstanding.length?'warn':'ok'}">Finance outstanding ${b.financeOutstanding.length}</span>
          <span class="bizStatus ${b.complaintsOpen?'bad':'ok'}">Open complaints ${b.complaintsOpen}</span>
          <span class="bizStatus ${b.prepNotReady?'warn':'ok'}">Prep not ready ${b.prepNotReady}</span>
          <span class="bizStatus ${b.aged60?'warn':'ok'}">Stock over 60 days ${b.aged60}</span>
        </div>
      </div>
      <div class="bizGrid">
        <div class="bizCard"><div class="lbl">Sales This Month</div><div class="val">${b.ms.length}</div><div class="sub">Completed sold deals</div></div>
        <div class="bizCard"><div class="lbl">Revenue This Month</div><div class="val">${money(b.revenue)}</div><div class="sub">Gross sale value</div></div>
        <div class="bizCard"><div class="lbl">Gross Profit Estimate</div><div class="val">${money(b.grossProfit)}</div><div class="sub">Sale minus purchase/prep</div></div>
        <div class="bizCard"><div class="lbl">Showroom Expenses</div><div class="val">${money(b.showroomExpenseMonth)}</div><div class="sub">This month overheads</div></div>
        <div class="bizCard"><div class="lbl">Net Profit Estimate</div><div class="val">${money(b.netProfit)}</div><div class="sub">Gross profit minus overheads</div></div>
        <div class="bizCard"><div class="lbl">Margin VAT Estimate</div><div class="val">${money(b.marginVat)}</div><div class="sub">Rough 1/6 of positive margin</div></div>
        <div class="bizCard"><div class="lbl">Live Stock Value</div><div class="val">${money(b.stockValue)}</div><div class="sub">Purchase + prep costs</div></div>
        <div class="bizCard"><div class="lbl">Finance Outstanding</div><div class="val">${money(b.financeOutstandingValue)}</div><div class="sub">Expected less received</div></div>
      </div>
      <div class="bizTwo">
        <div class="card flat"><div class="card-head"><h3>Monthly Profit Check</h3><button onclick="currentTab='Sold';render();">Sold List</button></div><div class="tableWrap"><table class="table compact bizTableMini"><thead><tr><th>Date</th><th>Reg</th><th>Customer</th><th class="right">Sale</th><th class="right">Cost</th><th class="right">Profit</th></tr></thead><tbody>${profitRows(month)}</tbody></table></div></div>
        <div class="card flat"><div class="card-head"><h3>Finance Payouts To Chase</h3><button onclick="currentTab='Sales';render();">Sales</button></div><div class="tableWrap"><table class="table compact bizTableMini"><thead><tr><th>Date</th><th>Reg</th><th>Customer</th><th>Finance</th><th class="right">Outstanding</th></tr></thead><tbody>${financeRows()}</tbody></table></div></div>
      </div>
      <div class="bizTwo" style="margin-top:12px">
        <div class="card flat"><div class="card-head"><h3>Stock Ageing / Dead Stock</h3><button onclick="currentTab='Vehicles';render();">Vehicles</button></div><div class="tableWrap"><table class="table compact bizTableMini"><thead><tr><th>Reg</th><th>Vehicle</th><th class="right">Days</th><th class="right">Cost</th><th>Status</th></tr></thead><tbody>${stockAgeRows()}</tbody></table></div></div>
        <div class="card flat"><div class="card-head"><h3>Quick Actions</h3></div><div class="bizActionGrid"><div class="bizAction" onclick="currentTab='Reports';render();"><b>Open Reports</b><span>Stock book, VAT, profit and FCA reports.</span></div><div class="bizAction" onclick="currentTab='Complaints';render();"><b>Complaints Control</b><span>Check open disputes before month-end.</span></div><div class="bizAction" onclick="backupJSON()"><b>Backup Now</b><span>Take a safe copy before big changes.</span></div></div></div>
      </div>`;
    return wrap;
  };

  function ensureBusinessTabPerms(){
    try{
      if(typeof DEFAULT_TABS !== 'undefined' && !DEFAULT_TABS.includes('Business Control')) DEFAULT_TABS.splice(1,0,'Business Control');
      if(typeof TABS !== 'undefined' && !TABS.includes('Business Control')) TABS.splice(1,0,'Business Control');
      (db.users||[]).forEach(u=>{ u.perms=u.perms||{}; u.perms.tabs=u.perms.tabs||{}; if(typeof u.perms.tabs['Business Control'] !== 'boolean') u.perms.tabs['Business Control']=true; });
      if(typeof saveDB==='function') saveDB();
    }catch(e){ console.warn('Business tab permissions failed', e); }
  }
  ensureBusinessTabPerms();

  const originalRender = render;
  render = function(){
    if(!session){ showLogin(true); return; }

  if(typeof prevDashboard === 'function'){
    window.viewDashboard = function(){
      const w=prevDashboard.apply(this,arguments);
      try{
        const b=businessNumbers(todayYM());
        const panel=document.createElement('div');
        panel.className='card flat';
        panel.innerHTML=`<div class="card-head"><div><h3>Business Control Centre</h3><div class="card-sub">Profit, stock ageing, finance payouts, VAT estimate and month-end checks.</div></div><button class="primary" onclick="currentTab='Business Control';render();">Open Control Centre</button></div><div class="salesControlPanel"><div class="salesControlCard"><div class="lbl">Net Profit Estimate</div><div class="val">${money(b.netProfit)}</div><div class="hint">This month</div></div><div class="salesControlCard"><div class="lbl">Margin VAT Estimate</div><div class="val">${money(b.marginVat)}</div><div class="hint">Positive margin only</div></div><div class="salesControlCard"><div class="lbl">Stock Over 60 Days</div><div class="val">${b.aged60}</div><div class="hint">Needs pricing review</div></div><div class="salesControlCard"><div class="lbl">Finance Outstanding</div><div class="val">${money(b.financeOutstandingValue)}</div><div class="hint">Cashflow to chase</div></div></div>`;
        w.appendChild(panel);
      }catch(e){ console.warn('DMS v3 dashboard panel failed', e); }
      return w;
    };

(function(){

  const css = `
  .careHero{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;margin-bottom:14px}
  .carePanel{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px;box-shadow:0 18px 48px rgba(0,0,0,.32)}

  .careKpi .lbl{font-size:12px;color:var(--mut);font-weight:900}.careKpi .val{font-size:28px;font-weight:950;margin-top:4px}.careKpi .sub{font-size:11px;color:var(--mut)}
  .careStatus{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;border:1px solid rgba(255,255,255,.12);margin:2px 4px 2px 0}.careStatus.ok{background:rgba(46,204,113,.12);color:#dcffe9}.careStatus.warn{background:rgba(255,196,87,.13);color:#ffe8b4}.careStatus.bad{background:rgba(255,107,107,.13);color:#ffd2d2}.careStatus.info{background:rgba(90,176,255,.13);color:#d8efff}
  .careTwo{display:grid;grid-template-columns:1fr 1fr;gap:12px}.careActionGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.careAction{padding:12px;border:1px solid rgba(255,255,255,.10);border-radius:14px;background:rgba(255,255,255,.035);cursor:pointer}.careAction:hover{border-color:rgba(90,176,255,.35);filter:brightness(1.08)}.careAction b{display:block}.careAction span{display:block;color:var(--mut);font-size:12px;margin-top:4px}.riskHigh{color:#ffd2d2;font-weight:900}.riskMed{color:#ffe8b4;font-weight:900}.riskLow{color:#dcffe9;font-weight:900}
  @media(max-width:900px){.careHero,.careTwo{grid-template-columns:1fr}}
  `;
  const st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);

  function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function money(n){ try{return (typeof fmtMoney==='function')?fmtMoney(n):'£'+Number(n||0).toFixed(2);}catch(_){return '£'+Number(n||0).toFixed(2);} }
  function dmy(d){ try{return (typeof ddmmyyyy==='function')?ddmmyyyy(d):(d||'');}catch(_){return d||'';} }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function daysBetween(a,b){ if(!a) return null; const da=new Date(a), db=b?new Date(b):new Date(); const n=Math.round((db-da)/(86400000)); return isFinite(n)?n:null; }
  function norm(s){ return String(s||'').trim().toLowerCase(); }
  function stockVehicleForReg(reg){ reg=String(reg||'').toUpperCase().replace(/\s+/g,''); return (db.vehicles||[]).find(v=>String(v.reg||'').toUpperCase().replace(/\s+/g,'')===reg)||null; }
  function vehicleForSale(s){ return (db.vehicles||[]).find(v=>v.id===s.vehicleId)||{}; }
  function isClosedStatus(s){ return ['closed','close','sorted','resolved','complete','completed'].includes(norm(s)); }
  function isSoldSale(s){ const st=norm(s.saleStatus||s.status||'completed'); return ['completed','complete','sold',''].includes(st); }
  function warrantyEnd(s){
    if(!s || !s.date) return '';
    let months=Number(s.warrantyMonths||0) || Number((db.company||{}).defaultWarrantyMonths||0) || 3;
    const d=new Date(s.date); if(!isFinite(d)) return '';
    d.setMonth(d.getMonth()+months); return d.toISOString().slice(0,10);
  }
  function saleWarrantyState(s){
    const end=warrantyEnd(s); if(!end) return {txt:'Not recorded',cls:'warn',days:null,end:''};
    const days=daysBetween(todayISO(),end);
    if(days<0) return {txt:'Expired '+Math.abs(days)+' days ago',cls:'bad',days,end};
    if(days<=14) return {txt:'Expires in '+days+' days',cls:'warn',days,end};
    return {txt:'Active '+days+' days left',cls:'ok',days,end};
  }
  function complaintRisk(c){
    const sev=norm(c.severity); const st=norm(c.status); const age=daysBetween(c.date)||0; const fu=c.followup?daysBetween(todayISO(),c.followup):null;
    if(isClosedStatus(st)) return {label:'Closed',cls:'riskLow',score:0};
    if(sev==='urgent'||sev==='high'||st==='escalated'||age>21||(fu!==null&&fu<0)) return {label:'High',cls:'riskHigh',score:3};
    if(sev==='medium'||age>7||(fu!==null&&fu<=2)) return {label:'Medium',cls:'riskMed',score:2};
    return {label:'Low',cls:'riskLow',score:1};
  }
  function careNumbers(){
    const complaints=(db.complaints||[]);
    const open=complaints.filter(c=>!isClosedStatus(c.status));
    const high=open.filter(c=>complaintRisk(c).score>=3);
    const overdue=open.filter(c=>c.followup && daysBetween(todayISO(),c.followup)<0);
    const warrantySales=(db.sales||[]).filter(isSoldSale).map(s=>({s,v:vehicleForSale(s),w:saleWarrantyState(s)}));
    const warrantyLive=warrantySales.filter(x=>x.w.days!==null && x.w.days>=0);
    const warrantyExpiring=warrantyLive.filter(x=>x.w.days<=14);
    const repairCost=(db.vehicleExpenses||[]).reduce((t,e)=>t+Number(e.amount||0),0);
    const complaintCost=complaints.reduce((t,c)=>t+Number(c.cost||0),0);
    return {complaints,open,high,overdue,warrantySales,warrantyLive,warrantyExpiring,repairCost,complaintCost};

  function complaintRows(){
    const rows=careNumbers().open.slice().sort((a,b)=>complaintRisk(b).score-complaintRisk(a).score || String(a.followup||'9999').localeCompare(String(b.followup||'9999')) || String(b.date||'').localeCompare(String(a.date||''))).slice(0,12);

  }
  function warrantyRows(){
    const rows=careNumbers().warrantySales.filter(x=>x.w.days!==null).sort((a,b)=>a.w.days-b.w.days).slice(0,12);
    if(!rows.length) return '<tr><td colspan="7" class="small">No warranty dates found. Default 3 months used when sale date exists.</td></tr>';
    return rows.map(x=>`<tr><td>${dmy(x.s.date)}</td><td>${esc(String(x.v.reg||'').toUpperCase())}</td><td>${esc((x.v.make||'')+' '+(x.v.model||''))}</td><td>${esc(x.s.buyer||'')}</td><td>${dmy(x.w.end)}</td><td><span class="careStatus ${x.w.cls}">${esc(x.w.txt)}</span></td><td>${esc(x.s.warrantyProvider||'In-house')}</td></tr>`).join('');
  }
  function repairRows(){
    const rows=(db.vehicleExpenses||[]).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,12);
    if(!rows.length) return '<tr><td colspan="6" class="small">No vehicle repairs/expenses recorded.</td></tr>';
    return rows.map(e=>{ const v=(db.vehicles||[]).find(x=>x.id===e.vehicleId)||{}; return `<tr><td>${dmy(e.date)}</td><td>${esc(String(v.reg||e.reg||'').toUpperCase())}</td><td>${esc((v.make||'')+' '+(v.model||''))}</td><td>${esc(e.type||e.category||'')}</td><td>${esc(e.note||e.description||'')}</td><td class="right">${money(e.amount||0)}</td></tr>`; }).join('');
  }

  function exportCareCSV(){
    const c=careNumbers(); const lines=[]; const q=v=>{const s=String(v==null?'':v); return /[,"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
    lines.push('Star Cars Customer Care Control'); lines.push('Generated,'+q(new Date().toLocaleString())); lines.push('');
    [['Open complaints',c.open.length],['High risk complaints',c.high.length],['Overdue follow ups',c.overdue.length],['Live warranty vehicles',c.warrantyLive.length],['Warranty expiring 14 days',c.warrantyExpiring.length],['Complaint/goodwill cost',c.complaintCost],['Repair spend recorded',c.repairCost]].forEach(r=>lines.push(r.map(q).join(',')));
    lines.push(''); lines.push('Open Complaints'); lines.push('Date,Customer,Reg,Type,Severity,Status,Follow-up,Cost,Details');
    c.open.forEach(x=>lines.push([x.date,x.customer,x.vehicle||x.reg,x.type,x.severity,x.status,x.followup,x.cost,x.details].map(q).join(',')));
    lines.push(''); lines.push('Warranty Register'); lines.push('Sale Date,Reg,Customer,Warranty End,Status,Provider');
    c.warrantySales.forEach(x=>lines.push([x.s.date,String(x.v.reg||''),x.s.buyer,x.w.end,x.w.txt,x.s.warrantyProvider||'In-house'].map(q).join(',')));
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'})); a.download='starcars_customer_care_control_'+todayISO()+'.csv'; a.click();
  }

  function printCarePack(){

    if(typeof openPrintable==='function') openPrintable(html); else { const w=window.open('','_blank'); w.document.write(html); w.document.close(); w.print(); }

<script id="dms_v6_v7_script">
(function(){
  if(window.__DMS_V6_V7_SAFE__) return; window.__DMS_V6_V7_SAFE__=true;

  function todayISO(){return new Date().toISOString().slice(0,10)}
  function low(v){return String(v||'').trim().toLowerCase()}

  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function money(v){try{return (typeof fmtMoney==='function')?fmtMoney(v):'£'+num(v).toFixed(2)}catch(e){return '£'+num(v).toFixed(2)}}
  function disp(d){try{return (typeof ddmmyyyy==='function')?ddmmyyyy(d):String(d||'')}catch(e){return String(d||'')}}
  function arr(k){window.db=window.db||{}; if(!Array.isArray(db[k])) db[k]=[]; return db[k]}
  function vehicleName(v){return [String(v.reg||'').toUpperCase(),v.make,v.model].filter(Boolean).join(' ')}
  function dateOnly(v){return String(v||'').slice(0,10)}
  function daysBetween(a,b){if(!a||!b)return null; var A=new Date(dateOnly(a)+'T00:00:00'),B=new Date(dateOnly(b)+'T00:00:00'); if(isNaN(A)||isNaN(B))return null; return Math.round((A-B)/86400000)}
  function daysTo(d){return daysBetween(d,todayISO())}
  function saleVehicle(s){return arr('vehicles').find(function(v){return v.id===s.vehicleId})||{}}
  function saleIsLive(s){var st=low(s.saleStatus||s.status||'completed'); return !['cancelled','rejected','refunded','void'].includes(st)}
  function add(list,o){o.rank=o.severity==='critical'?1:o.severity==='warning'?2:3; list.push(o)}

  window.getDMSAlerts=function(){
    var alerts=[], today=todayISO();
    arr('vehicles').forEach(function(v){
      var st=low(v.status); if(st==='sold') return;
      var name=vehicleName(v)||'Vehicle';
      var mot=v.motExpiry||v.lastMotExpiry||v.mot_expiry||v.motDate||'';
      if(!mot){add(alerts,{severity:'warning',category:'MOT',title:'Missing MOT expiry',message:name+' has no MOT expiry saved.',meta:'Open vehicle and update MOT expiry',actionTab:'Vehicles'});}
      else {var d=daysTo(mot); if(d!==null&&d<0)add(alerts,{severity:'critical',category:'MOT',title:'MOT expired',message:name+' MOT expired.',meta:'Expired '+Math.abs(d)+' days ago • '+disp(mot),actionTab:'Vehicles'}); else if(d!==null&&d<=7)add(alerts,{severity:'critical',category:'MOT',title:'MOT due within 7 days',message:name+' MOT is due very soon.',meta:d+' days left • '+disp(mot),actionTab:'Vehicles'}); else if(d!==null&&d<=30)add(alerts,{severity:'warning',category:'MOT',title:'MOT due within 30 days',message:name+' MOT is due soon.',meta:d+' days left • '+disp(mot),actionTab:'Vehicles'});}
      var bought=v.purchaseDate||v.datePurchased||v.date||v.createdAt||''; var age=daysBetween(today,bought); if(age!==null&&age>=90)add(alerts,{severity:'critical',category:'Stock Ageing',title:'Dead stock over 90 days',message:name+' has been in stock too long.',meta:age+' days in stock',actionTab:'Vehicles'}); else if(age!==null&&age>=60)add(alerts,{severity:'warning',category:'Stock Ageing',title:'Stock over 60 days',message:name+' may need price/action review.',meta:age+' days in stock',actionTab:'Vehicles'});
      var prep=low(v.prepStatus||v.status2||v.workshopStatus); if(['prep','in prep','workshop','repair','awaiting parts'].includes(prep)){var pd=v.prepDate||v.updatedAt||v.createdAt||bought; var pAge=daysBetween(today,pd); if(pAge!==null&&pAge>14)add(alerts,{severity:'warning',category:'Prep',title:'Vehicle stuck in prep/workshop',message:name+' appears delayed in prep/workshop.',meta:pAge+' days • '+(v.prepStatus||v.workshopStatus||''),actionTab:'Vehicles'});}
    });
    arr('sales').forEach(function(s){if(!saleIsLive(s))return; var v=saleVehicle(s), name=vehicleName(v)||s.reg||s.invNo||'Sale'; var expected=num(s.financePayout||s.sale_finPayout||s.financeAmount||s.finance||0), received=num(s.financePayoutAmount||s.financeReceived||0); if(expected>0 && (!s.financePayoutPaid || received+0.01<expected)){var sd=s.date||s.saleDate||s.createdAt||today; var age=daysBetween(today,sd); add(alerts,{severity:age!==null&&age>7?'critical':'warning',category:'Finance',title:'Finance payout outstanding',message:name+' has finance payout to chase.',meta:'Expected '+money(expected)+' • Received '+money(received)+' • Sale '+disp(sd),actionTab:'Sales'});} if(!s.invNo)add(alerts,{severity:'warning',category:'Missing Data',title:'Missing invoice number',message:name+' sale has no invoice number.',meta:'Check sales invoice details',actionTab:'Sales'}); if((num(s.finance||s.financeAmount||0)>0||expected>0)&&!s.financeCompany)add(alerts,{severity:'warning',category:'Missing Data',title:'Missing finance company',message:name+' has finance but no lender/company entered.',meta:'Required for finance/FCA reporting',actionTab:'Sales'});});
    arr('complaints').forEach(function(c){var st=low(c.status); if(['closed','close','sorted','resolved'].includes(st))return; var title=c.reg||c.customer||c.buyer||'Complaint'; var risk=low(c.risk||c.priority||c.stage); var due=c.nextFollowUp||c.followUp||c.replyDue||c.dateDue||''; var dd=daysTo(due); if(['urgent','high','court','fos','legal','escalated'].some(function(x){return risk.includes(x)||low(c.notes).includes(x)})) add(alerts,{severity:'critical',category:'Complaint',title:'High risk complaint',message:title+' is marked or appears high risk.',meta:'Status '+(c.status||'open')+' • '+(c.risk||c.priority||''),actionTab:'Complaints'}); if(dd!==null&&dd<0)add(alerts,{severity:'critical',category:'Complaint',title:'Complaint follow-up overdue',message:title+' needs a reply/follow-up.',meta:'Due '+disp(due),actionTab:'Complaints'});});
    arr('leads').forEach(function(l){var st=low(l.status); if(['won','lost','closed','sold'].includes(st))return; var due=l.nextFollowUp||l.followUp||l.followup||''; var dd=daysTo(due); if(dd!==null&&dd<0)add(alerts,{severity:'warning',category:'Pipeline',title:'Lead follow-up overdue',message:(l.customer||'Lead')+' needs follow-up.',meta:(l.reg||'')+' • Due '+disp(due),actionTab:'Sales Pipeline'});});
    arr('pipelineTasks').concat(arr('todo')).forEach(function(t){var st=low(t.status); if(t.done||['done','closed','complete'].includes(st))return; var due=t.dueDate||t.date||''; var dd=daysTo(due); if(dd!==null&&dd<0)add(alerts,{severity:'critical',category:'Pipeline Task',title:'Task overdue',message:t.title||t.text||'Task overdue',meta:'Due '+disp(due)+' • '+(t.priority||t.assignedTo||''),actionTab:t.leadId?'Sales Pipeline':'To-Do'});});
    alerts.sort(function(a,b){return a.rank-b.rank||String(a.category).localeCompare(String(b.category))||String(a.title).localeCompare(String(b.title))}); return alerts;
  };
  window.getDMSAlertSummary=function(){var a=window.getDMSAlerts(); return {all:a,critical:a.filter(function(x){return x.severity==='critical'}),warning:a.filter(function(x){return x.severity==='warning'}),info:a.filter(function(x){return x.severity==='info'}),mot:a.filter(function(x){return x.category==='MOT'}),finance:a.filter(function(x){return x.category==='Finance'}),complaints:a.filter(function(x){return x.category==='Complaint'}),pipeline:a.filter(function(x){return String(x.category).indexOf('Pipeline')>=0})};};
  function ensureTabs(){try{[ALERT_TAB,DEAL_TAB].forEach(function(t){if(typeof DEFAULT_TABS!=='undefined'&&!DEFAULT_TABS.includes(t))DEFAULT_TABS.splice(Math.min(2,DEFAULT_TABS.length),0,t); if(typeof TABS!=='undefined'&&!TABS.includes(t))TABS.splice(Math.min(2,TABS.length),0,t);}); arr('users').forEach(function(u){u.perms=u.perms||{};u.perms.tabs=u.perms.tabs||{};u.perms.tabs[ALERT_TAB]=true;u.perms.tabs[DEAL_TAB]=true;});}catch(e){console.warn('DMS tab setup failed',e)}}
  window.renderAlertBell=function(){try{var h=document.querySelector('.hdr-actions'); if(!h)return; var b=document.getElementById('dms_alert_bell'); if(!b){b=document.createElement('span'); b.id='dms_alert_bell'; b.onclick=function(){currentTab=ALERT_TAB; render();}; var search=document.getElementById('global_search'); if(search&&search.parentNode===h)h.insertBefore(b,search); else h.insertBefore(b,h.firstChild);} var s=window.getDMSAlertSummary(), total=s.all.length; b.className='alertBellPro '+(s.critical.length?'critical alertPulse':s.warning.length?'warning':''); b.innerHTML='🔔 Alerts <span class="dot">'+total+'</span>'; b.title=s.critical.length+' critical, '+s.warning.length+' warning';}catch(e){console.warn('renderAlertBell failed',e)}};

  window.exportAlertsCSV=function(){var q=function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}; var lines=[['Severity','Category','Title','Message','Details','Action Tab'].map(q).join(',')]; window.getDMSAlerts().forEach(function(a){lines.push([a.severity,a.category,a.title,a.message,a.meta,a.actionTab].map(q).join(','))}); var x=document.createElement('a'); x.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'})); x.download='starcars_alerts_'+todayISO()+'.csv'; x.click();};
  window.printAlertPack=function(){var s=window.getDMSAlertSummary(); var rows=s.all.map(function(a){return '<tr><td>'+esc(a.severity)+'</td><td>'+esc(a.category)+'</td><td>'+esc(a.title)+'</td><td>'+esc(a.message)+'</td><td>'+esc(a.meta)+'</td></tr>'}).join('')||'<tr><td colspan="5">No alerts</td></tr>'; var html='<!doctype html><html><head><meta charset="utf-8"><title>Alert Pack</title><style>body{font-family:Arial;font-size:12px;margin:18px;color:#222}table{width:100%;border-collapse:collapse}th,td{border:1px solid #bbb;padding:5px;text-align:left;vertical-align:top}th{background:#eee}</style></head><body><h1>Star Cars London Ltd — Alert Pack</h1><p>Generated: '+esc(new Date().toLocaleString())+'</p><table><tr><th>Total</th><td>'+s.all.length+'</td><th>Critical</th><td>'+s.critical.length+'</td><th>Warnings</th><td>'+s.warning.length+'</td></tr></table><h2>Alerts</h2><table><thead><tr><th>Severity</th><th>Category</th><th>Title</th><th>Message</th><th>Details</th></tr></thead><tbody>'+rows+'</tbody></table></body></html>'; if(typeof openPrintable==='function')openPrintable(html); else{var w=window.open('','_blank'); w.document.write(html); w.document.close(); w.print();}};
  window.viewAlertCentre=function(){var wrap=document.createElement('div'); wrap.className='card'; var s=window.getDMSAlertSummary(); var fid='alert_filter_safe'; wrap.innerHTML='<div class="pageTitle">Smart Alert Centre</div><div class="pageSub">Management warnings for MOT, finance payouts, complaints, prep delays, stock ageing, missing data and pipeline follow-ups.</div><div class="alertCentreGrid"><div class="alertKpi '+(s.critical.length?'critical':'ok')+'"><div class="lbl">Critical</div><div class="val">'+s.critical.length+'</div><div class="sub">Immediate action</div></div><div class="alertKpi '+(s.warning.length?'warning':'ok')+'"><div class="lbl">Warnings</div><div class="val">'+s.warning.length+'</div><div class="sub">Review soon</div></div><div class="alertKpi"><div class="lbl">Finance</div><div class="val">'+s.finance.length+'</div><div class="sub">Payout chasing</div></div><div class="alertKpi"><div class="lbl">MOT</div><div class="val">'+s.mot.length+'</div><div class="sub">Expired / due / missing</div></div><div class="alertKpi"><div class="lbl">Complaints</div><div class="val">'+s.complaints.length+'</div><div class="sub">Risk / follow-up</div></div></div><div class="alertToolbar"><select id="'+fid+'"><option value="all">All alerts</option><option value="critical">Critical only</option><option value="warning">Warnings only</option><option value="MOT">MOT</option><option value="Finance">Finance</option><option value="Complaint">Complaints</option><option value="Pipeline">Pipeline</option><option value="Stock Ageing">Stock ageing</option><option value="Prep">Prep/workshop</option><option value="Missing Data">Missing data</option></select><button onclick="exportAlertsCSV()">Export CSV</button><button onclick="printAlertPack()">Print Alert Pack</button><button class="primary" onclick="backupJSON&&backupJSON()">Backup Now</button></div><div id="alert_list" class="alertList"></div><div class="card flat" style="margin-top:14px"><h3>Alert Rules</h3><div class   function dealStats(){var sales=arr('sales').filter(saleIsLive); var complete=sales.length; var missingInvoice=sales.filter(function(s){return !s.invNo}).length; var missingFinance=sales.filter(function(s){return (num(s.finance||s.financeAmount||s.financePayout)>0)&&!s.financeCompany}).length; var warrantyMissing=sales.filter(function(s){return !s.warrantyType&&!s.warranty&&!s.warrantyMonths}).length; var total=sales.reduce(function(t,s){return t+num(s.salePrice||s.price||s.total||0)},0); return {sales:sales,complete:complete,missingInvoice:missingInvoice,missingFinance:missingFinance,warrantyMissing:warrantyMissing,total:total};}

  window.printDealPackPro=function(){var id=(document.getElementById('deal_sale_id')||{}).value; var s=arr('sales').find(function(x){return x.id===id})||arr('sales')[0]||{}; var v=saleVehicle(s); var checks=[['Invoice number',s.invNo],['Customer name',s.buyer||s.customer],['Sale date',s.date||s.saleDate],['Sale price',num(s.salePrice||s.price)>0],['Vehicle linked',v.id],['Warranty recorded',s.warrantyType||s.warranty||s.warrantyMonths],['Finance company',!(num(s.finance||s.financeAmount||s.financePayout)>0)||s.financeCompany],['Finance payout status',!(num(s.financePayout||s.financeAmount)>0)||s.financePayoutPaid],['MOT expiry',v.motExpiry||v.lastMotExpiry],['Mileage',v.mileage||s.mileage]].map(function(c){return '<tr><td>'+esc(c[0])+'</td><td>'+(c[1]?'OK':'Check')+'</td></tr>'}).join(''); var html='<!doctype html><html><head><meta charset="utf-8"><title>Deal Pack</title><style>body{font-family:Arial;font-size:12px;margin:18px;color:#222}table{width:100%;border-collapse:collapse;margin:8px 0 14px}th,td{border:1px solid #bbb;padding:6px;text-align:left;vertical-align:top}th{background:#eee}.box{border:1px solid #bbb;padding:10px;margin:10px 0}</style></head><body><h1>Star Cars London Ltd — Deal Pack Control Sheet</h1><p>Generated: '+esc(new Date().toLocaleString())+'</p><div class="box"><b>Vehicle:</b> '+esc(vehicleName(v)||s.reg||'')+'<br><b>Customer:</b> '+esc(s.buyer||s.customer||'')+'<br><b>Invoice:</b> '+esc(s.invNo||'')+'<br><b>Sale Date:</b> '+esc(disp(s.date||s.saleDate||''))+'<br><b>Sale Price:</b> '+esc(money(s.salePrice||s.price||0))+'</div><h2>Deal File Checklist</h2><table><thead><tr><th>Item</th><th>Status</th></tr></thead><tbody>'+checks+'</tbody></table><h2>Notes</h2><p>Keep invoice, warranty confirmation, handover checklist, ID/finance notes, complaint policy and proof of delivery/viewing with this deal file.</p></body></html>'; if(typeof openPrintable==='function')openPrintable(html); else{var w=window.open('','_blank'); w.document.write(html); w.document.close(); w.print();}};
  window.exportDealPackAuditCSV=function(){var q=function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}; var lines=[['Date','Invoice','Reg','Customer','Sale Price','Invoice OK','Warranty OK','Finance Company OK','MOT OK'].map(q).join(',')]; arr('sales').forEach(function(s){var v=saleVehicle(s); lines.push([s.date||s.saleDate,s.invNo,vehicleName(v)||s.reg,s.buyer||s.customer,s.salePrice||s.price,s.invNo?'OK':'CHECK',(s.warrantyType||s.warranty||s.warrantyMonths)?'OK':'CHECK',((num(s.finance||s.financeAmount||s.financePayout)>0)&&!s.financeCompany)?'CHECK':'OK',(v.motExpiry||v.lastMotExpiry)?'OK':'CHECK'].map(q).join(','))}); var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'})); a.download='starcars_deal_pack_audit_'+todayISO()+'.csv'; a.click();};
  window.viewDealPackPro=function(){var wrap=document.createElement('div'); wrap.className='card'; var ds=dealStats(); var risk=ds.missingInvoice+ds.missingFinance+ds.warrantyMissing; var opts=selectSaleOptions(); wrap.innerHTML='<div class="pageTitle">Deal Pack Pro</div><div class="pageSub">One control centre for deal-file readiness, invoice/warranty/finance checks and printable pack sheets.</div><div class="dealProGrid"><div class="dealKpi"><div class="lbl">Live Sales</div><div class="val">'+ds.complete+'</div><div class="sub">Deals checked</div></div><div class="dealKpi"><div class="lbl">Sales Value</div><div class="val">'+money(ds.total)+'</div><div class="sub">Live sale records</div></div><div class="dealKpi"><div class="lbl">Missing Invoice</div><div class="val">'+ds.missingInvoice+'</div><div class="sub">Need invoice number</div></div><div class="dealKpi"><div class="lbl">Finance Checks</div><div class="val">'+ds.missingFinance+'</div><div class="sub">Missing finance company</div></div><div class="dealKpi"><div class="lbl">Warranty Checks</div><div class="val">'+ds.warrantyMissing+'</div><div class="sub">Warranty not recorded</div></div></div><div class="dealPackCard"><h3>Selected Deal Pack</h3><div class="row"><label style="flex:1">Select sale<select id="deal_sale_id">'+(opts||'<option value="">No sales found</option>')+'</select></label><button class="primary" onclick="printDealPackPro()">Print Deal Pack Control Sheet</button><button onclick="exportDealPackAuditCSV()">Export Deal Audit CSV</button></div><div class="dealCheck"><div><b>Invoice</b>Check invoice number, customer, sale date and price.</div><div><b>Warranty</b>Attach warranty confirmation and terms supplied.</div><div><b>Handover</b>Keep signed handover/collection checklist.</div><div><b>Finance</b>Record lender, payout, commission and settlement/PX.</div><div><b>Vehicle Evidence</b>MOT, mileage, service, spare key and advert copy.</div><div><b>Legal Protection</b>Keep complaint policy, inspection notes and correspondence.</div></div></div><div class="dealPackCard"><h3>Deal File Risk</h3><span class="riskTag '+(risk?risk>5?'bad':'warn':'good')+'">'+(risk?risk+' checks need attention':'All key checks look good')+'</span><div class="small" style="margin-top:8px">This does not change your data. It reads your existing sales/vehicle records and shows what may be missing before accountant, finance, warranty or complaint review.</div></div>'; return wrap;};

  var previousRender=window.render;
  if(typeof previousRender==='function'){

<script>
(function(){

  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function num(v){const n=Number(String(v==null?'':v).replace(/[^0-9.-]/g,'')); return isFinite(n)?n:0;}
  function money(v){try{return typeof fmtMoney==='function'?fmtMoney(num(v)):'£'+num(v).toFixed(2);}catch(e){return '£'+num(v).toFixed(2);}}

  function salePrice(s){return num(s.salePrice||s.price||s.total||s.invoiceTotal||s.amount);}
