  function priceBand(n){n=num(n); if(n<=0)return 'Unknown'; if(n<3000)return 'Under £3k'; if(n<5000)return '£3k-£5k'; if(n<8000)return '£5k-£8k'; if(n<12000)return '£8k-£12k'; if(n<16000)return '£12k-£16k'; return '£16k+';}
  function fuel(v){return String(v.fuel||v.fuelType||v.engineFuel||'Unknown') || 'Unknown';}

  function intelligenceRows(){
    const rows=[];
    liveSales().forEach(function(s){
      const v=saleVehicle(s); const sp=salePrice(s); const pp=purchasePrice(v); const exp=vehicleExpenses(v.id); const profit=sp-pp-exp; const pdate=purchaseDate(v); const sdate=soldDate(s); const days=pdate&&sdate?Math.max(0,daysBetween(pdate,sdate)):0;
      rows.push({sale:s, vehicle:v, reg:String(v.reg||s.reg||'').toUpperCase(), make:v.make||'', model:v.model||'', key:makeModelKey(v), fuel:fuel(v), band:priceBand(sp||pp), salePrice:sp, purchasePrice:pp, expenses:exp, profit:profit, days:days, margin:sp?profit/sp*100:0});
    });
    return rows;
  }
  function groupRows(rows, keyFn, labelName){
    const map={};
    rows.forEach(function(r){const k=keyFn(r)||'Unknown'; if(!map[k])map[k]={label:k,count:0,sales:0,profit:0,daysTotal:0,losses:0}; const g=map[k]; g.count++; g.sales+=r.salePrice; g.profit+=r.profit; g.daysTotal+=r.days; if(r.profit<0)g.losses++;});

  }
  function intelligenceSummary(){

    const byModel=groupRows(rows,r=>r.key); const byBand=groupRows(rows,r=>r.band); const byFuel=groupRows(rows,r=>r.fuel);
    const best=byModel.filter(g=>g.count>=1 && g.avgProfit>0).slice(0,6); const risk=byModel.slice().sort((a,b)=>a.avgProfit-b.avgProfit || b.avgDays-a.avgDays).slice(0,6);
    return {rows,totalProfit,totalSales,avgDays,winners,losers,byModel,byBand,byFuel,best,risk};
  }

    s.rows.forEach(r=>lines.push([r.reg,r.make,r.model,r.fuel,r.band,r.salePrice,r.purchasePrice,r.expenses,r.profit,r.margin.toFixed(2),r.days].map(q).join(',')));

    const band=s.byBand.map(g=>'<tr><td>'+esc(g.label)+'</td><td>'+g.count+'</td><td>'+money(g.avgProfit)+'</td><td>'+g.avgDays.toFixed(1)+'</td></tr>').join('');
    const html='<!doctype html><html><head><meta charset="utf-8"><title>Stock Buying Intelligence</title><style>body{font-family:Arial,sans-serif;font-size:12px;margin:18px;color:#222}table{width:100%;border-collapse:collapse;margin:8px 0 14px}th,td{border:1px solid #bbb;padding:6px;text-align:left;vertical-align:top}th{background:#eee}.k{display:inline-block;border:1px solid #bbb;padding:8px;margin:4px;min-width:150px}</style></head><body><h1>Star Cars London Ltd — Stock Buying Intelligence</h1><p>Generated: '+esc(new Date().toLocaleString())+'</p><div><span class="k"><b>Sold records</b><br>'+s.rows.length+'</span><span class="k"><b>Total profit</b><br>'+money(s.totalProfit)+'</span><span class="k"><b>Average days</b><br>'+s.avgDays.toFixed(1)+'</span><span class="k"><b>Loss deals</b><br>'+s.losers+'</span></div><h2>Model Performance</h2><table><thead><tr><th>Group</th><th>Sold</th><th>Sales Value</th><th>Total Profit</th><th>Avg Profit</th><th>Avg Days</th><th>Score</th></tr></thead><tbody>'+rows+'</tbody></table><h2>Price Band Performance</h2><table><thead><tr><th>Band</th><th>Sold</th><th>Avg Profit</th><th>Avg Days</th></tr></thead><tbody>'+band+'</tbody></table><p><b>Buying rule:</b> prioritise cars with positive average profit, quick turn days, and repeat sales. Be careful with groups showing low profit or slow stock days.</p></body></html>';
    if(typeof openPrintable==='function') openPrintable(html); else {const w=window.open('','_blank'); w.document.write(html); w.document.close(); w.print();}
  };

  window.viewStockIntelligence=function(){
    const s=intelligenceSummary(); const wrap=document.createElement('div');
    const best=s.best.map(g=>'<div class="buyTile good"><b>'+esc(g.label)+'</b><span>Sold '+g.count+' • Avg profit '+money(g.avgProfit)+' • '+g.avgDays.toFixed(0)+' days</span><em>Buy again when price is right</em></div>').join('')||'<div class="small">No sales history yet. Sell a few cars first and this will learn from your data.</div>';

    const modelRows=s.byModel.slice(0,15).map(g=>'<tr><td>'+esc(g.label)+'</td><td class="right">'+g.count+'</td><td class="right">'+money(g.profit)+'</td><td class="right">'+money(g.avgProfit)+'</td><td class="right">'+g.avgDays.toFixed(1)+'</td><td class="right">'+g.score.toFixed(1)+'</td></tr>').join('')||'<tr><td colspan="6" class="small">No data yet.</td></tr>';
    wrap.innerHTML='<div class="pageTitle">Stock Buying Intelligence</div><div class="pageSub">Uses your own sold stock data to show what to buy again, what turns quickly, and what causes losses.</div><div class="dmsV8KpiGrid"><div class="dmsV8Kpi"><div class="lbl">Sold Analysed</div><div class="val">'+s.rows.length+'</div><div class="sub">Completed sale records</div></div><div class="dmsV8Kpi"><div class="lbl">Total Profit</div><div class="val">'+money(s.totalProfit)+'</div><div class="sub">After purchase + prep costs</div></div><div class="dmsV8Kpi"><div class="lbl">Average Turn</div><div class="val">'+s.avgDays.toFixed(0)+'d</div><div class="sub">Purchase to sale</div></div><div class="dmsV8Kpi"><div class="lbl">Loss Deals</div><div class="val">'+s.losers+'</div><div class="sub">Needs buying caution</div></div></div><div class="grid2"><div class="card"><div class="card-head"><h3>Buy Again List</h3></div><div class="buyGrid">'+best+'</div></div><div class="card"><div class="card-head"><h3>Risk / Avoid List</h3></div><div class="buyGrid">'+risk+'</div></div></div><div class="card"><div class="card-head"><div><h3>Buying Performance Tables</h3><div class="card-sub">Score rewards repeat sales and profit, then penalises slow turn and losses.</div></div><div><button class="primary" onclick="exportStockIntelligenceCSV()">Export CSV</button> <button onclick="printStockIntelligencePack()">Print Pack</button></div></div><div class="grid2"><div><h3>Price Bands</h3><div class="tableWrap"><table class="table compact"><thead><tr><th>Band</th><th class="right">Sold</th><th class="right">Sales</th><th class="right">Avg Profit</th><th class="right">Avg Days</th><th>Rating</th></tr></thead><tbody>'+bandRows+'</tbody></table></div></div><div><h3>Fuel Type</h3><div class="tableWrap"><table class="table compact"><thead><tr><th>Fuel</th><th class="right">Sold</th><th class="right">Avg Profit</th><th class="right">Avg Days</th></tr></thead><tbody>'+fuelRows+'</tbody></table></div></div></div><h3>Model / Make Ranking</h3><div class="tableWrap"><table class="table compact"><thead><tr><th>Vehicle Group</th><th class="right">Sold</th><th class="right">Total Profit</th><th class="right">Avg Profit</th><th class="right">Avg Days</th><th class="right">Score</th></tr></thead><tbody>'+modelRows+'</tbody></table></div></div>';
    return wrap;

  window.normaliseMOTFields = function normaliseMOTFields(){
    arr('vehicles').forEach(function(v){
      const mot=String(v.motExpiry||v.lastMotExpiry||v.mot_expiry||v.motDue||'').slice(0,10);
      if(mot){v.motExpiry=mot; v.lastMotExpiry=mot;}
      if(!v.updatedAt) v.updatedAt=new Date().toISOString();
    });
  }
  function dbCounts(data){data=data||window.db||{}; const c={}; ['vehicles','sales','vehicleExpenses','showroomExpenses','complaints','leads','pipelineTasks','users','audit'].forEach(k=>c[k]=Array.isArray(data[k])?data[k].length:0); return c;}
  function backupHealth(){
    const last=localStorage.getItem('starcars_smart_last_backup')||''; const age=last?daysBetween(String(last).slice(0,10),isoToday()):9999; const json=JSON.stringify(window.db||{}); const size=Math.round(json.length/1024); const vehicles=arr('vehicles'); const motMissing=vehicles.filter(v=>!v.motExpiry&&!v.lastMotExpiry).length; const c=dbCounts(); return {last,age,size,motMissing,c};
  }

  function mergeIncoming(incoming){

    Object.keys(incoming||{}).forEach(function(k){const val=incoming[k]; if(k==='audit'){db.audit=Array.isArray(val)?val.slice():(db.audit||[]); return;} if(Array.isArray(val)){const local=Array.isArray(db[k])?db[k]:[]; const byId=Object.create(null); const noId=[]; local.forEach(function(item){if(item&&item.id)byId[item.id]=item; else noId.push(item);}); val.forEach(function(item){if(item&&item.id){const existing=byId[item.id]; if(existing && (k==='vehicles')){const merged=Object.assign({},existing,item); const mot=merged.motExpiry||merged.lastMotExpiry||existing.motExpiry||existing.lastMotExpiry||item.motExpiry||item.lastMotExpiry; if(mot){merged.motExpiry=mot; merged.lastMotExpiry=mot;} byId[item.id]=merged;} else byId[item.id]=item;} else noId.push(item);}); db[k]=noId.concat(Object.values(byId)); return;} if(val&&typeof val==='object') db[k]=Object.assign({},db[k]||{},val); else db[k]=val;});

toreMerge()">Apply Previewed Merge</button><div id="smart_restore_preview" style="margin-top:10px" class="small">No backup previewed yet.</div></div></div><div class="card"><div class="card-head"><h3>Current Data Counts</h3></div><div class="tableWrap"><table class="table compact"><thead><tr><th>Section</th><th class="right">Records</th></tr></thead><tbody>'+counts+'</tbody></table></div></div>';
    return wrap;

  const css=document.createElement('style'); css.textContent=`
    .dmsV8KpiGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:12px 0 14px}.dmsV8Kpi{border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:14px;background:radial-gradient(700px 180px at 10% 0%,rgba(90,176,255,.13),transparent 60%),rgba(255,255,255,.035);box-shadow:0 14px 40px rgba(0,0,0,.25)}.dmsV8Kpi .lbl{font-size:12px;color:var(--mut);font-weight:900}.dmsV8Kpi .val{font-size:25px;font-weight:950;margin:5px 0}.dmsV8Kpi .sub{font-size:12px;color:var(--mut)}.dmsV8Kpi.good{border-color:rgba(46,204,113,.35)}.dmsV8Kpi.warn{border-color:rgba(255,196,87,.45)}.dmsV8Kpi.bad{border-color:rgba(255,107,107,.45)}.buyGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.buyTile{border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:12px;background:rgba(255,255,255,.035);display:flex;flex-direction:column;gap:5px}.buyTile b{font-size:14px}.buyTile span,.buyTile em{font-size:12px;color:var(--mut)}.buyTile.good{border-color:rgba(46,204,113,.35)}.buyTile.warn{border-color:rgba(255,196,87,.40)}.buyTile.bad{border-color:rgba(255,107,107,.40)}.backupActions{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}.backupRule,.backupPreview{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);border-radius:14px;padding:10px;margin-top:8px}`;
  document.head.appendChild(css);

  ensureTabs();

          const who=document.getElementById('who'); if(who && typeof session!=='undefined' && session) who.textContent='Logged in: '+session.username+' ('+session.role+')';

          try{ if(typeof renderAlertBell==='function') renderAlertBell(); }catch(e){}
          return;

  }
  const prevDash=window.viewDashboard;
  if(typeof prevDash==='function'){
    window.viewDashboard=function(){const w=prevDash.apply(this,arguments); try{const h=backupHealth(); const s=intelligenceSummary(); const p=document.createElement('div'); p.className='card flat'; p.innerHTML='<div class="card-head"><div><h3>DMS Intelligence & Backup</h3><div class="card-sub">Buying suggestions and backup safety status.</div></div><div><button class="primary" onclick="currentTab=\''+BUY_TAB+'\';render();">Stock Intelligence</button> <button onclick="currentTab=\''+BACKUP_TAB+'\';render();">Smart Backup</button></div></div><div class="dmsV8KpiGrid"><div class="dmsV8Kpi"><div class="lbl">Best Buy Groups</div><div class="val">'+s.best.length+'</div><div class="sub">Based on your sold stock</div></div><div class="dmsV8Kpi '+(s.losers?'warn':'good')+'"><div class="lbl">Loss Deals</div><div class="val">'+s.losers+'</div><div class="sub">Buying risk to review</div></div><div class="dmsV8Kpi '+(h.age===9999||h.age>2?'bad':h.age>0?'warn':'good')+'"><div class="lbl">Backup</div><div class="val">'+(h.age===9999?'Never':h.age+'d')+'</div><div class="sub">Days since smart backup</div></div><div class="dmsV8Kpi '+(h.motMissing?'warn':'good')+'"><div class="lbl">MOT Missing</div><div class="val">'+h.motMissing+'</div><div class="sub">Records to check</div></div></div>'; w.insertBefore(p,w.firstChild);}catch(e){} return w;};

<!-- v9 Customer AI Live Sync FIXED -->
<script>

(function(){
  if(window.__starcars_v9_customer_ai_sync__) return;
  window.__starcars_v9_customer_ai_sync__ = true;

  const TAB_CUSTOMER = 'Customer Hub';
  const TAB_PERFORMANCE = 'Performance AI';
  const TAB_SYNC = 'Live Sync';

  function safeArr(k){ window.db = window.db || {}; if(!Array.isArray(db[k])) db[k] = []; return db[k]; }
  function money(n){ n = Number(n||0); const s=n<0?'-':''; n=Math.abs(n); return s+'£'+n.toFixed(2); }
  function txt(v){ return String(v==null?'':v).trim(); }
  function low(v){ return txt(v).toLowerCase(); }
  function esc(s){
    if(typeof window.escapeHtml === 'function') return window.escapeHtml(s);
    return String(s==null?'':s).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  }
  function dmy(d){ return (typeof window.ddmmyyyy === 'function') ? window.ddmmyyyy(d) : txt(d); }
  function daysBetween(a,b){
    if(!a) return 0;
    const da = new Date(String(a).slice(0,10));
    const dbb = b ? new Date(String(b).slice(0,10)) : new Date();
    if(isNaN(da)) return 0;
    return Math.max(0, Math.round((dbb-da)/(1000*60*60*24)));
  }
  function vehicleById(id){ return safeArr('vehicles').find(v=>v.id===id) || {}; }
  function vehicleRegFromSale(s){ const v=vehicleById(s.vehicleId); return txt(v.reg || s.reg || s.vehicleReg || ''); }
  function vehicleNameFromSale(s){ const v=vehicleById(s.vehicleId); return txt(v.makeModel || v.model || v.vehicle || s.vehicle || s.car || ''); }
  function saleProfit(s){
    const v = vehicleById(s.vehicleId);
    const sale = Number(s.salePrice || s.price || 0);
    const purchase = Number(v.purchasePrice || v.cost || v.purchase || s.purchasePrice || 0);
    const expenses = safeArr('vehicleExpenses').filter(e=>e.vehicleId===s.vehicleId || (txt(e.reg).toUpperCase() && txt(e.reg).toUpperCase()===txt(v.reg).toUpperCase())).reduce((t,e)=>t+Number(e.amount||0),0);
    const warranty = Number(s.warrantyCost || s.warranty || 0);
    return sale - purchase - expenses - warranty;
  }
  function completedSales(){
    return safeArr('sales').filter(s=>{
      const st = low(s.saleStatus || s.status || 'completed');
      return ['completed','complete','sold',''].includes(st);
    });
  }
  function customerKey(name, phone, email){
    const e=low(email); if(e) return 'e:'+e;
    const p=txt(phone).replace(/\D/g,''); if(p) return 'p:'+p;
    return 'n:'+low(name);
  }
  function buildCustomers(){
    const map = {};
    function get(name, phone, email){
      name = txt(name || 'Unknown customer'); phone = txt(phone); email = txt(email);
      const k = customerKey(name,phone,email);
      if(!map[k]) map[k] = {key:k,name,phone,email,sales:[],complaints:[],leads:[],messages:[],totalSpend:0,totalProfit:0};
      if(!map[k].name || map[k].name==='Unknown customer') map[k].name=name;
      if(!map[k].phone) map[k].phone=phone;
      if(!map[k].email) map[k].email=email;
      return map[k];
    }
    completedSales().forEach(s=>{
      const c = get(s.buyer || s.customer || s.customerName, s.phone || s.buyerPhone || s.customerPhone, s.email || s.buyerEmail || s.customerEmail);
      c.sales.push(s); c.totalSpend += Number(s.salePrice||0); c.totalProfit += saleProfit(s);
    });
    safeArr('complaints').forEach(cmp=>{
      const c = get(cmp.customer || cmp.name || cmp.buyer, cmp.phone, cmp.email);
      c.complaints.push(cmp);
    });
    safeArr('leads').concat(safeArr('pipeline')).forEach(l=>{
      const c = get(l.customer || l.name || l.buyer, l.phone, l.email);
      c.leads.push(l);
    });
    safeArr('customerMessages').forEach(m=>{
      const c = get(m.customer || m.name, m.phone, m.email);
      c.messages.push(m);
    });
    return Object.values(map).sort((a,b)=>b.totalSpend-a.totalSpend || a.name.localeCompare(b.name));
  }

  function ensureTabs(){
    [TAB_CUSTOMER,TAB_PERFORMANCE,TAB_SYNC].forEach((t,idx)=>{
      try{ if(typeof DEFAULT_TABS !== 'undefined' && !DEFAULT_TABS.includes(t)) DEFAULT_TABS.splice(Math.min(3+idx,DEFAULT_TABS.length),0,t); }catch(_){ }
      try{ if(typeof TABS !== 'undefined' && !TABS.includes(t)) TABS.splice(Math.min(3+idx,TABS.length),0,t); }catch(_){ }
    });
    try{ safeArr('users').forEach(u=>{u.perms=u.perms||{}; u.perms.tabs=u.perms.tabs||{}; [TAB_CUSTOMER,TAB_PERFORMANCE,TAB_SYNC].forEach(t=>u.perms.tabs[t]=true);}); }catch(_){ }
  }

  function copyText(text){
    try{ navigator.clipboard && navigator.clipboard.writeText(text); if(window.scAlert) scAlert('Copied to clipboard','Copied'); else alert('Copied'); }
    catch(e){ prompt('Copy this text:', text); }
  }

  const msgTemplates = {
    enquiry: 'Hi {name}, thank you for your enquiry with Star Cars London. Please let us know when you would like to view the vehicle. Kind regards, Star Cars London.',
    viewing: 'Hi {name}, this is a reminder of your viewing appointment with Star Cars London. Please bring your driving licence if you wish to test drive. Kind regards, Star Cars London.',
    ready: 'Hi {name}, your vehicle is ready for collection. Please contact us to arrange a suitable collection time. Kind regards, Star Cars London.',
    finance: 'Hi {name}, we are checking the finance update for you and will come back to you as soon as we have confirmation. Kind regards, Star Cars London.',
    mot: 'Hi {name}, our records show your MOT may be due soon. Please check the MOT expiry date and arrange renewal in good time. Kind regards, Star Cars London.',
    complaint: 'Dear {name}, thank you for contacting us. We have logged your concern and will review the matter. Please note any inspection/repair must be authorised by us in writing before third-party costs are incurred. Kind regards, Star Cars London.'
  };
  function applyTemplate(tpl, c){ return String(tpl||'').replace(/\{name\}/g, c.name || 'Customer').replace(/\{phone\}/g, c.phone||'').replace(/\{email\}/g, c.email||''); }

  function renderCustomerHub(){
    const wrap=document.createElement('div'); wrap.className='card';
    const customers = buildCustomers();
    const totalCustomers = customers.length;
    const repeat = customers.filter(c=>c.sales.length>1).length;
    const openComplaints = customers.reduce((t,c)=>t+c.complaints.filter(x=>!['closed','resolved','sorted'].includes(low(x.status))).length,0);
    const followups = customers.reduce((t,c)=>t+c.leads.filter(x=>low(x.status).includes('follow') || txt(x.nextFollowUp || x.followUpDate)).length,0);
    wrap.innerHTML = `
      <style>
        .v9grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:12px 0}.v9kpi{padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04)}.v9big{font-size:28px;font-weight:950}.v9split{display:grid;grid-template-columns:360px 1fr;gap:12px}.v9list{max-height:640px;overflow:auto}.v9cust{padding:10px;border:1px solid rgba(255,255,255,.10);border-radius:14px;margin-bottom:8px;cursor:pointer;background:rgba(255,255,255,.025)}.v9cust:hover,.v9cust.active{border-color:rgba(90,176,255,.45);background:rgba(90,176,255,.08)}.v9chat{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto}.v9bubble{padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04)}.v9pill{display:inline-block;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px 8px;font-size:12px;color:var(--mut);margin:2px}.v9profileGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}@media(max-width:900px){.v9split{grid-template-columns:1fr}}
      </style>
      <div class="pageTitle">Customer Hub</div><div class="pageSub">Customer profile, communication log and WhatsApp/SMS style templates.</div>
      <div class="v9grid"><div class="v9kpi"><div class="kpiLabel">Customers</div><div class="v9big">${totalCustomers}</div></div><div class="v9kpi"><div class="kpiLabel">Repeat Customers</div><div class="v9big">${repeat}</div></div><div class="v9kpi"><div class="kpiLabel">Open Complaint Links</div><div class="v9big">${openComplaints}</div></div><div class="v9kpi"><div class="kpiLabel">Follow-ups</div><div class="v9big">${followups}</div></div></div>
      <div class="row" style="margin-bottom:10px"><input id="v9_customer_search" placeholder="Search customer / phone / email / reg" style="flex:1;min-width:280px"><button id="v9_customer_export">Export Customers CSV</button></div>
      <div class="v9split"><div class="v9list" id="v9_customer_list"></div><div id="v9_customer_detail" class="card flat">Select a customer to view full profile.</div></div>`;

    function renderList(){
      const q = low(wrap.querySelector('#v9_customer_search').value);
      const list = wrap.querySelector('#v9_customer_list');
      const rows = customers.filter(c=>{
        const hay = [c.name,c.phone,c.email,...c.sales.map(vehicleRegFromSale),...c.leads.map(l=>l.reg||l.vehicle||''),...c.complaints.map(x=>x.reg||x.vehicle||'')].join(' ').toLowerCase();
        return !q || hay.includes(q);
      });
      list.innerHTML = rows.map((c,i)=>`<div class="v9cust" data-key="${esc(c.key)}"><b>${esc(c.name)}</b><div class="small">${esc(c.phone||'No phone')} ${c.email?' • '+esc(c.email):''}</div><div><span class="v9pill">Sales ${c.sales.length}</span><span class="v9pill">Leads ${c.leads.length}</span><span class="v9pill">Complaints ${c.complaints.length}</span><span class="v9pill">Spend ${money(c.totalSpend)}</span></div></div>`).join('') || '<div class="small">No customers found.</div>';
      list.querySelectorAll('.v9cust').forEach(el=>el.onclick=()=>showCustomer(el.dataset.key));
      if(rows[0]) showCustomer(rows[0].key);
    }
    function showCustomer(key){
      wrap.querySelectorAll('.v9cust').forEach(x=>x.classList.toggle('active', x.dataset.key===key));
      const c = customers.find(x=>x.key===key); if(!c) return;
      const salesRows = c.sales.map(s=>`<tr><td>${dmy(s.date)}</td><td>${esc(vehicleRegFromSale(s))}</td><td>${esc(vehicleNameFromSale(s))}</td><td class="right">${money(s.salePrice)}</td><td class="right">${money(saleProfit(s))}</td></tr>`).join('') || '<tr><td colspan="5" class="small">No sales.</td></tr>';
      const complaintRows = c.complaints.map(x=>`<tr><td>${dmy(x.date||x.createdAt)}</td><td>${esc(x.reg||x.vehicle||'')}</td><td>${esc(x.status||'Open')}</td><td>${esc(x.summary||x.issue||x.notes||'')}</td></tr>`).join('') || '<tr><td colspan="4" class="small">No complaints.</td></tr>';
      const leadRows = c.leads.map(x=>`<tr><td>${dmy(x.date||x.createdAt)}</td><td>${esc(x.reg||x.vehicle||'')}</td><td>${esc(x.stage||x.status||'Lead')}</td><td>${dmy(x.nextFollowUp||x.followUpDate)}</td></tr>`).join('') || '<tr><td colspan="4" class="small">No leads.</td></tr>';
      const messages = c.messages.sort((a,b)=>String(b.date||b.createdAt).localeCompare(String(a.date||a.createdAt))).map(m=>`<div class="v9bubble"><b>${esc(m.type||'Message')}</b> <span class="small">${dmy(m.date||m.createdAt)}</span><div>${esc(m.body||m.message||'')}</div></div>`).join('') || '<div class="small">No message log yet.</div>';
      wrap.querySelector('#v9_customer_detail').innerHTML = `
        <div class="card-head"><div><h3>${esc(c.name)}</h3><div class="card-sub">${esc(c.phone||'No phone')} ${c.email?' • '+esc(c.email):''}</div></div><button class="primary" id="v9_print_customer">Print Profile</button></div>
        <div class="v9profileGrid"><div class="v9kpi"><div class="kpiLabel">Total Spend</div><div class="v9big">${money(c.totalSpend)}</div></div><div class="v9kpi"><div class="kpiLabel">Estimated Profit</div><div class="v9big">${money(c.totalProfit)}</div></div><div class="v9kpi"><div class="kpiLabel">Vehicles Bought</div><div class="v9big">${c.sales.length}</div></div></div>
        <div class="section-title">Quick Message Templates</div><div class="row"><select id="v9_msg_tpl">${Object.keys(msgTemplates).map(k=>`<option value="${k}">${k}</option>`).join('')}</select><button id="v9_msg_copy">Copy Message</button><button id="v9_msg_log">Log Message</button></div><textarea id="v9_msg_body" style="width:100%;margin-top:8px">${esc(applyTemplate(msgTemplates.enquiry,c))}</textarea>
        <div class="grid2" style="margin-top:12px"><div><div class="section-title">Message Log</div><div class="v9chat">${messages}</div></div><div><div class="section-title">Lead / Follow-up History</div><div class="tableWrap"><table class="table compact"><thead><tr><th>Date</th><th>Vehicle</th><th>Stage</th><th>Next</th></tr></thead><tbody>${leadRows}</tbody></table></div></div></div>
        <div class="section-title">Sales History</div><div class="tableWrap"><table class="table compact"><thead><tr><th>Date</th><th>Reg</th><th>Vehicle</th><th class="right">Sale</th><th class="right">Profit</th></tr></thead><tbody>${salesRows}</tbody></table></div>
        <div class="section-title">Complaints / Warranty Link</div><div class="tableWrap"><table class="table compact"><thead><tr><th>Date</th><th>Reg</th><th>Status</th><th>Issue</th></tr></thead><tbody>${complaintRows}</tbody></table></div>`;
      const tpl = wrap.querySelector('#v9_msg_tpl'), body = wrap.querySelector('#v9_msg_body');
      tpl.onchange=()=>body.value=applyTemplate(msgTemplates[tpl.value],c);
      wrap.querySelector('#v9_msg_copy').onclick=()=>copyText(body.value);
      wrap.querySelector('#v9_msg_log').onclick=()=>{ safeArr('customerMessages').push({id:(window.uid?uid():Date.now()+''),date:new Date().toISOString().slice(0,10),customer:c.name,phone:c.phone,email:c.email,type:tpl.value,body:body.value}); if(window.saveDB) saveDB(); if(window.scAlert) scAlert('Message logged','Customer Hub'); else alert('Message logged'); renderList(); };
      wrap.querySelector('#v9_print_customer').onclick=()=>window.print();
    }
    wrap.querySelector('#v9_customer_search').oninput=renderList;
    wrap.querySelector('#v9_customer_export').onclick=()=>{
      const csv = ['Name,Phone,Email,Sales,Leads,Complaints,Total Spend,Estimated Profit'].concat(customers.map(c=>[c.name,c.phone,c.email,c.sales.length,c.leads.length,c.complaints.length,c.totalSpend.toFixed(2),c.totalProfit.toFixed(2)].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))).join('\n');
      const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='starcars_customer_hub_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
    };
    renderList();
    return wrap;
  }

  function renderPerformanceAI(){
    const wrap=document.createElement('div'); wrap.className='card';
    const sales = completedSales();
    const totalProfit = sales.reduce((t,s)=>t+saleProfit(s),0);
    const avgProfit = sales.length ? totalProfit/sales.length : 0;
    const avgDays = sales.length ? sales.reduce((t,s)=>{ const v=vehicleById(s.vehicleId); return t+daysBetween(v.dateIn||v.purchaseDate||v.createdAt, s.date); },0)/sales.length : 0;
    function group(keyFn){
      const m={}; sales.forEach(s=>{ const key=keyFn(s)||'Unknown'; const v=vehicleById(s.vehicleId); if(!m[key]) m[key]={name:key,count:0,profit:0,days:0,sales:0}; m[key].count++; m[key].profit+=saleProfit(s); m[key].sales+=Number(s.salePrice||0); m[key].days+=daysBetween(v.dateIn||v.purchaseDate||v.createdAt, s.date); });
      return Object.values(m).map(x=>Object.assign(x,{avgProfit:x.count?x.profit/x.count:0,avgDays:x.count?x.days/x.count:0})).sort((a,b)=>b.avgProfit-a.avgProfit);
    }
    const byBand = group(s=>{ const p=Number(s.salePrice||0); if(p<4000) return 'Under £4k'; if(p<7000) return '£4k - £7k'; if(p<10000) return '£7k - £10k'; if(p<15000) return '£10k - £15k'; return '£15k+'; });
    const byFuel = group(s=>vehicleById(s.vehicleId).fuel || s.fuel || 'Unknown');
    const byModel = group(s=>{ const v=vehicleById(s.vehicleId); return (v.makeModel || v.model || s.vehicle || 'Unknown').split(' ').slice(0,3).join(' '); });
    const byMonth = group(s=>String(s.date||'').slice(0,7));

/* ===== v12: Automatic Month Close Repost for Unwind / Refund =====
   Keeps the original sale month directors/investors profit corrected when a later refund is processed. */
(function(){
  if (window.__starcars_v12_auto_repost__) return;
  window.__starcars_v12_auto_repost__ = true;

  function v12Norm(s){ return String(s || '').trim().toLowerCase(); }
  function v12Ym(d){ return String(d || '').slice(0,7); }
  function v12LastDay(k){
    try{ const [y,m]=String(k).split('-').map(Number); return new Date(y, m, 0).toISOString().slice(0,10); }
    catch(_){ return String(k || '') + '-28'; }
  }
  function v12IsRealSale(s){
    if (!s || s.refunded) return false;
    const st = String(s.saleStatus || s.status || 'completed').toLowerCase();
    return ['completed','complete','sold'].includes(st);
  }
  function v12McId(k, kind, a, b, c){
    if (typeof window.mcId === 'function') return window.mcId(k, kind, a, b, c);
    return ['mc', k, kind, a || '', b || '', c || ''].join('_').replace(/[^a-zA-Z0-9_\-]/g,'');
  }
  function v12PurgeMonthClose(k){
    const marker = 'MonthClose ' + k;
    (db.partners || []).forEach(p => {
      p.tx = (p.tx || []).filter(t => !(t.type === 'profit' && String(t.note || '').includes(marker)));
      p.balance = (p.tx || []).reduce((bal,x)=> bal + ((x.type==='invest'||x.type==='profit') ? +x.amount : -x.amount), 0);
    });
    (db.investors || []).forEach(inv => {
      inv.tx = (inv.tx || []).filter(t => !(t.type === 'fund_in' && String(t.note || '').includes(marker)));
      inv.balance = (inv.tx || []).reduce((bal,x)=> bal + ((x.type==='fund_in') ? +x.amount : -x.amount), 0);
    });
    db.showroomExpenses = (db.showroomExpenses || []).filter(e => {
      if (v12Ym(e.date) !== k) return true;
      const t = String(e.type || '');
      return !(t.includes('Mgmt flat £175') || t.includes('Mgmt 20%'));
    });
  }
  function v12CalcMonthClose(k){
    const showroomMonthTotal = (db.showroomExpenses || []).filter(e => v12Ym(e.date) === k).reduce((t,e)=>t + Number(e.amount || 0),0);
    const sold = (db.sales || []).filter(s => v12Ym(s.date) === k && v12IsRealSale(s));
    const items = sold.map(s => {
      const v = (db.vehicles || []).find(x => x.id === s.vehicleId) || {};
      const liveVehicleExp = (db.vehicleExpenses || []).filter(e => e.vehicleId === s.vehicleId).reduce((t,x)=>t + Number(x.amount || 0),0);
      const vehicleCost = Number(v.purchase || 0) + liveVehicleExp;
      const addons = Array.isArray(s.addons) ? s.addons : [];
      const addonsSell = addons.reduce((t,x)=>t + Number((x && x.sellAmount) || 0),0);
      const addonsCost = addons.reduce((t,x)=>t + Number((x && x.costAmount) || 0),0);
      const addonProfit = addonsSell - addonsCost;
      const vehicleProfit = Number(s.salePrice || 0) - vehicleCost;
      const gross = vehicleProfit + addonProfit;
      const isInvestor = (v.ownerType === 'investor' && v.investor);
      const mgmtFlat = (isInvestor && gross > 0) ? 175 : 0;
      const mgmtBase = Math.max(0, gross - mgmtFlat);
      const mgmtPct = (isInvestor && gross > 0) ? (0.20 * mgmtBase) : 0;
      let investorShare = 0;
      let afterInvestor = gross;
      if (isInvestor && gross > 0) {
        const baseAfterFees = Math.max(0, gross - mgmtFlat - mgmtPct);
        investorShare = 0.30 * baseAfterFees;
        afterInvestor = Math.max(0, baseAfterFees - investorShare);
      }
      return {s,v,vehicleCost,vehicleProfit,addonProfit,gross,mgmtFlat,mgmtPct,investorShare,afterInvestor,isInvestor,investorName:v.investor || ''};
    });
    const postExp = (db.vehicleExpenses || []).filter(e => v12Ym(e.date) === k).map(e => {
      const v = (db.vehicles || []).find(x => x.id === e.vehicleId);
      if (!v) return null;
      const s = (db.sales || []).find(s0 => s0.vehicleId === e.vehicleId && v12IsRealSale(s0));
      if (!s) return null;
      if (v12Ym(s.date) >= k) return null;
      return {e,v,amount:Number(e.amount || 0)};
    }).filter(Boolean);
    const postExpTotal = postExp.reduce((t,x)=>t + x.amount,0);
    const remainderBeforeShowroom = items.reduce((t,x)=>t + x.afterInvestor,0) - postExpTotal;
    const remainder = remainderBeforeShowroom - showroomMonthTotal;
    const directorsUnique = (db.partners || [])
      .filter(p => v12Norm(p && p.name))
      .filter((p,i,arr)=> arr.findIndex(x => v12Norm(x.name) === v12Norm(p.name)) === i);
    const directorCount = Math.max(1, directorsUnique.length);
    const directorEach = remainder / directorCount;
    return {items,postExp,postExpTotal,showroomMonthTotal,remainderBeforeShowroom,remainder,directorEach,directorHalf:directorEach,directorCount};
  }
  window.starCarsAutoRepostMonthClose = function(monthKey, meta){
    const k = String(monthKey || '').slice(0,7);
    if (!k) return {ok:false, error:'No month supplied'};
    try{
      v12PurgeMonthClose(k);
      const c = v12CalcMonthClose(k);
      c.items.forEach(x => {
        if (x.isInvestor && x.gross > 0) {
          db.showroomExpenses.unshift({id:v12McId(k,'showroom_flat175',x.v.reg,'',''), date:v12LastDay(k), type:'Mgmt flat £175', method:'bank', amount:-175, note:(x.v.reg || '')});
          const pct = +(x.mgmtPct || 0);
          if (pct > 0) db.showroomExpenses.unshift({id:v12McId(k,'showroom_20pct',x.v.reg,'',''), date:v12LastDay(k), type:'Mgmt 20% (investor car)', method:'bank', amount:-pct, note:(x.v.reg || '')});
        }
      });
      const byInvestor = {};
      c.items.forEach(x => {
        if (x.isInvestor && x.investorShare > 0 && x.gross > 0) byInvestor[x.investorName] = (byInvestor[x.investorName] || 0) + x.investorShare;
      });
      Object.keys(byInvestor).forEach(name => {
        let inv = (db.investors || []).find(i => i.name === name);
        if (!inv) { inv = {id:uid(), name, balance:0, tx:[]}; (db.investors = db.investors || []).push(inv); }
        const amt = byInvestor[name];
        inv.tx = inv.tx || [];
        inv.tx.unshift({id:v12McId(k,'investor_30pct',inv.id,'',''), date:v12LastDay(k), type:'fund_in', method:'bank', amount:amt, note:'MonthClose ' + k});
        inv.balance = (inv.tx || []).reduce((bal,x)=> bal + ((x.type==='fund_in') ? +x.amount : -x.amount), 0);
      });
      const marker = 'MonthClose ' + k;
      const directorsUnique = (db.partners || [])
        .filter(p => v12Norm(p && p.name))
        .filter((p,i,arr)=> arr.findIndex(x => v12Norm(x.name) === v12Norm(p.name)) === i);
      directorsUnique.forEach(p => {
        const amt = Number(c.directorEach || 0);
        p.tx = p.tx || [];
        p.tx.unshift({id:v12McId(k,'director_profit',p.id,'',''), date:v12LastDay(k), type:'profit', method:'bank', amount:amt, note:marker});
        p.balance = (p.tx || []).reduce((bal,x)=> bal + ((x.type==='invest'||x.type==='profit') ? +x.amount : -x.amount), 0);
      });
      if (db._monthCloseDirty) delete db._monthCloseDirty[k];
      db._monthCloseAutoRepostLog = db._monthCloseAutoRepostLog || [];
      db._monthCloseAutoRepostLog.unshift({id:uid(), month:k, at:new Date().toISOString(), reason:(meta && meta.reason) || 'Auto repost', saleId:(meta && meta.saleId) || '', invNo:(meta && meta.invNo) || '', refundDate:(meta && meta.refundDate) || '', directorEach:c.directorEach, remainder:c.remainder});
      saveDB();
      try{ if(typeof renderAlertBell === 'function') renderAlertBell(); }catch(_){ }
      try{ if(typeof addAudit === 'function') addAudit('monthClose','reports','autoRepost','Auto repost ' + k + ((meta && meta.invNo) ? (' Inv ' + meta.invNo) : '')); }catch(_){ }
      return {ok:true, month:k, directorEach:c.directorEach, remainder:c.remainder};
    }catch(e){
      console.error('Auto month close repost failed', e);
      return {ok:false, month:k, error:e && e.message ? e.message : String(e)};
    }
  };
})();
</script>


<script id="starcars_user_requested_cleanup_v1">
(function(){
  if(window.__starcars_user_requested_cleanup_v1__) return;
  window.__starcars_user_requested_cleanup_v1__ = true;
  const PIPE_TAB = 'Pipeline';
  function removeFromArray(name){
    try{
      const arr = window[name];
      if(Array.isArray(arr)){
        for(let i=arr.length-1;i>=0;i--) if(String(arr[i])===PIPE_TAB) arr.splice(i,1);
      }
    }catch(_){ }
  }
  function cleanupPipelinePerms(){
    try{
      removeFromArray('TABS'); removeFromArray('DEFAULT_TABS');
      if(window.db && Array.isArray(db.users)) db.users.forEach(u=>{ if(u && u.perms && u.perms.tabs) delete u.perms.tabs[PIPE_TAB]; });
    }catch(_){ }
  }
  cleanupPipelinePerms();

  function removeCardsByText(root, text){
    try{
      if(!root) return;
      const nodes = Array.from(root.querySelectorAll('.card,.card.flat,.reportCard,details,div'));
      nodes.forEach(el=>{
        if(el && el.textContent && el.textContent.indexOf(text) !== -1){

          [search,debtors,history,summary,proforma].forEach(el=>{ if(el) el.style.display = hide ? 'none' : ''; });
        }
        w.addEventListener('click', function(e){
          if(e.target && (e.target.closest('#sales_next') || e.target.closest('#sales_prev') || e.target.closest('#sales_next_from_vehicle') || e.target.closest('#sales_mode_easy') || e.target.closest('#sales_mode_full') || e.target.closest('[data-pill]'))){
            setTimeout(focusWizard, 0);
          }
        }, true);
        setTimeout(focusWizard, 0);
      }catch(e){ console.warn('Sales cleanup failed', e); }
      return w;
    };
  }

  if(typeof window.viewDashboard === 'function'){
    const oldDash = window.viewDashboard;
    window.viewDashboard = function(){
      cleanupPipelinePerms();
      const w = oldDash.apply(this, arguments);
      try{ removeCardsByText(w, 'Sales Pipeline'); removeCardsByText(w, 'Pipeline Control Centre'); }catch(_){ }
      return w;
    };
  }

  if(typeof window.getDMSAlerts === 'function'){
    const oldAlerts = window.getDMSAlerts;
    window.getDMSAlerts = function(){
      const list = oldAlerts.apply(this, arguments) || [];
      return list.filter(a => String(a && a.category || '').indexOf('Pipeline') < 0 && String(a && a.actionTab || '').indexOf('Pipeline') < 0);
    };
  }

  if(typeof window.viewAlertCentre === 'function'){
    const oldAlertCentre = window.viewAlertCentre;
    window.viewAlertCentre = function(){
      const w = oldAlertCentre.apply(this, arguments);
      try{
        const sel = w.querySelector('select');
        if(sel){ Array.from(sel.options).forEach(o=>{ if(String(o.value).indexOf('Pipeline')>=0 || String(o.text).indexOf('Pipeline')>=0) o.remove(); }); }
        w.innerHTML = w.innerHTML.replace(/ and pipeline follow-ups/g,'').replace(/<div class="alertRule"><b>Pipeline<\/b><span>Overdue lead follow-ups and tasks\.<\/span><\/div>/g,'');
      }catch(_){ }
      return w;
    };
  }

  const oldRender = window.render;
  if(typeof oldRender === 'function'){
    window.render = function(){
      cleanupPipelinePerms();
      try{ if(typeof currentTab !== 'undefined' && currentTab === PIPE_TAB) currentTab = 'Dashboard'; }catch(_){ }
      const out = oldRender.apply(this, arguments);
      try{ cleanupPipelinePerms(); }catch(_){ }

<script>
(function(){
  function e(v){ return (typeof esc === 'function') ? esc(v) : String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  window.setAlertFilter = function(filter){
    var sel = document.getElementById('alert_filter_safe');
    if(sel) sel.value = filter || 'all';
    renderAlertListClickable(filter || 'all');
  };

  window.renderAlertListClickable = function(filter){
    var list = document.getElementById('alert_list');
    if(!list || typeof getDMSAlerts !== 'function') return;

    var alerts = getDMSAlerts();
    filter = filter || 'all';

    var shown = alerts.filter(function(a){
      if(filter === 'all') return true;
      if(filter === 'critical' || filter === 'warning') return String(a.severity).toLowerCase() === filter;
      return String(a.category || '').toLowerCase() === String(filter).toLowerCase();
    });

    document.querySelectorAll('.alertKpi').forEach(x => x.classList.remove('active'));
    var active = document.querySelector('.alertKpi[data-filter="'+filter+'"]');
    if(active) active.classList.add('active');

    list.innerHTML = shown.length ? shown.map(function(a){
      return `
        <div class="alertItem">
          <div class="alertTop">
            <div>
              <div class="alertTitle">${e(a.title)}</div>
              <div>${e(a.message)}</div>
              <div class="alertMeta">${e(a.category)} • ${e(a.severity)} • ${e(a.meta || '')}</div>
            </div>
            <span class="badge">${e(a.category)}</span>
          </div>
          <div class="alertActions">
            <button class="small primary" onclick="openAlertAction('${e(a.actionTab || 'Vehicles')}')">Open ${e(a.actionTab || 'Vehicles')}</button>
          </div>
        </div>`;
    }).join('') : '<div class="card flat">No alerts found for this filter.</div>';
  };

  window.viewAlertCentre = function(){
    var wrap = document.createElement('div');
    wrap.className = 'card';

    var s = getDMSAlertSummary();
    wrap.innerHTML = `
      <div class="pageTitle">Smart Alert Centre</div>
      <div class="pageSub">Click any box below to view the matching alert data.</div>

      <div class="alertCentreGrid">
        <div class="alertKpi ${s.critical.length ? 'critical' : ''}" data-filter="critical" onclick="setAlertFilter('critical')">
          <div class="lbl">Critical</div><div class="val">${s.critical.length}</div><div class="sub">Immediate action</div>
        </div>

        <div class="alertKpi ${s.warning.length ? 'warning' : ''}" data-filter="warning" onclick="setAlertFilter('warning')">
          <div class="lbl">Warnings</div><div class="val">${s.warning.length}</div><div class="sub">Review soon</div>
        </div>

        <div class="alertKpi" data-filter="MOT" onclick="setAlertFilter('MOT')">
          <div class="lbl">MOT</div><div class="val">${s.mot.length}</div><div class="sub">Expired / due / missing</div>
        </div>

        <div class="alertKpi" data-filter="Finance" onclick="setAlertFilter('Finance')">
          <div class="lbl">Finance</div><div class="val">${s.finance.length}</div><div class="sub">Payout chasing</div>
        </div>

        <div class="alertKpi" data-filter="Complaint" onclick="setAlertFilter('Complaint')">
          <div class="lbl">Complaints</div><div class="val">${s.complaints.length}</div><div class="sub">Risk / follow-up</div>
        </div>

        <div class="alertKpi" data-filter="all" onclick="setAlertFilter('all')">
          <div class="lbl">All Alerts</div><div class="val">${s.all.length}</div><div class="sub">Everything</div>
        </div>
      </div>

      <div class="alertToolbar">
        <select id="alert_filter_safe" onchange="setAlertFilter(this.value)">
          <option value="all">All alerts</option>
          <option value="critical">Critical only</option>
          <option value="warning">Warnings only</option>
          <option value="MOT">MOT</option>
          <option value="Finance">Finance</option>
          <option value="Complaint">Complaints</option>
          <option value="Pipeline">Pipeline</option>
          <option value="Stock Ageing">Stock ageing</option>
          <option value="Prep">Prep/workshop</option>
          <option value="Missing Data">Missing data</option>
        </select>
        <button onclick="exportAlertsCSV()">Export CSV</button>
        <button onclick="printAlertPack()">Print Alert Pack</button>
      </div>

      <div id="alert_list" class="alertList"></div>
    `;

    setTimeout(function(){ setAlertFilter('all'); }, 0);
    return wrap;
  };
})();

/* ===== CLICKABLE DASHBOARD SYSTEM HEALTH TAGS ===== */
(function(){
  if(window.__clickable_dashboard_health__) return;
  window.__clickable_dashboard_health__ = true;

  window.openHealthResult = function(type){
    if(type === 'mot'){
      currentTab = 'Vehicles';
      render();
      setTimeout(()=>alert('Showing Vehicles. Check MOT due/expired vehicles.'), 100);
      return;
    }

    if(type === 'finance'){
      currentTab = 'Sales';
      render();
      setTimeout(()=>alert('Showing Sales. Check finance payout not paid/outstanding.'), 100);
      return;
    }

    if(type === 'complaints'){
      currentTab = 'Complaints';
      render();
      return;
    }

    if(type === 'prep'){
      currentTab = 'Vehicles';
      render();
      setTimeout(()=>alert('Showing Vehicles. Check vehicles not ready for sale/prep.'), 100);
      return;
    }
  };

  const oldViewDashboardHealth = window.viewDashboard;

  window.viewDashboard = function(){
    const wrap = oldViewDashboardHealth();

    setTimeout(()=>{
      const tags = [...wrap.querySelectorAll('.dmsHeroPanel .dmsStatus')];

      tags.forEach(tag=>{
        tag.style.cursor = 'pointer';
        tag.title = 'Click to open results';

        const txt = tag.textContent.toLowerCase();

        if(txt.includes('mot due')){
          tag.onclick = () => openHealthResult('mot');
        }else if(txt.includes('finance payout')){
          tag.onclick = () => openHealthResult('finance');
        }else if(txt.includes('open complaints')){
          tag.onclick = () => openHealthResult('complaints');
        }else if(txt.includes('prep not ready')){
          tag.onclick = () => openHealthResult('prep');
        }
      });
    }, 50);

    return wrap;
  };
})();

</script>

<script>
(function(){
  if(window.__smart_alert_professional_v3__) return;
  window.__smart_alert_professional_v3__ = true;

  function h(v){ return (typeof esc === 'function') ? esc(v) : String(v == null ? '' : v).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }
  function alerts(){ try{ return (typeof getDMSAlerts === 'function' ? getDMSAlerts() : []) || []; }catch(e){ return []; } }
  function summary(){ try{ return (typeof getDMSAlertSummary === 'function' ? getDMSAlertSummary() : {all:alerts(),critical:[],warning:[],mot:[],finance:[],complaints:[]}); }catch(e){ var a=alerts(); return {all:a,critical:a.filter(x=>String(x.severity).toLowerCase()==='critical'),warning:a.filter(x=>String(x.severity).toLowerCase()==='warning'),mot:a.filter(x=>String(x.category)==='MOT'),finance:a.filter(x=>String(x.category)==='Finance'),complaints:a.filter(x=>String(x.category)==='Complaint')}; } }

  window.getSmartAlertFilteredRows = function(){
    var f = (document.getElementById('alert_filter_safe') || {}).value || 'all';
    var sev = (document.getElementById('alert_sev_filter') || {}).value || 'all';
    var q = String((document.getElementById('alert_search_box') || {}).value || '').trim().toLowerCase();
    return alerts().filter(function(a){
      var cat = String(a.category || '');
      var severity = String(a.severity || '').toLowerCase();
      var okCat = f === 'all' || (f === 'critical' || f === 'warning' ? severity === f : cat.toLowerCase() === String(f).toLowerCase());
      var okSev = sev === 'all' || severity === sev;
      var hay = [a.category,a.severity,a.title,a.message,a.meta,a.actionTab].join(' ').toLowerCase();
      return okCat && okSev && (!q || hay.indexOf(q) >= 0);
    });
  };

  window.setAlertFilter = function(filter){
    var sel = document.getElementById('alert_filter_safe');
    if(sel) sel.value = filter || 'all';
    renderAlertListClickable(filter || 'all');
  };

  window.renderAlertListClickable = function(){
    var list = document.getElementById('alert_list');
    if(!list) return;
    var rows = window.getSmartAlertFilteredRows();
    var count = document.getElementById('alert_count');
    if(count) count.textContent = rows.length + ' showing';

    var f = (document.getElementById('alert_filter_safe') || {}).value || 'all';
    document.querySelectorAll('.alertKpi').forEach(function(x){ x.classList.remove('active'); });
    var active = document.querySelector('.alertKpi[data-filter="'+f+'"]');
    if(active) active.classList.add('active');

    if(!rows.length){ list.innerHTML = '<div class="alertEmptyPro"><b>No alerts found for this filter.</b><br><span class="small">Change the filter or clear the search box.</span></div>'; return; }
    list.innerHTML = '<div class="alertTableWrap"><table class="alertProTable"><thead><tr><th>Status</th><th>Category</th><th>Vehicle / Title</th><th>Details</th><th>Due / Meta</th><th>Action</th></tr></thead><tbody>' + rows.map(function(a){
      var sev = String(a.severity || '').toLowerCase();
      var tab = h(a.actionTab || 'Vehicles');
      return '<tr>'+
        '<td><span class="sevPill '+h(sev)+'">'+h(a.severity || '')+'</span></td>'+
        '<td><span class="catPill">'+h(a.category || '')+'</span></td>'+
        '<td><div class="alertProTitle">'+h(a.title || '')+'</div></td>'+
        '<td><div class="alertProMsg">'+h(a.message || '')+'</div></td>'+
        '<td>'+h(a.meta || '')+'</td>'+
        '<td><button class="small primary" onclick="openAlertAction(\''+tab+'\')">Open '+tab+'</button></td>'+
      '</tr>';
    }).join('') + '</tbody></table></div>';
  };

  window.exportAlertsCSV = function(){
    var rows = window.getSmartAlertFilteredRows();
    var headers = ['Severity','Category','Title','Details','Meta','ActionTab'];
    function csvEsc(v){ v = String(v == null ? '' : v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
    var lines = [headers.join(',')].concat(rows.map(function(a){ return [a.severity,a.category,a.title,a.message,a.meta,a.actionTab].map(csvEsc).join(','); }));
    var blob = new Blob([lines.join('\n')], {type:'text/csv'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'smart_alerts_filtered_' + new Date().toISOString().slice(0,10) + '.csv';
    link.click();
  };

  window.printAlertPack = function(){
    var rows = window.getSmartAlertFilteredRows();
    var f = (document.getElementById('alert_filter_safe') || {}).value || 'all';
    var sev = (document.getElementById('alert_sev_filter') || {}).value || 'all';
    var q = (document.getElementById('alert_search_box') || {}).value || '';
    var htmlRows = rows.map(function(a){ return '<tr><td>'+h(a.severity)+'</td><td>'+h(a.category)+'</td><td>'+h(a.title)+'</td><td>'+h(a.message)+'</td><td>'+h(a.meta)+'</td></tr>'; }).join('');
    var w = window.open('', '_blank');
    if(!w){ alert('Popup blocked. Please allow popups to print.'); return; }
    w.document.write('<!doctype html><html><head><title>Smart Alerts - Filtered Print</title><style>body{font-family:Arial,sans-serif;color:#111;margin:24px}h2{margin:0 0 4px}.muted{color:#666;margin-bottom:14px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ccc;padding:7px;text-align:left;vertical-align:top}th{background:#f2f2f2}.badge{display:inline-block;padding:4px 8px;border:1px solid #aaa;border-radius:999px;margin:0 6px 8px 0}@media print{button{display:none}}</style></head><body><h2>Star Cars London Ltd — Smart Alerts</h2><div class="muted">Printed filtered results only</div><div><span class="badge">Category: '+h(f)+'</span><span class="badge">Severity: '+h(sev)+'</span><span class="badge">Search: '+h(q || 'none')+'</span><span class="badge">Rows: '+rows.length+'</span></div><table><thead><tr><th>Status</th><th>Category</th><th>Vehicle / Title</th><th>Details</th><th>Due / Meta</th></tr></thead><tbody>'+(htmlRows || '<tr><td colspan="5">No alerts for this filter.</td></tr>')+'</tbody></table><br><button onclick="window.print()">Print</button></body></html>');
    w.document.close();
    setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 300);
  };

  window.viewAlertCentre = function(){
    var wrap = document.createElement('div');
    wrap.className = 'card';
    var s = summary();
    wrap.innerHTML = '<div class="pageTitle">Smart Alert Centre</div><div class="pageSub">Professional one-line alert table. Filter first, then Print Alert Pack will print only the filtered results.</div>'+
      '<div class="alertCentreGrid">'+
        '<div class="alertKpi '+(s.critical.length?'critical':'')+'" data-filter="critical" onclick="setAlertFilter(\'critical\')"><div class="lbl">Critical</div><div class="val">'+s.critical.length+'</div><div class="sub">Immediate action</div></div>'+
        '<div class="alertKpi '+(s.warning.length?'warning':'')+'" data-filter="warning" onclick="setAlertFilter(\'warning\')"><div class="lbl">Warnings</div><div class="val">'+s.warning.length+'</div><div class="sub">Review soon</div></div>'+
        '<div class="alertKpi" data-filter="MOT" onclick="setAlertFilter(\'MOT\')"><div class="lbl">MOT</div><div class="val">'+(s.mot?s.mot.length:0)+'</div><div class="sub">Expired / due / missing</div></div>'+
        '<div class="alertKpi" data-filter="Finance" onclick="setAlertFilter(\'Finance\')"><div class="lbl">Finance</div><div class="val">'+(s.finance?s.finance.length:0)+'</div><div class="sub">Payout chasing</div></div>'+
        '<div class="alertKpi" data-filter="Complaint" onclick="setAlertFilter(\'Complaint\')"><div class="lbl">Complaints</div><div class="val">'+(s.complaints?s.complaints.length:0)+'</div><div class="sub">Risk / follow-up</div></div>'+
        '<div class="alertKpi" data-filter="all" onclick="setAlertFilter(\'all\')"><div class="lbl">All Alerts</div><div class="val">'+(s.all?s.all.length:alerts().length)+'</div><div class="sub">Everything</div></div>'+
      '</div>'+
      '<div class="alertToolbarPro">'+
        '<label>Category<select id="alert_filter_safe" onchange="renderAlertListClickable()"><option value="all">All alerts</option><option value="critical">Critical only</option><option value="warning">Warnings only</option><option value="MOT">MOT</option><option value="Finance">Finance</option><option value="Complaint">Complaints</option><option value="Stock Ageing">Stock ageing</option><option value="Prep">Prep/workshop</option><option value="Missing Data">Missing data</option></select></label>'+
        '<label>Severity<select id="alert_sev_filter" onchange="renderAlertListClickable()"><option value="all">All status</option><option value="critical">Critical</option><option value="warning">Warning</option></select></label>'+
        '<label class="alertSearchLabel">Search<input id="alert_search_box" type="search" placeholder="Search reg, make, model or issue" oninput="renderAlertListClickable()"></label>'+
        '<span id="alert_count" class="alertCountPill">0 showing</span>'+
        '<button onclick="exportAlertsCSV()">Export Filtered CSV</button>'+
        '<button class="primary" onclick="printAlertPack()">Print Filtered</button>'+
      '</div>'+
      '<div id="alert_list" class="alertList"></div>';
    setTimeout(function(){ setAlertFilter('all'); }, 0);
    return wrap;
  };
})();
</script>

/* Keep Smart Alert search/filter bar professional and compact */
.alertToolbarPro{
  display:grid !important;
  grid-template-columns:minmax(135px,170px) minmax(135px,160px) minmax(190px,300px) auto auto auto !important;
  gap:10px !important;
  align-items:end !important;
  overflow:visible !important;
}
.alertToolbarPro label{min-width:0 !important;width:100% !important;flex:none !important;display:flex !important;flex-direction:column !important;gap:6px !important;}
.alertToolbarPro .alertSearchLabel{max-width:300px !important;grid-column:auto !important;}
.alertToolbarPro #alert_search_box{
  box-sizing:border-box !important;width:100% !important;min-width:0 !important;max-width:300px !important;
  height:40px !important;min-height:40px !important;max-height:40px !important;padding:8px 10px !important;
  line-height:20px !important;display:block !important;resize:none !important;
}
.alertToolbarPro select,.alertToolbarPro button,.alertToolbarPro .alertCountPill{height:40px !important;min-height:40px !important;align-self:end !important;}
@media(max-width:820px){
  .alertToolbarPro{grid-template-columns:1fr 1fr !important;gap:8px !important;padding:10px !important;}
  .alertToolbarPro .alertSearchLabel{grid-column:1 / -1 !important;max-width:none !important;}
  .alertToolbarPro #alert_search_box{max-width:none !important;}
  .alertToolbarPro button,.alertToolbarPro .alertCountPill{width:100% !important;justify-content:center !important;}
}
@media(max-width:460px){.alertToolbarPro{grid-template-columns:1fr !important;}}

/* Dashboard REG search card */
.dashRegCostLookup{
  margin:14px 0 !important;border:1px solid rgba(90,176,255,.28) !important;border-radius:16px !important;
  background:radial-gradient(900px 260px at 8% 0%, rgba(90,176,255,.15), transparent 60%), rgba(255,255,255,.035) !important;
}
.dashRegCostLookup .dashRegTop{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-top:10px;}
.dashRegCostLookup input,.dashRegCostLookup select{height:40px;}
.dashRegCostLookup #dash_cost_reg{width:220px;max-width:280px;}
.dashCostKpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:12px 0;}
.dashCostKpi{border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px;background:rgba(255,255,255,.03)}
.dashCostKpi .lbl{font-size:11px;color:var(--mut);font-weight:900}.dashCostKpi .val{font-size:20px;font-weight:950;margin-top:4px}
@media(max-width:720px){.dashRegCostLookup .dashRegTop>*{width:100% !important;max-width:none !important}.dashRegCostLookup #dash_cost_reg{width:100%;max-width:none}}
</style>
<script>
(function(){
  if(window.__dashboard_reg_cost_lookup_permanent_v2__) return;
  window.__dashboard_reg_cost_lookup_permanent_v2__ = true;

  function h(v){
    if(typeof esc === 'function') return esc(v);
    return String(v == null ? '' : v).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});
  }
  function money(v){
    if(typeof fmtMoney === 'function') return fmtMoney(v);
    var n=Number(v||0); return '£'+n.toFixed(2);
  }
  function today(){ return new Date().toISOString().slice(0,10); }
  function makeId(){ return (typeof uid === 'function') ? uid() : ('id_'+Date.now().toString(36)+Math.random().toString(36).slice(2)); }
  function normReg(r){ return String(r||'').toUpperCase().replace(/\s+/g,'').trim(); }
  function findVehicle(reg){
    var nr=normReg(reg);
    return (db.vehicles||[]).find(function(v){ return normReg(v.reg)===nr; });
  }
  function salesForVehicle(v){
    if(!v) return null;
    return (db.sales||[]).find(function(s){
      var st=String(s.saleStatus||s.status||'completed').toLowerCase();
      return !s.refunded && (s.vehicleId===v.id || normReg(s.reg||s.vehicleReg)===normReg(v.reg)) && ['completed','complete','sold',''].indexOf(st)>=0;
    }) || null;
  }
  function expensesFor(v){ return (db.vehicleExpenses||[]).filter(function(e){ return v && (e.vehicleId===v.id || normReg(e.reg)===normReg(v.reg)); }); }
  function optionList(){ return (db.vehicles||[]).map(function(v){return '<option value="'+h(String(v.reg||'').toUpperCase())+'">';}).join(''); }

  window.renderDashboardRegCostLookup = function(){
    var card=document.getElementById('dash_reg_cost_lookup_card');
    if(!card) return;
    var regEl=card.querySelector('#dash_cost_reg');
    var out=card.querySelector('#dash_cost_result');
    var reg=regEl ? regEl.value : '';
    var v=findVehicle(reg);
    if(!out) return;
    if(!v){ out.innerHTML='<div class="small">Enter a vehicle REG and press Search.</div>'; return; }
    var exps=expensesFor(v);
    var expTotal=exps.reduce(function(t,e){return t+Number(e.amount||0);},0);
    var purchase=Number(v.purchase||v.purchasePrice||0);
    var totalCost=purchase+expTotal;
    var sale=salesForVehicle(v);
    var salePrice=sale ? Number(sale.salePrice||sale.price||0) : 0;
    var profit=sale ? salePrice-totalCost : 0;
    var sort=(card.querySelector('#dash_cost_sort')||{}).value||'date';
    exps=exps.slice().sort(function(a,b){
      if(sort==='high') return Number(b.amount||0)-Number(a.amount||0);
      if(sort==='low') return Number(a.amount||0)-Number(b.amount||0);
      return String(b.date||'').localeCompare(String(a.date||''));
    });
    var rows=exps.map(function(e){return '<tr><td>'+h(e.date||'')+'</td><td>'+h(e.type||e.category||'')+'</td><td>'+h(e.method||'bank')+'</td><td class="right">'+money(e.amount||0)+'</td><td>'+h(e.note||'')+'</td><td class="right"><button class="small" onclick="editDashCostExpense(\''+h(e.id||'')+'\')">Edit</button> <button class="small danger" onclick="deleteDashCostExpense(\''+h(e.id||'')+'\')">Delete</button></td></tr>';}).join('');
    if(!rows) rows='<tr><td colspan="6" class="small">No expenses recorded yet.</td></tr>';
    out.innerHTML=
      '<div class="row" style="justify-content:space-between;align-items:center"><div><b>'+h(String(v.reg||'').toUpperCase())+'</b> — '+h([v.make,v.model].filter(Boolean).join(' '))+'</div><span class="badge">'+h(v.status||'in stock')+'</span></div>'+ 
      '<div class="dashCostKpis">'+
      '<div class="dashCostKpi"><div class="lbl">Purchase Price</div><div class="val">'+money(purchase)+'</div></div>'+
      '<div class="dashCostKpi"><div class="lbl">Vehicle Expenses</div><div class="val">'+money(expTotal)+'</div></div>'+
      '<div class="dashCostKpi"><div class="lbl">Full Cost</div><div class="val">'+money(totalCost)+'</div></div>'+
      '<div class="dashCostKpi"><div class="lbl">'+(sale?'Profit / Loss':'Sale Status')+'</div><div class="val">'+(sale?money(profit):'Not sold')+'</div></div>'+ 
      '</div>'+
      '<div class="card flat"><h4 id="dash_cost_form_title" style="margin-top:0">Quick Add Missing Expense</h4><input type="hidden" id="dash_cost_edit_id">'+
      '<div class="row"><label>Date<input id="dash_cost_date" type="date" value="'+today()+'"></label><label>Type<input id="dash_cost_type" placeholder="Repair / MOT / Tyre / Service"></label><label>Method<select id="dash_cost_method"><option value="bank">bank</option><option value="cash">cash</option><option value="card">card</option></select></label><label>Amount<input id="dash_cost_amount" type="number" min="0" step="0.01" placeholder="0.00"></label><label style="flex:1;min-width:220px">Note<input id="dash_cost_note" placeholder="Optional note"></label><button class="primary" onclick="saveDashCostExpense()">Save Expense</button><button onclick="resetDashCostExpenseForm()" type="button">Cancel</button></div><div id="dash_cost_msg" class="small" style="margin-top:8px"></div></div>'+
      '<h4>Expenses for this vehicle</h4><div class="tableWrap"><table class="table compact"><thead><tr><th>Date</th><th>Type</th><th>Method</th><th class="right">Amount</th><th>Note</th><th class="right">Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  };

  window.resetDashCostExpenseForm=function(){
    ['dash_cost_edit_id','dash_cost_type','dash_cost_amount','dash_cost_note'].forEach(function(id){var el=document.getElementById(id); if(el) el.value='';});
    var d=document.getElementById('dash_cost_date'); if(d) d.value=today();
    var t=document.getElementById('dash_cost_form_title'); if(t) t.textContent='Quick Add Missing Expense';
  };
  window.editDashCostExpense=function(id){
    var e=(db.vehicleExpenses||[]).find(function(x){return x.id===id;}); if(!e) return alert('Expense not found.');
    var set=function(id,v){var el=document.getElementById(id); if(el) el.value=v||'';};
    set('dash_cost_edit_id',e.id); set('dash_cost_date',e.date||today()); set('dash_cost_type',e.type||e.category||''); set('dash_cost_method',e.method||'bank'); set('dash_cost_amount',e.amount||''); set('dash_cost_note',e.note||'');
    var t=document.getElementById('dash_cost_form_title'); if(t) t.textContent='Edit Vehicle Expense';
  };
  window.deleteDashCostExpense=function(id){
    var e=(db.vehicleExpenses||[]).find(function(x){return x.id===id;}); if(!e) return;
    if(!confirm('Delete this expense?')) return;
    db.vehicleExpenses=(db.vehicleExpenses||[]).filter(function(x){return x.id!==id;});
    try{ if(typeof markRecordForNetworkDelete==='function') markRecordForNetworkDelete('vehicleExpenses', id); }catch(_){ }
    try{ if(typeof addAudit==='function') addAudit('delete','vehicleExpense',id,(e.type||'')+' '+(e.amount||'')); }catch(_){ }
    if(typeof saveDB==='function') saveDB();
    renderDashboardRegCostLookup();
  };
  window.saveDashCostExpense=function(){
    var card=document.getElementById('dash_reg_cost_lookup_card'); if(!card) return;
    var v=findVehicle((card.querySelector('#dash_cost_reg')||{}).value); if(!v) return alert('Search a valid vehicle first.');
    var id=(document.getElementById('dash_cost_edit_id')||{}).value||'';
    var type=(document.getElementById('dash_cost_type')||{}).value||'';
    var amount=Number((document.getElementById('dash_cost_amount')||{}).value||0);
    var date=(document.getElementById('dash_cost_date')||{}).value||today();
    var method=(document.getElementById('dash_cost_method')||{}).value||'bank';
    var note=(document.getElementById('dash_cost_note')||{}).value||'';
    if(!type.trim() || !(amount>0)) return alert('Please enter expense type and amount.');
    if(id){
      db.vehicleExpenses=(db.vehicleExpenses||[]).map(function(e){return e.id===id ? Object.assign({},e,{vehicleId:v.id,reg:v.reg,date:date,type:type,method:method,amount:amount,note:note,_updatedAt:new Date().toISOString()}) : e;});
      try{ if(typeof addAudit==='function') addAudit('update','vehicleExpense',id,String(v.reg||'')+' '+type+' '+amount); }catch(_){ }
    }else{
      var e={id:makeId(),vehicleId:v.id,reg:v.reg,date:date,type:type,method:method,amount:amount,note:note,_updatedAt:new Date().toISOString()};
      db.vehicleExpenses=db.vehicleExpenses||[]; db.vehicleExpenses.unshift(e);
      try{ if(typeof addAudit==='function') addAudit('add','vehicleExpense',e.id,String(v.reg||'')+' '+type+' '+amount); }catch(_){ }
    }
    if(typeof saveDB==='function') saveDB();
    resetDashCostExpenseForm();
    renderDashboardRegCostLookup();
    var msg=document.getElementById('dash_cost_msg'); if(msg) msg.innerHTML='<span style="color:#2ecc71">Saved.</span>';
  };

  function buildDashboardRegCostCard(){
    var box=document.createElement('div'); box.className='card dashRegCostLookup'; box.id='dash_reg_cost_lookup_card';
    box.innerHTML='<div class="card-head"><div><h3>Vehicle REG Search / Full Cost Lookup</h3><div class="card-sub">Enter a REG to see purchase price, all expenses, total cost, profit if sold, and quick add missing expenses.</div></div></div>'+ 
      '<div class="dashRegTop"><input id="dash_cost_reg" list="dash_cost_reg_list" placeholder="Enter REG"><datalist id="dash_cost_reg_list">'+optionList()+'</datalist><button class="primary" onclick="renderDashboardRegCostLookup()">Search</button><label class="small">Sort expenses<select id="dash_cost_sort" onchange="renderDashboardRegCostLookup()"><option value="date">Latest first</option><option value="high">Highest first</option><option value="low">Lowest first</option></select></label></div><div id="dash_cost_result" class="card flat" style="margin-top:12px"><div class="small">Enter a vehicle REG and press Search.</div></div>';
    setTimeout(function(){var r=document.getElementById('dash_cost_reg'); if(r){r.addEventListener('keydown',function(e){if(e.key==='Enter') renderDashboardRegCostLookup();}); r.addEventListener('change',renderDashboardRegCostLookup);}},0);
    return box;
  }

  if(typeof window.viewDashboard === 'function'){
    var previousDashboard=window.viewDashboard;
    window.viewDashboard=function(){
      var wrap=previousDashboard.apply(this,arguments);
      try{
        if(wrap && !wrap.querySelector('#dash_reg_cost_lookup_card')){
          var card=buildDashboardRegCostCard();
          var hero=wrap.querySelector('.dmsHero');
          if(hero && hero.nextSibling) wrap.insertBefore(card, hero.nextSibling);
          else if(hero) wrap.appendChild(card);
          else wrap.insertBefore(card, wrap.firstChild);
        }
      }catch(e){console.warn('Dashboard REG cost lookup failed', e);}
      return wrap;
    };
  }

  if(typeof window.viewAlertCentre === 'function'){
    var oldAlert=window.viewAlertCentre;
    window.viewAlertCentre=function(){
      var w=oldAlert.apply(this,arguments);
      setTimeout(function(){
        try{
          var s=w.querySelector('#alert_search_box');
          if(s){ s.closest('label') && s.closest('label').classList.add('alertSearchLabel'); s.style.height='40px'; s.style.maxHeight='40px'; s.style.minHeight='40px'; s.style.width='100%'; }
          var p=[].slice.call(w.querySelectorAll('button')).find(function(b){return /print/i.test(b.textContent||'');}); if(p) p.textContent='Print Filtered';
        }catch(_){ }
      },0);
      return w;
    };
  }
})();
</script>

</body>
</html>
