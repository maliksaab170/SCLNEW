function renderBackupInfo(){
   try {
    const el = document.getElementById('backupInfo');
    if (!el || !window.db) return;

    db.company = db.company || {};
    const last = db.company.lastBackupDate;
    const st = serverSyncStatus();
    const syncOn = !!st.ok;
    if(syncOn && st.db && st.db._sync){
      db._sync = Object.assign({}, db._sync || {}, {version: Number(st.db._sync.version || 0)});
    }
    const ver = syncOn && st.db && st.db._sync ? Number(st.db._sync.version || 0) : (db._sync ? Number(db._sync.version || 0) : 0);
    const err = localStorage.getItem('starcars_server_sync_last_error') || '';
    const syncTxt = syncOn ? ('SERVER SYNC ON v' + ver) : ('LOCAL ONLY - server sync off' + (err ? ' (' + err + ')' : ''));

    if (!last) {
      el.textContent = syncTxt + ' | No backup recorded';
      el.style.color = syncOn ? '#2ecc71' : '#d9534f';
       return;
    }

    const today = new Date().toISOString().slice(0,10);
    if (last === today) {
      el.textContent = syncTxt + ' | Last backup: today';
      el.style.color = syncOn ? '#2ecc71' : '#d9534f';
    } else {
      el.textContent = syncTxt + ' | Last backup: ' + ddmmyyyy(last);
      el.style.color = syncOn ? '#2ecc71' : '#d9534f';
    }
  } catch(e) {
    // silent fail – nothing critical
  }
}

/* ========= Backup / Restore / CSV ========= */
async function deriveBackupKeyFromPassword(password, saltB64, iterations){
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    'raw',
    enc.encode(String(password||'')),
    { name:'PBKDF2' },
    false,
    ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {
      name:'PBKDF2',
      salt:_bytesFromB64(saltB64),
      iterations:Number(iterations||PASS_ITER_DEFAULT),
      hash:'SHA-256'
    },
    keyMat,
    { name:'AES-GCM', length:256 },
    false,
    ['encrypt','decrypt']
  );
}


async function encryptBackupPayload(plainText, password){
  const salt = _randSaltB64(16);
  const ivBytes = new Uint8Array(12);
  crypto.getRandomValues(ivBytes);
  const ivB64 = _b64FromBytes(ivBytes);
  const iterations = PASS_ITER_DEFAULT;
  const key = await deriveBackupKeyFromPassword(password, salt, iterations);
  const enc = new TextEncoder();
  const cipherBuf = await crypto.subtle.encrypt(
    { name:'AES-GCM', iv: ivBytes },
    key,
    enc.encode(String(plainText||''))
  );
  return {
    __encrypted:true,
    format:'starcars-backup-v1',
    kdf:'PBKDF2-SHA256',
    cipher:'AES-GCM',
    iterations,
    salt,
    iv: ivB64,
    data: _b64FromBytes(new Uint8Array(cipherBuf))
  };
}

async function decryptBackupPayload(payload, password){
  if(!payload || !payload.__encrypted) return payload;

  if((payload.format || 'starcars-backup-v1') !== 'starcars-backup-v1'){
    throw new Error('Backup format not supported');
  }

  if(!payload.salt || !payload.iv || !payload.data){
    throw new Error('Encrypted backup is missing fields');
  }

  const key = await deriveBackupKeyFromPassword(password, payload.salt, payload.iterations || PASS_ITER_DEFAULT);
  const iv = _bytesFromB64(payload.iv || '');
  const data = _bytesFromB64(payload.data || '');

  if(!iv || !iv.length || !data || !data.length){
    throw new Error('Encrypted backup is damaged');
  }

  const plainBuf = await crypto.subtle.decrypt(
    { name:'AES-GCM', iv },
    key,
    data
  );

  const txt = new TextDecoder().decode(plainBuf);
  let parsed;
  try{
    parsed = JSON.parse(txt || '{}');
  }catch(e){
    throw new Error('Decrypted backup is not valid JSON');
  }
  return parsed;
}

function _looksLikeStarCarsBackupData(obj){
  return !!(
    obj &&
    typeof obj === 'object' &&
    (
      Array.isArray(obj.users) ||
      Array.isArray(obj.vehicles) ||
      Array.isArray(obj.sales) ||
      Array.isArray(obj.showroomExpenses) ||
      Array.isArray(obj.vehicleExpenses) ||
      obj.company ||
      obj.audit ||
      obj.settings
    )
  );
}

function validateBackupObject(parsed){
  if(!parsed || typeof parsed !== 'object' || Array.isArray(parsed)){
    throw new Error('Backup file has no valid data');
  }

  // Main supported format: full DB object
  if (_looksLikeStarCarsBackupData(parsed)) {
    return parsed;
  }

  // Legacy/nested wrappers sometimes store DB in one of these keys
  const candidates = ['db','payload','backup','dataObject'];
  for(const k of candidates){
    if(_looksLikeStarCarsBackupData(parsed[k])){
      return parsed[k];
    }
  }

  throw new Error('Backup structure not recognised');
}

async function readBackupFileToObject(file){
  const txt = await file.text();
  let parsed;
  try{
    parsed = JSON.parse(txt || '{}');
  }catch(e){
    throw new Error('Bad JSON: ' + (e.message||e));
  }

  // Encrypted wrapper backup
  if(parsed && parsed.__encrypted){
    const pw = prompt('Enter backup password');
    if(pw == null) throw new Error('Backup restore cancelled');
    try{
      const decrypted = await decryptBackupPayload(parsed, pw);
      return validateBackupObject(decrypted);
    }catch(e){
      if ((e && e.message) === 'Backup format not supported') throw e;
      throw new Error('Wrong backup password or incompatible backup file');
    }
  }

  // Plain JSON backup
  return validateBackupObject(parsed);
}


async function backupJSON(){
  try{
    const pw = prompt('Set a password for this backup file');
    if(pw == null) return;
    if(String(pw).length < 6){ alert('Backup password must be at least 6 characters'); return; }
    const pw2 = prompt('Re-enter backup password');
    if(pw2 !== pw){ alert('Backup passwords do not match'); return; }

    db.vehicles = (db.vehicles || []).map(normalizeVehicleMotFields);
    saveDB();
    const data = JSON.stringify(db, null, 2); // full DB including audit and hashed login data
    const encrypted = await encryptBackupPayload(data, pw);

    // create blob + object URL
    const blob = new Blob([JSON.stringify(encrypted, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);

    // create the anchor element correctly (was missing: `a` was not declared)
    const a = document.createElement('a');
    a.href = url;
    a.download = 'starcars_backup_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.json';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    // cleanup
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Record backup timestamp in DB
    db.company = db.company || {};
    const nowIso = new Date().toISOString();
    db.company.lastBackupTs = nowIso;
    db.company.lastBackupDate = nowIso.slice(0,10);
    saveDB();

    if (typeof addAudit === 'function') {
      addAudit('export','backup','','Encrypted JSON backup');
    }

    if (typeof renderBackupInfo === 'function') {
      renderBackupInfo();
    }
  }catch(e){
    alert('Backup failed: '+(e.message||e));
  }
}

// Merge-from-backup with id-based merge for ALL arrays
async function restoreJSONMerge() {
  const i = document.createElement('input');
  i.type = 'file';
  i.accept = '.json,application/json';

  i.onchange = async () => {
    const f = i.files && i.files[0];
    if (!f) return;

    try {
      const incoming = await readBackupFileToObject(f);
      if (!incoming || typeof incoming !== 'object') {
        throw new Error('Backup file has no data');
      }

        // Make sure db exists
        db = db || {};
        db.deleted = db.deleted || {};

        // ✅ Merge deletion maps first. Do NOT clear local deleted flags just because
        // an older backup still contains the old item. That resurrects deleted data.
        if (incoming.deleted && typeof mergeDeletedMaps === 'function') {
          db.deleted = mergeDeletedMaps(db.deleted, incoming.deleted);
        }

        Object.keys(incoming).forEach(k => {
          const val = incoming[k];

          if (k === 'audit') {
            // Replace audit log with backup audit
            db.audit = Array.isArray(val) ? val.slice() : (db.audit || []);
            return;
          }

          if (k === 'deleted') {
            // Already merged above
            return;
          }

          if (Array.isArray(val)) {
            // ✅ SAFE merge by id: newest updatedAt wins, no-id records get ids,
            // and deleted records are not resurrected from old backups.
            const localArr = Array.isArray(db[k]) ? db[k] : [];
            if (typeof mergeArrayByIdNoLoss === 'function') {
              db[k] = mergeArrayByIdNoLoss(k, localArr, val);
            } else {
              db[k] = [...localArr, ...val];
            }

            // Users: normalise permissions
            if (k === 'users' && typeof normalizePerms === 'function') {
              db.users = (db.users || []).map(u => {
                u.perms = normalizePerms(u.perms);
                return u;
              });
            }

            // Directors: make sure partners are unique by name
            if (k === 'partners') {
              db.partners = (db.partners || []).filter((p, i, arr) =>
                arr.findIndex(pp =>
                  String(pp.name || '').trim().toLowerCase() ===
                  String(p.name || '').trim().toLowerCase()
                ) === i
              );
            }

            return;
          }

          if (val && typeof val === 'object') {
            // Shallow-merge plain objects (company, settings, etc.)
            db[k] = Object.assign({}, db[k] || {}, val);
          } else {
            // Simple values (numbers / strings / booleans)
            db[k] = val;
          }
        });

        // Safety defaults
        db.company           = db.company           || {};
        db.vehicles          = db.vehicles          || [];
        db.sales             = db.sales             || [];
        db.expenses          = db.expenses          || [];
        db.showroomExpenses  = db.showroomExpenses  || [];
        db.vehicleExpenses   = db.vehicleExpenses   || [];
        db.credits           = db.credits           || [];
        db.complaints        = db.complaints        || [];
        db.investors         = db.investors         || [];
        db.partners          = db.partners          || [];
        db.todo              = db.todo              || [];
        db.purchaseInvoices  = db.purchaseInvoices  || [];
        db.audit             = db.audit             || [];
        db.deleted           = db.deleted           || {};

        // Apply deletions (if map exists)
        if (typeof applyAllDeletions === 'function') {
          applyAllDeletions();
        }

        ensureIdsEverywhere();
        dedupeVehiclesByReg();
        relinkVehicleRefsByReg();
        dedupeSalesById();
        dedupeAllExpensesAndCredits();
        db.vehicles = (db.vehicles || []).map(normalizeVehicleMotFields);

        saveDB();
        try { renderAlertBell(); } catch (_) {}
        if (typeof addAudit === 'function') {
          addAudit('import', 'backup', '', 'Merged JSON backup (id-merge)');
        }
        alert('Merged from backup');
        if (typeof markPullUsed === 'function') markPullUsed();
        if (typeof render === 'function') render();
    } catch (e) {
      alert(e.message || e);
    }
  };

  i.click();
}

// ========= Deletion tracking (for multi-PC sync) =========
function ensureDeletedMap() {
  db.deleted = db.deleted || {};
}

// Merge remote deleted map into local (keep latest timestamp)
function mergeDeletedMaps(localDel, remoteDel) {
  const out = localDel && typeof localDel === 'object' ? JSON.parse(JSON.stringify(localDel)) : {};
  if (remoteDel && typeof remoteDel === 'object') {
    Object.keys(remoteDel).forEach(section => {
      out[section] = out[section] || {};
      const tgt = out[section];
      const src = remoteDel[section] || {};
      Object.keys(src).forEach(id => {
        if (!tgt[id] || String(tgt[id]) < String(src[id])) {
          tgt[id] = src[id];
        }
      });
    });
  }
  return out;
}

// ✅ SAFE ID MERGE HELPERS: newest record wins, deletions are respected
function recordStamp(x){
  if(!x) return '';
  const raw = x.updatedAt || x.modifiedAt || x.createdAt || x.ts || '';
  const ms = Date.parse(raw);
  return Number.isFinite(ms) ? new Date(ms).toISOString() : String(raw || '');
}

function isIncomingNewerThanDelete(item, deletedTs){
  if(!deletedTs) return true;
  const st = recordStamp(item);
  // If the item has no timestamp, respect deletion to avoid resurrecting old data.
  if(!st) return false;
  return String(st) > String(deletedTs);
}

function pickNewestRecord(localItem, incomingItem){
  if(!localItem) return incomingItem;
  if(!incomingItem) return localItem;

  const ls = recordStamp(localItem);
  const rs = recordStamp(incomingItem);

  // If both have timestamps, keep the newest change.
  if(ls || rs){
    if(String(rs) > String(ls)) return incomingItem;
    return localItem;
  }

  // No timestamps: incoming is used as fallback only for old records.
  return incomingItem;
}

function normalizeVehicleMotFields(v){
  if(!v) return v;
  // Keep every MOT key in sync so backup/restore and all reports read the same value.
  const exp = v.motExpiry || v.lastMotExpiry || v.mot || v.motDue || v.mot_expiry || '';
  if(exp){
    v.motExpiry = exp;
    v.lastMotExpiry = v.lastMotExpiry || exp;
  }
  return v;
}

function motRecordStamp(v){
  if(!v) return '';
  return v.motUpdatedAt || v.updatedAt || v.modifiedAt || v.createdAt || '';
}

function mergeVehicleMotFields(localItem, incomingItem){
  // Normal record merge keeps the newest record, but MOT can be refreshed separately.
  // This prevents an old browser keeping an old MOT expiry after backup merge.
  const picked = pickNewestRecord(localItem, incomingItem);
  const other  = picked === localItem ? incomingItem : localItem;
  const out = Object.assign({}, picked || {});

  normalizeVehicleMotFields(out);
  normalizeVehicleMotFields(other);

  const outExp = out.motExpiry || out.lastMotExpiry || '';
  const otherExp = other && (other.motExpiry || other.lastMotExpiry || '');

  if(otherExp){
    const outStamp = motRecordStamp(out);
    const otherStamp = motRecordStamp(other);
    // Prefer the MOT value from the record with the newest MOT/update timestamp.
    // If there is no timestamp, prefer the different value coming from the backup merge.
    if(!outExp || String(otherStamp) >= String(outStamp) || otherExp !== outExp){
      out.motExpiry = otherExp;
      out.lastMotExpiry = other.lastMotExpiry || otherExp;
      if(other.lastMotDate) out.lastMotDate = other.lastMotDate;
      if(other.lastMotMileage) out.lastMotMileage = other.lastMotMileage;
      if(other.motUpdatedAt) out.motUpdatedAt = other.motUpdatedAt;
    }
  }
  return normalizeVehicleMotFields(out);
}

function mergeArrayByIdNoLoss(section, localArr, incomingArr){
  const localDeleted = (db.deleted && db.deleted[section]) || {};
  const byId = Object.create(null);
  const noId = [];

  (Array.isArray(localArr) ? localArr : []).forEach(item=>{
    if(!item) return;
    if(item.id){
      // local item already deleted locally should not stay unless edited after delete
      if(localDeleted[item.id] && !isIncomingNewerThanDelete(item, localDeleted[item.id])) return;
      byId[item.id] = item;
    } else {
      item.id = uid();
      item.createdAt = item.createdAt || new Date().toISOString();
      item.updatedAt = item.updatedAt || item.createdAt;
      byId[item.id] = item;
    }
  });

  (Array.isArray(incomingArr) ? incomingArr : []).forEach(item=>{
    if(!item) return;
    if(!item.id){
      item.id = uid();
      item.createdAt = item.createdAt || new Date().toISOString();
      item.updatedAt = item.updatedAt || item.createdAt;
    }

    const delTs = localDeleted[item.id];
    if(delTs && !isIncomingNewerThanDelete(item, delTs)) return;

    byId[item.id] = (section === 'vehicles') ? mergeVehicleMotFields(byId[item.id], item) : pickNewestRecord(byId[item.id], item);
  });

  return [...noId, ...Object.values(byId)];
}

function dedupePeopleByNamePreferLocal(mergedArr, localArr) {
  const norm = s => String(s || '').trim().toLowerCase();

  // Set of names that exist in LOCAL (so local version should win)
  const localNameSet = new Set((localArr || []).map(x => norm(x && x.name)));

  // Choose “best” record if we see duplicates:
  // 1) Prefer record that came from LOCAL (same name exists locally)
  // 2) Otherwise prefer one with more tx entries
  // 3) Otherwise prefer one with higher abs(balance)
  const pickBest = (a, b) => {
    const an = norm(a && a.name), bn = norm(b && b.name);
    const aLocal = localNameSet.has(an);
    const bLocal = localNameSet.has(bn);

    if (aLocal && !bLocal) return a;
    if (!aLocal && bLocal) return b;

    const atx = (a && a.tx && a.tx.length) ? a.tx.length : 0;
    const btx = (b && b.tx && b.tx.length) ? b.tx.length : 0;
    if (atx !== btx) return atx > btx ? a : b;

    const abal = Math.abs(Number(a && a.balance || 0));
    const bbal = Math.abs(Number(b && b.balance || 0));
    if (abal !== bbal) return abal > bbal ? a : b;

    return a; // stable fallback
  };

  const map = Object.create(null);
  const out = [];

  for (const item of (mergedArr || [])) {
    const key = norm(item && item.name);
    if (!key) { out.push(item); continue; }
    if (!map[key]) {
      map[key] = item;
    } else {
      map[key] = pickBest(map[key], item);
    }
  }

  // rebuild in a stable order by name (optional but helps keep dropdown stable)
  const named = Object.keys(map).sort().map(k => map[k]);
  const unnamed = out.filter(x => !x || !norm(x.name));
  return [...named, ...unnamed];
}

function dedupePeopleByNamePreferRemote(mergedArr, remoteArr) {
  const norm = s => String(s || '').trim().toLowerCase();
  const remoteNameSet = new Set((remoteArr || []).map(x => norm(x && x.name)));

  const pickBest = (a, b) => {
    const an = norm(a && a.name), bn = norm(b && b.name);
    const aRemote = remoteNameSet.has(an);
    const bRemote = remoteNameSet.has(bn);

    // Prefer record that exists in REMOTE (Gist)
    if (aRemote && !bRemote) return a;
    if (!aRemote && bRemote) return b;

    // Fallback: more tx wins
    const atx = (a && a.tx && a.tx.length) ? a.tx.length : 0;
    const btx = (b && b.tx && b.tx.length) ? b.tx.length : 0;
    if (atx !== btx) return atx > btx ? a : b;

    // Fallback: higher abs(balance)
    const abal = Math.abs(Number(a && a.balance || 0));
    const bbal = Math.abs(Number(b && b.balance || 0));
    if (abal !== bbal) return abal > bbal ? a : b;

    return a;
  };

  const map = Object.create(null);
  const out = [];

  for (const item of (mergedArr || [])) {
    const key = norm(item && item.name);
    if (!key) { out.push(item); continue; }
    if (!map[key]) map[key] = item;
    else map[key] = pickBest(map[key], item);
  }

  const named = Object.keys(map).sort().map(k => map[k]);
  const unnamed = out.filter(x => !x || !norm(x.name));
  return [...named, ...unnamed];
}

// Mark a record as deleted so other PCs know to remove it too
function markDeleted(section, id) {
  if (!id) return;
  ensureDeletedMap();
  if (typeof markRecordForNetworkDelete === 'function') { markRecordForNetworkDelete(section, id); return; }
  if (!db.deleted[section]) db.deleted[section] = {};
  db.deleted[section][id] = new Date().toISOString();
}

// Apply deletions to a given array (vehicles, sales, etc.)
function applyDeletions(section) {
  ensureDeletedMap();
  const map = db.deleted[section];
  if (!map) return;
  if (!Array.isArray(db[section])) return;
  db[section] = db[section].filter(item => !item || !item.id || !map[item.id]);
}

// Apply deletions to all arrays we know about
function applyAllDeletions() {
  ensureDeletedMap();
  Object.keys(db.deleted || {}).forEach(section => {
    applyDeletions(section);
  });
  if (typeof applyDeletedMapToDbObject === 'function') applyDeletedMapToDbObject(db);
}

async function readGistStarcarsJSON(gistId, token = "") {
  // Safe reader that supports private gists (Authorization) and large/truncated files
  const headers = { "Accept": "application/vnd.github+json" };
  if (token) headers["Authorization"] = "token " + token;

  const r = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
  const txt = await r.text();
  if (!r.ok) throw new Error(`Gist fetch failed ${r.status}: ${txt}`);

  const j = JSON.parse(txt || "{}");
  const file = j.files && (j.files['starcars.json'] || Object.values(j.files)[0]);
  if (!file) throw new Error('No starcars.json in that Gist');

  // Handle big/truncated files
  let content = file.content || '';
  if (file.truncated && file.raw_url) {
    const rr = await fetch(file.raw_url, { headers });
    if (!rr.ok) throw new Error(`Raw fetch failed ${rr.status}`);
    content = await rr.text();
  }

  return JSON.parse(content || '{}');
}

async function syncPull() {
  try {
    const gistId = (db.company.gistId || '').trim();
    if (!gistId) return alert('Enter Gist ID in Settings');

    const r = await fetch(`https://api.github.com/gists/${gistId}`);
    const txt = await r.text();
    if (!r.ok) {
      return alert('Gist fetch failed ' + r.status + ': ' + txt);
    }

    const j = JSON.parse(txt || '{}');
    const file = j.files && (j.files['starcars.json'] || Object.values(j.files)[0]);
    if (!file || !file.content) return alert('No starcars.json in that Gist');

    const incoming = await readGistStarcarsJSON(gistId);

    recordPullActivity('pull');

    // 1) Merge deleted map first so we know what to remove
    if (incoming.deleted) {
      db.deleted = mergeDeletedMaps(db.deleted, incoming.deleted);
    } else {
      ensureDeletedMap();
    }

    Object.keys(incoming).forEach(k => {
      const val = incoming[k];

      if (k === 'audit') {
        // Replace audit completely
        db.audit = Array.isArray(val) ? val.slice() : (db.audit || []);
        return;
      }

      if (k === 'deleted') {
        // already handled above
        return;
      }

      if (Array.isArray(val)) {
        // 🔁 Merge ANY array by id: vehicles, expenses, showroom, users, directors, investors, etc.
        const localArr = Array.isArray(db[k]) ? db[k] : [];
        const byId = Object.create(null);
        const noId = [];

        // ✅ SAFE merge: newest updatedAt wins, so a Gist pull does not wipe
        // newer changes made on this PC.
        if (typeof mergeArrayByIdNoLoss === 'function') {
          db[k] = mergeArrayByIdNoLoss(k, localArr, val);
        } else {
          db[k] = [...localArr, ...val];
        }

        // Apply deletions for this section
        applyDeletions(k);

        // Users: normalise permissions
        if (k === 'users' && typeof normalizePerms === 'function') {
          db.users = (db.users || []).map(u => {
            u.perms = normalizePerms(u.perms);
            return u;
          });
        }

        // FIXED: Use 'val' instead of 'remoteArr' which doesn't exist here
        if (k === 'partners')  db.partners  = dedupePeopleByNamePreferRemote(db.partners || [], val);
        if (k === 'investors') db.investors = dedupePeopleByNamePreferRemote(db.investors || [], val);

        return;
      }

      if (val && typeof val === 'object') {
        // ✅ On PULL: remote (Gist) should overwrite local settings
        db[k] = Object.assign({}, db[k] || {}, val || {});
      } else {
        db[k] = val;
      }
    });

    // Normalise users again just in case
    if (typeof normalizePerms === 'function') {
      db.users = (db.users || []).map(u => {
        u.perms = normalizePerms(u.perms);
        return u;
      });
    }

    // As a safety net, apply deletions everywhere
    applyAllDeletions();

    // Ensure font sizes are numeric
    db.company = db.company || {};
    if (db.company.invoiceFontPx != null) db.company.invoiceFontPx = Number(db.company.invoiceFontPx || 12);
    if (db.company.termsFontPx  != null) db.company.termsFontPx  = Number(db.company.termsFontPx  || 10);
    ensureIdsEverywhere();
    dedupeVehiclesByReg();
    relinkVehicleRefsByReg();
    dedupeSalesById();
    dedupeAllExpensesAndCredits();
    saveDB();
    try { renderAlertBell(); } catch (_) {}
    addAudit('sync', 'pull', db.company.gistId || '', 'Pulled from Gist (arrays merged by id, deletions respected)');
    alert('Pulled & merged from Gist (arrays merged by id; deletions synced)');
    enablePushButton();
    markPullUsed();
    changeTracker.saveSnapshot();
    render();
  } catch (e) {
    alert('Pull failed: ' + e.message);
  }
}

async function readGistJSON(gistId, fileName = "starcars.json", token = ""){
  const headers = { "Accept": "application/vnd.github+json" };
  if (token) headers["Authorization"] = "token " + token;

  const r = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
  const t = await r.text();
  if (!r.ok) throw new Error(`Gist fetch failed ${r.status}: ${t}`);

  const j = JSON.parse(t || "{}");
  const file = j.files && (j.files[fileName] || Object.values(j.files)[0]);
  if (!file) throw new Error(`No ${fileName} found in gist`);

  // ✅ big file: file.content may be truncated
  let content = file.content || "";
  if (file.truncated && file.raw_url) {
    const rr = await fetch(file.raw_url); // raw_url is public if gist is public
    if (!rr.ok) throw new Error(`Raw gist fetch failed ${rr.status}`);
    content = await rr.text();
  }

  return JSON.parse(content || "{}");
}

// ========= Auto Sync (auto-pull from Gist) =========
let autoSyncTimer = null;
let autoSyncRunning = false;

function stopAutoSync(){
  if (autoSyncTimer){
    clearInterval(autoSyncTimer);
    autoSyncTimer = null;
  }
}

async function autoSyncTick(){
  if (autoSyncRunning) return; // don't overlap
  // Do not auto-pull/re-render in the background anywhere in the app.
  // Manual Push/Pull and local server saves are safer.
  if (typeof shouldAvoidAutoRender === 'function' && shouldAvoidAutoRender()) return;
  autoSyncRunning = true;
  try {
    if (!db || !db.company) return;

    const enabled = !!db.company.autoSyncEnabled;
    const gistId  = (db.company.gistId || '').trim();

    if (!enabled || !gistId) return;

    // Use normal safe pull (merge + deletions)
    await syncPull();
  } catch (e) {
    console.warn('Auto sync failed:', e);
  } finally {
    autoSyncRunning = false;
  }
}

function startAutoSyncFromSettings(){
  stopAutoSync();
  if (!db) return;
  db.company = db.company || {};

  if (!db.company.autoSyncEnabled) return;

  let sec = Number(db.company.autoSyncSeconds || 120);
  if (!sec || sec < 30) sec = 30;     // minimum 30s to avoid hammering GitHub
  if (sec > 600) sec = 600;           // max 10 mins

  autoSyncTimer = setInterval(autoSyncTick, sec * 1000);
}

async function smartPush() {
  try {
    const gistId = (db.company.gistId || '').trim();
    if (!gistId) return alert('Enter Gist ID in Settings');

    const token = (getGhToken() || '').trim();
    if (!token) return alert('Enter GitHub token and Save');

    // Detect changes vs last snapshot
    const detected = changeTracker.detectAllChanges();
    let changes = detected;
    let useFullPush = false;

    if (!detected || Object.keys(detected).length === 0) {
      // Nothing detected – offer to force a FULL push
      const ok = confirm(
        'No changes detected against the last snapshot.\n\n' +
        'Press OK to FORCE a FULL push of your current data to Gist.\n' +
        'Press Cancel to stop.'
      );
      if (!ok) return;
      useFullPush = true;
    }

    let payloadData;

    if (useFullPush) {
      // FULL PUSH: send the current local DB as starcars.json
      payloadData = db;
    } else {
      // Smart diff push – read remote (with token), apply changes, then send back
      let remote = null;
      try {
        remote = await readGistJSON(gistId, "starcars.json", token);
      } catch (e) {
        console.warn("Remote read failed:", e);
        remote = null;
      }

      if (!remote) {
        alert(
          "Failed to fetch remote Gist content.\n\n" +
          "Try: Settings → Pull (Normal) then Push again.\n" +
          "If still fails, do a Full Push."
        );
        return;
      }

      const updatedRemote = applyChangesToRemote(remote, changes);
      payloadData = updatedRemote;
    }

    // (2) Push to Gist — include Accept + API version + token
    const payload = {
      files: {
        'starcars.json': {
          content: JSON.stringify(payloadData, null, 2),
        },
      },
    };

    const r = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        'content-type': 'application/json',
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        Authorization: 'token ' + token
      },
      body: JSON.stringify(payload),
    });

    const txt = await r.text();
    if (!r.ok) {
      console.error('Push failed response:', r.status, txt);
      // try to parse JSON error to show more detail
      let errMsg = `Push failed with status ${r.status}`;
      try {
        const j = JSON.parse(txt || '{}');
        if (j && j.message) errMsg += ': ' + j.message;
      } catch (_) {
        errMsg += ': ' + txt;
      }
      return alert(errMsg);
    }

    // Success: reset snapshot + change log
    changeTracker.saveSnapshot();
    changeTracker.clearChanges();

    recordPushActivity();

    if (useFullPush) {
      addAudit('sync', 'smart-push', gistId, 'Smart push FULL DB (no diff found, forced).');
      alert('Full push completed: all current data sent to Gist.');
    } else {
      addAudit(
        'sync',
        'smart-push',
        gistId,
        `Smart push completed with ${countChanges(changes)} changes.`
      );
      alert(`Smart push completed: ${countChanges(changes)} changes pushed to Gist.`);
    }

    render();
  } catch (e) {
    alert('Smart push failed: ' + e.message);
    console.error('smartPush exception', e);
  }
}

// Helper function to apply changes to remote data
function applyChangesToRemote(remote, changes) {
  const result = JSON.parse(JSON.stringify(remote)); // Deep clone
  
  Object.keys(changes).forEach(section => {
    if (section === 'company') {
      // Update company settings
      result.company = changes.company.data;
      return;
    }
    
    const sectionChanges = changes[section];
    if (!Array.isArray(sectionChanges)) return;
    
    // Ensure the section exists in remote
    if (!result[section]) {
      result[section] = [];
    }
    
    sectionChanges.forEach(change => {
      switch(change.operation) {
        case 'add':
          // Add new item (prepend to beginning)
          result[section].unshift(change.data);
          break;
          
        case 'update':
          // Update existing item
          const index = result[section].findIndex(item => item.id === change.id);
          if (index !== -1) {
            result[section][index] = change.data;
          } else {
            // If not found, add it
            result[section].unshift(change.data);
          }
          break;
          
        case 'delete':
          // Remove item
          result[section] = result[section].filter(item => item.id !== change.id);
          
          // Also add to deleted map for syncing to other PCs
          if (!result.deleted) result.deleted = {};
          if (!result.deleted[section]) result.deleted[section] = {};
          result.deleted[section][change.id] = change.data.deletedAt || new Date().toISOString();
          break;
      }
    });
    
    // Sort arrays to maintain consistency (newest first where applicable)
    if (['audit', 'sales', 'vehicles'].includes(section)) {
      result[section].sort((a, b) => {
        const dateA = a.date || a.ts || a.createdAt || '';
        const dateB = b.date || b.ts || b.createdAt || '';
        return dateB.localeCompare(dateA);
      });
    }
  });
  
  // Merge deleted maps
  if (db.deleted) {
    result.deleted = mergeDeletedMaps(result.deleted || {}, db.deleted);
  }
  
  return result;
}

// Helper to count total changes
function countChanges(changes) {
  let count = 0;
  Object.keys(changes).forEach(section => {
    if (Array.isArray(changes[section])) {
      count += changes[section].length;
    } else {
      count += 1; // For company changes
    }
  });
  return count;
}

/* ===== Role based fast views for multi-PC use =====
   Same shared database on PC1, but PC2/PC3 users only render their allowed tabs.
   This avoids heavy reports/FCA/audit/admin screens loading on sales PCs. */
const ROLE_TAB_PRESETS = {
  admin: TABS.slice(),
  sales: ['Dashboard','Vehicles','Sales','Sold','Complaints','Expenses','Showroom','To-Do'],
  staff: ['Dashboard','Vehicles','Sales','Sold','Complaints','Expenses','Showroom','To-Do'],

  basic: ['Dashboard','Vehicles','Sold','Complaints','To-Do'],
  viewer:['Dashboard','Vehicles','Sold']
};
function userRoleKey(u){ return String((u&&u.role)||'user').trim().toLowerCase(); }
function isAdminUser(u){ return userRoleKey(u)==='admin'; }
function rolePresetTabs(u){ return (ROLE_TAB_PRESETS[userRoleKey(u)] || ROLE_TAB_PRESETS.user).slice(); }
function allowedTabsForUser(u){
  if(!u) return [];
  const p = normalizePerms(u.perms);
  const roleTabs = isAdminUser(u) ? TABS.slice() : rolePresetTabs(u);
  return TABS.filter(t => roleTabs.includes(t) && p.tabs && p.tabs[t] !== false && (t !== 'Settings' || p.settings === true || isAdminUser(u)));
}

  if (sales.length){
    matchSale = sales.find(s => {
      const inv   = (s.invNo   || '').toString().toUpperCase();
      const buyer = (s.buyer   || '').toLowerCase();
      const phone = (s.phone   || '').replace(/\D+/g,'');
      return inv === up ||
             inv.includes(up) ||
             buyer.includes(low) ||
             (phoneDigits && phone && phone.indexOf(phoneDigits) !== -1);
    }) || null;
  }

  // 3) Try complaint by customer / reg
  if (complaints.length){
    matchComplaint = complaints.find(c =>
      (c.customer || '').toLowerCase().includes(low) ||
      normReg(c.vehicle || '') === normReg(up)
    ) || null;
  }

  if (matchVehicle){
    goToVehicleSearch(matchVehicle.reg || q);
  } else if (matchSale){
    goToSaleSearch(matchSale);
  } else if (matchComplaint){
    goToComplaintSearch(matchComplaint);
  } else {
    alert('No matching vehicle, sale or complaint found for "'+q+'".');
  }
}

    'Directors':'DIR','Investors':'INV','Users':'U','Alerts':'!','To-Do':'TD','Settings':'⚙'
  };

    {title:'Sales', tabs:['Sold','Credit','Purchase Invoice','Complaints']},
    {title:'Management', tabs:['Directors','Investors','Users']},
    {title:'Tools', tabs:['Alerts','To-Do','Settings']},
  ];

  function addGroup(title, list){
    if(!list.length) return;
    const h=document.createElement('div');
    h.className='appsGroupTitle';
    h.textContent=title;
    appsGrid.appendChild(h);

    list.forEach(t=>{
      used.add(t);
      const tile=document.createElement('div');
      tile.className='appsTile';
      tile.innerHTML = `<div class="appsIco">${ICON[t]||'•'}</div><div><div style="font-weight:800">${t}</div><div class="small" style="opacity:.8">Open</div></div>`;
      tile.onclick=()=>{ hideApps(); setTab(t); };
      appsGrid.appendChild(tile);
    });
  }

  GROUPS.forEach(g=>{
    const list = g.tabs.filter(t=>EXTRA.includes(t));
    addGroup(g.title, list);
  });

  // Any leftover tabs not in groups
  const leftovers = EXTRA.filter(t=>!used.has(t));

  const s = document.getElementById('appsSearch');

          n = n.nextElementSibling;
        }

      });
    });
  }
}

function dedupeVehiclesByReg(){
  // ✅ PRO FIX:
  // Do NOT dedupe by REG anymore, because the same reg can come back as PX later.
  // Only dedupe true duplicates by ID (same record repeated).
  if (!Array.isArray(db.vehicles)) return;

  const byId = Object.create(null);
  const out = [];

  for (const v of db.vehicles){
    if (!v) continue;

    // ensure id exists
    if (!v.id) v.id = uid();

    // if exact same id repeats, keep the newest (by createdAt/updatedAt)
    const id = v.id;
    if (!byId[id]){
      byId[id] = v;
    } else {
      const a = byId[id];
      const da = String(a.createdAt || a.updatedAt || '');
      const dv = String(v.createdAt || v.updatedAt || '');
      if (dv.localeCompare(da) > 0) byId[id] = v;
    }
  }

  // Keep stable order (newest first if createdAt exists)
  out.push(...Object.values(byId).sort((a,b)=>{
    const da = String(a.createdAt || a.updatedAt || '');
    const dbb = String(b.createdAt || b.updatedAt || '');
    return dbb.localeCompare(da);
  }));

  db.vehicles = out;
}

function normReg(x){
  return String(x||'').toUpperCase().replace(/\s+/g,'').trim();
}

function relinkVehicleRefsByReg(){
  // Build reg -> kept vehicleId map from CURRENT db.vehicles (after dedupe)
  const regToId = Object.create(null);
  (db.vehicles || []).forEach(v=>{
    const r = normReg(v && v.reg);
    if (r && v && v.id) regToId[r] = v.id;
  });

  // Helper: if record has vehicleId, try relink by reg field (or by lookup)
  const fixList = (arrName, getRegFn) => {
    if (!Array.isArray(db[arrName])) return;
    let changed = 0;
    db[arrName].forEach(rec=>{
      const reg = normReg(getRegFn(rec));
      if (!reg) return;
      const newVid = regToId[reg];
      
      const fixList = (arrName, getRegFn) => {
        if (!Array.isArray(db[arrName])) return;
        let changed = 0;

        db[arrName].forEach(rec=>{
          const reg = normReg(getRegFn(rec));
          if (!reg) return;

          const newVid = regToId[reg];

          // ✅ PRO FIX:
          // Only attach vehicleId if it's missing.
          // NEVER overwrite an existing vehicleId (that would destroy history).
          if (newVid && !rec.vehicleId){
            rec.vehicleId = newVid;
            changed++;
          }
        });

        return changed;
      };

      // If vehicleId missing but reg exists, attach it
      if (newVid && !rec.vehicleId){
        rec.vehicleId = newVid;
        changed++;
      }
    });
    return changed;
  };

  // SALES: infer reg from linked vehicle OR from fields if present
  fixList('sales', (s)=>{
    // try direct from vehicleId first
    const v = (db.vehicles||[]).find(x=>x.id===s.vehicleId);
    return (v && v.reg) || s.reg || '';
  });

  // VEHICLE EXPENSES: by vehicleId -> vehicle.reg
  fixList('vehicleExpenses', (e)=>{
    const v = (db.vehicles||[]).find(x=>x.id===e.vehicleId);
    return (v && v.reg) || e.reg || '';
  });

  // CREDITS: you store reg in UI as typed; but record may have vehicleId too
  fixList('credits', (c)=> c.reg || c.vehicleReg || '');

  // COMPLAINTS (if you store reg on complaint records)
  fixList('complaints', (c)=> c.reg || c.vehicleReg || '');

  // PURCHASE INVOICES (if they reference vehicles)
  fixList('purchaseInvoices', (p)=> p.reg || p.vehicleReg || '');

  // optional: keep db.sales consistent newest-first
  if (Array.isArray(db.sales)){
    db.sales.sort((a,b)=> String(b.date||'').localeCompare(String(a.date||'')));
  }
}

function dedupeSalesById(){

function dedupeShowroomExpenses(){
  if (!Array.isArray(db.showroomExpenses)) return;

  const seen = new Set();
  const out = [];

  const arr = db.showroomExpenses.slice().sort((a,b)=>{
    const da = String(a?.date || a?.ts || a?.createdAt || a?.updatedAt || '');
    const dbb = String(b?.date || b?.ts || b?.createdAt || b?.updatedAt || '');
    return dbb.localeCompare(da); // newest first
  });

  for (const x of arr){
    if (!x) continue;

    const key = [
      String(x.date||'').trim(),
      String(x.type||'').trim().toLowerCase(),
      String(x.method||'').trim().toLowerCase(),
      Number(x.amount||0).toFixed(2),
      String(x.note||x.desc||'').trim().toLowerCase()
    ].join('|');

    if (seen.has(key)) continue;
    seen.add(key);
    out.push(x);
  }

  db.showroomExpenses = out;
}

function calcBalances(){
  let bank=Number(db.company.openingBank||0), cash=Number(db.company.openingCash||0);
  (db.partners||[]).forEach(p=> (p.tx||[]).forEach(t=>{ if(t.method==='cash'){ if(t.type==='invest'||t.type==='profit') cash+=+t.amount||0; if(t.type==='withdraw') cash-=+t.amount||0; } else { if(t.type==='invest'||t.type==='profit') bank+=+t.amount||0; if(t.type==='withdraw') bank-=+t.amount||0; }}));
  (db.investors||[]).forEach(i=> (i.tx||[]).forEach(t=>{ if(t.method==='cash'){ if(t.type==='fund_in') cash+=+t.amount||0; if(t.type==='withdraw') cash-=+t.amount||0; } else { if(t.type==='fund_in') bank+=+t.amount||0; if(t.type==='withdraw') bank-=+t.amount||0; }}));
  (db.sales||[]).forEach(s=>{ cash+=+s.cash||0; bank+=+s.card||0; bank+=+s.bank||0; bank+=+s.finance||0; cash+=+s.deposit||0; });
  (db.vehicleExpenses||[]).forEach(e=>{ if((e.method||'bank')==='cash') cash-=+e.amount||0; else bank-=+e.amount||0; });
  (db.showroomExpenses||[]).forEach(e=>{ if((e.method||'bank')==='cash') cash-=+e.amount||0; else bank-=+e.amount||0; });
  (db.credits||[]).forEach(c=>{ if((c.method||'bank')==='cash') cash-=+c.amount||0; else bank-=+c.amount||0; });
  return {bank,cash};
}

/* ========= Invoice Number Helper ========= */
function getNextInvoiceNo() {
  const sales = db.sales || [];
  if (!sales.length) return '1000'; // starting number

  let maxNum = 999;

  sales.forEach(s => {
    const raw = (s.invNo == null ? '' : String(s.invNo)).trim();
    if (!raw) return;

    // ✅ Only use pure digits, and ignore silly-long numbers (e.g. 35454242)
    if (!/^\d+$/.test(raw)) return;     // skip if it has letters or symbols
    if (raw.length > 4) return;         // only count up to 4-digit invoices

    const n = parseInt(raw, 10);
    if (!isNaN(n) && n > maxNum) maxNum = n;
  });

  return String(maxNum + 1);
}

function syncSoldStatusFromSales() {
  const soldIds = new Set(
    (db.sales || [])
      .filter(s => {
        if (!s) return false;
        const st = String(s.saleStatus || s.status || 'completed').toLowerCase();
        // Only completed / sold and not refunded sales mark the car as SOLD
        return !s.refunded && (st === 'completed' || st === 'complete' || st === 'sold');
      })
      .map(s => s.vehicleId)
  );

  (db.vehicles || []).forEach(v => {
    if (!v) return;
    const currentStatus = String(v.status || '').toLowerCase();
    const shouldBeSold = soldIds.has(v.id);

    if (shouldBeSold) {
      v.status = 'sold';
    } else if (currentStatus === 'sold') {
      // If there is no qualifying sale any more, put it back For Sale
      v.status = 'for sale';
    }
  });
}

    const stock = (db.vehicles||[]).filter(v => (v.status||'for sale') !== 'sold');

    const b = motBucketsFromVehicles(stock);
    const set = (sel,val)=>{ const el=card.querySelector(sel); if(el) el.textContent=String(val); };

    set('#mot_expired', b.expired);
    set('#mot_30', b.d30);
    set('#mot_60', b.d60);
    set('#mot_90', b.d90);
    set('#mot_nomot', b.noMot);

    let currentList = [];

    function renderList(list, title){
      currentList = list || [];
      const out = card.querySelector('#mot_list_out');
      if(!out) return;

      const rows = currentList.slice(0,50).map(v=>{
        const exp = getMotExpiry(v);
        const expDisp = exp ? ddmmyyyy(exp) : '';
        const dt = daysToDate(exp);
        const daysTxt = (dt===null) ? '' : (dt<0 ? `(${dt}d)` : `(+${dt}d)`);
        return `<tr>
          <td>${(v.reg||'').toUpperCase()}</td>
          <td>${v.make||''}</td>
          <td>${v.model||''}</td>
          <td>${expDisp} ${daysTxt}</td>
        </tr>`;
      }).join('\n');

      out.innerHTML = `
        <div class="small"><b>${title}</b> (showing up to 50)</div>
        <table class="tbl">
          <tr><th>Reg</th><th>Make</th><th>Model</th><th>MOT</th></tr>
          ${rows || '<tr><td colspan="4">No vehicles found</td></tr>'}
        </table>
      `;
    }

    const bind = (btnSel, fn)=>{
      const el = card.querySelector(btnSel);
      if(el) el.onclick = fn;
    };

    bind('#mot_btn_exp', ()=> renderList(filterByMotDays(stock, -1), 'MOT Expired'));
    bind('#mot_btn_30', ()=> renderList(filterByMotDays(stock, 30), 'MOT ≤ 30 days'));
    bind('#mot_btn_60', ()=> renderList(filterByMotDays(stock, 60), 'MOT ≤ 60 days'));
    bind('#mot_btn_90', ()=> renderList(filterByMotDays(stock, 90), 'MOT ≤ 90 days'));
  
    const exportBtn = card.querySelector('#mot_export_csv');
    if (exportBtn) {
      exportBtn.onclick = () => {
        // currentList is the array shown by renderList(...) in this IIFE
        const list = currentList || [];
        if (!list.length) return alert('No vehicles in the current MOT list to export.');

        const headers = [
          'REG','Make','Model','Colour','Fuel','Mileage',
          'First Registration','Purchase Date','Purchase Price',
          'Owner Type','Investor','Status','Supplier','VIN','Last MOT Date','Last MOT Expiry','Last MOT Mileage'
        ];

        const esc = v => {
          const s = (v == null) ? '' : String(v);
          return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
        };

        const rows = list.map(v => [
          v.reg || '',
          v.make || '',
          v.model || '',
          v.colour || '',
          v.fuel || '',
          v.mileage || '',
          (v.firstReg ? ddmmyyyy(v.firstReg) : ''),
          (v.purchaseDate ? ddmmyyyy(v.purchaseDate) : ''),
          (v.purchase != null ? Number(v.purchase).toFixed(2) : ''),
          v.ownerType || '',
          v.investor || '',
          v.status || '',
          v.supplier || '',
          v.vin || '',
          (v.lastMotDate ? ddmmyyyy(v.lastMotDate) : ''),
          (ddmmyyyy(v.lastMotExpiry || v.motExpiry || '')),
          v.lastMotMileage || ''
        ]);

        const csv = [headers.join(',')]
          .concat(rows.map(r => r.map(esc).join(',')))
          .join('\n');

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `mot_stock_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(()=>URL.revokeObjectURL(url), 10000);

        if (typeof addAudit === 'function') addAudit('export','mot','',`Exported ${list.length} vehicles from MOT list`);
      };
    }
  })();
  
  const sum=(arr,p)=>(arr||[]).reduce((t,x)=>t+Number(p?p(x):x||0),0);
  let dashCurrentVehicleId = '';
  
  function escHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  let dashEditingExpenseId = '';

  function resetDashboardExpenseForm(){
    const dateEl = card.querySelector('#dash_qe_date');
    const typeEl = card.querySelector('#dash_qe_type');
    const methodEl = card.querySelector('#dash_qe_method');
    const amtEl = card.querySelector('#dash_qe_amt');
    const noteEl = card.querySelector('#dash_qe_note');
    const addBtn = card.querySelector('#dash_qe_add');
    const cancelBtn = card.querySelector('#dash_qe_cancel');
    const titleEl = card.querySelector('#dash_qe_title');
    const msgEl = card.querySelector('#dash_qe_msg');

    dashEditingExpenseId = '';
    if(dateEl) dateEl.value = new Date().toISOString().slice(0,10);
    if(typeEl) typeEl.value = '';
    if(methodEl) methodEl.value = 'bank';
    if(amtEl) amtEl.value = '';
    if(noteEl) noteEl.value = '';
    if(addBtn) addBtn.textContent = 'Add Expense';
    if(cancelBtn) cancelBtn.style.display = 'none';
    if(titleEl) titleEl.textContent = 'Quick Add Vehicle Expense';
    if(msgEl) msgEl.innerHTML = '';
  }

  function startDashboardExpenseEdit(expenseId){
    const e = (db.vehicleExpenses || []).find(x => x.id === expenseId);
    const msg = card.querySelector('#dash_qe_msg');
    if(!e){
      if(msg) msg.innerHTML = '<span class="small" style="color:#ff6b6b">Expense not found.</span>';
      return;
    }

    dashEditingExpenseId = expenseId;
    const dateEl = card.querySelector('#dash_qe_date');
    const typeEl = card.querySelector('#dash_qe_type');
    const methodEl = card.querySelector('#dash_qe_method');
    const amtEl = card.querySelector('#dash_qe_amt');
    const noteEl = card.querySelector('#dash_qe_note');
    const addBtn = card.querySelector('#dash_qe_add');
    const cancelBtn = card.querySelector('#dash_qe_cancel');
    const titleEl = card.querySelector('#dash_qe_title');

    if(dateEl) dateEl.value = e.date || new Date().toISOString().slice(0,10);
    if(typeEl) typeEl.value = e.type || '';
    if(methodEl) methodEl.value = e.method || 'bank';
    if(amtEl) amtEl.value = e.amount || '';
    if(noteEl) noteEl.value = e.note || '';
    if(addBtn) addBtn.textContent = 'Update Expense';
    if(cancelBtn) cancelBtn.style.display = 'inline-flex';
    if(titleEl) titleEl.textContent = 'Edit Vehicle Expense';
    if(msg) msg.innerHTML = '<span class="small" style="color:#f59e0b">Editing selected expense. Update it or press cancel.</span>';
  }

  function deleteDashboardExpense(expenseId){
    const msg=card.querySelector('#dash_qe_msg');
    const e = (db.vehicleExpenses || []).find(x => x.id === expenseId);
    const v = (db.vehicles||[]).find(x=>x.id===dashCurrentVehicleId);

    if(!e || !v){
      if(msg) msg.innerHTML = '<span class="small" style="color:#ff6b6b">Expense not found.</span>';
      return;
    }
    if(!canAction('delete')){
      if(msg) msg.innerHTML = '<span class="small" style="color:#ff6b6b">No permission to delete expense.</span>';
      return;
    }
    if(!confirm(`Delete expense ${e.type || ''} ${fmtMoney(e.amount || 0)} from ${String(v.reg||'').toUpperCase()}?`)) return;

    if(typeof markDeleted === 'function'){
      try{ markDeleted('vehicleExpenses', expenseId); }catch(err){}
    }
    db.vehicleExpenses = (db.vehicleExpenses || []).filter(x => x.id !== expenseId);
    addAudit('delete','vehicleExpense',expenseId,(v.reg||'')+' '+(e.type||'')+' '+(e.amount||0));
    saveDB();
    try{ renderAlertBell(); }catch(err){}

    if(dashEditingExpenseId === expenseId) resetDashboardExpenseForm();
    showResultByReg(v.reg || '');
    const msg2=card.querySelector('#dash_qe_msg');
    if(msg2) msg2.innerHTML = `<span class="small" style="color:#2ecc71">Expense deleted from <b>${escHtml((v.reg||'').toUpperCase())}</b>.</span>`;
  }

  function addDashboardExpense(){
    const out=card.querySelector('#dash_result');
    const msg=card.querySelector('#dash_qe_msg');
    const vehicleId = dashCurrentVehicleId;
    const v = (db.vehicles||[]).find(x=>x.id===vehicleId);

    if(!v){
      if(msg) msg.innerHTML = '<span class="small" style="color:#ff6b6b">Please show a vehicle first.</span>';
      return;
    }

    const isEdit = !!dashEditingExpenseId;
    if(!canAction(isEdit ? 'edit' : 'add')){
      if(msg) msg.innerHTML = `<span class="small" style="color:#ff6b6b">No permission to ${isEdit ? 'edit' : 'add'} expense.</span>`;
      return;
    }

    const dateEl = card.querySelector('#dash_qe_date');
    const typeEl = card.querySelector('#dash_qe_type');
    const methodEl = card.querySelector('#dash_qe_method');
    const amtEl = card.querySelector('#dash_qe_amt');
    const noteEl = card.querySelector('#dash_qe_note');

    const date = (dateEl?.value || '').trim();
    const type = (typeEl?.value || '').trim();
    const method = (methodEl?.value || 'bank').trim() || 'bank';
    const amount = Number(amtEl?.value || 0);
    const note = (noteEl?.value || '').trim();

    if(!date || !type || !(amount > 0)){
      if(msg) msg.innerHTML = '<span class="small" style="color:#ff6b6b">Date, type and amount are required.</span>';
      return;
    }

    if(isEdit){
      const oldE = (db.vehicleExpenses || []).find(x => x.id === dashEditingExpenseId);
      if(!oldE){
        if(msg) msg.innerHTML = '<span class="small" style="color:#ff6b6b">Expense to edit was not found.</span>';
        return;
      }
      const updated = { ...oldE, vehicleId, date, type, method, amount, note };
      db.vehicleExpenses = (db.vehicleExpenses || []).map(x => x.id === dashEditingExpenseId ? updated : x);
      addAudit('update','vehicleExpense',updated.id,(v.reg||'')+' '+updated.type+' '+updated.amount);
      saveDB();
      try{ renderAlertBell(); }catch(e){}
      const reg = v.reg || '';
      resetDashboardExpenseForm();
      dashCurrentVehicleId = vehicleId;
      showResultByReg(reg);
      const msg2=card.querySelector('#dash_qe_msg');
      if(msg2) msg2.innerHTML = `<span class="small" style="color:#2ecc71">Expense updated for <b>${escHtml((reg||'').toUpperCase())}</b>.</span>`;
      return;
    }

    const e = { id: uid(), vehicleId, date, type, method, amount, note };
    (db.vehicleExpenses = db.vehicleExpenses || []).unshift(e);
    addAudit('add','vehicleExpense',e.id,(v.reg||'')+' '+e.type+' '+e.amount);
    saveDB();
    try{ renderAlertBell(); }catch(e){}

    if(typeEl) typeEl.value='';
    if(amtEl) amtEl.value='';
    if(noteEl) noteEl.value='';

    dashCurrentVehicleId = vehicleId;
    showResultByReg(v.reg || '');
    const msg2=card.querySelector('#dash_qe_msg');
    if(msg2) msg2.innerHTML = `<span class="small" style="color:#2ecc71">Expense added to <b>${escHtml((v.reg||'').toUpperCase())}</b>.</span>`;
  }
  
  function showResultByReg(reg){
    reg=(reg||'').toUpperCase().trim(); 
    const v=(typeof findVehicleByReg==='function' ? findVehicleByReg(reg) : (db.vehicles||[]).find(x=>(x.reg||'').toUpperCase()===reg));
    const out=card.querySelector('#dash_result'); 
    
    if(!v){ 
      dashCurrentVehicleId='';
      out.innerHTML='<span class="small">No vehicle found.</span>'; 
      return; 
    }

    dashCurrentVehicleId = v.id || '';
    
    const vexp=(db.vehicleExpenses||[]).filter(e=>e.vehicleId===v.id); 
    const totalExp=sum(vexp,e=>e.amount); 
    const totalCost=Number(v.purchase||0)+totalExp;
    
    let mediaHtml='';
    if((v.media||[]).length){ 
      mediaHtml += '<div class="previewStrip">'+v.media.map(u=>`<img src="${u}" alt="media">`).join('')+'</div>'; 
    }
    if(v.video){ 
      mediaHtml += `<div class="small">YouTube: ${v.video}</div>`; 
    }
    
    // Check if this vehicle was sold and generated a part-exchange
    let saleInfo = '';
    const generatedPx = db.vehicles.find(vh => vh.originalSaleId && vh.originalSaleId === v.id);
    if (generatedPx) {
      saleInfo = `
        <tr>
          <th>Generated Part-exchange</th>
          <td>
            Vehicle was sold and customer traded in: ${generatedPx.reg}
            <br>
            <small style="color:#ff6b6b;">
              Part-ex vehicle: ${generatedPx.make || ''} ${generatedPx.model || ''}
              <br>
              Part-ex value: ${fmtMoney(generatedPx.purchase || 0)}
              <br>
              ${generatedPx.status === 'sold' ? '⚠️ Part-ex already sold' : '✅ Part-ex in stock'}
            </small>
          </td>
        </tr>
      `;
    }
    
    // Read selected sort from dropdown
    const expSortEl = card.querySelector('#dash_exp_sort');
    let vexpSorted = vexp.slice(); // clone array to not affect the original
    if (expSortEl && expSortEl.value === 'low') {
      vexpSorted.sort((a, b) => Number(a.amount || 0) - Number(b.amount || 0));
    } else if (expSortEl && expSortEl.value === 'high') {
      vexpSorted.sort((a, b) => Number(b.amount || 0) - Number(a.amount || 0));
    }
    let rows = vexpSorted.map(e => `<tr>
      <td>${ddmmyyyy(e.date||'')}</td>
      <td>${escHtml(e.type||'')}</td>
      <td>${escHtml(e.method||'bank')}</td>
      <td class="right">${fmtMoney(e.amount)}</td>
      <td>${escHtml(e.note||'')}</td>
      <td class="right">
        <button class="smallBtn" type="button" data-dash-exp-edit="${escHtml(e.id||'')}">Edit</button>
        <button class="smallBtn danger" type="button" data-dash-exp-del="${escHtml(e.id||'')}">Delete</button>
      </td>
    </tr>`).join('\n');
    if(!rows) rows='<tr><td colspan="6" class="small">No expenses yet</td></tr>';
    
    out.innerHTML=`<div class="row"><span class="badge">${v.status||'for sale'}</span>&nbsp;<b>${escHtml(v.reg)}</b>&nbsp;${escHtml(v.make||'')} ${escHtml(v.model||'')}</div>
      ${mediaHtml}
      <div class="tableWrap">
      <table class="table">
      <tr><th style="width:220px">Purchase</th><td class="right">${fmtMoney(v.purchase||0)}</td></tr>
      <tr><th>Total Expenses</th><td class="right">${fmtMoney(totalExp)}</td></tr>
      <tr><th>Total Cost (incl. expenses)</th><td class="right">${fmtMoney(totalCost)}</td></tr>
      ${v.supplier === 'PART-EX' ? `<tr><th>Supplier Type</th><td>PART-EX</td></tr>` : ''}
      ${v.supplierNote ? `<tr><th>Supplier Note</th><td>${escHtml(v.supplierNote)}</td></tr>` : ''}
      ${saleInfo}
      </tbody></table></div>

      <div class="card" style="margin-top:10px">
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:10px">
          <h4 id="dash_qe_title" style="margin:0">Quick Add Vehicle Expense</h4>
          <button id="dash_qe_cancel" type="button" style="display:none">Cancel Edit</button>
        </div>
        <div class="row">
          <label><span class="small">Date</span><input id="dash_qe_date" type="date" value="${new Date().toISOString().slice(0,10)}"></label>
          <label><span class="small">Type</span><input id="dash_qe_type" placeholder="Tyre / Service / Repair"></label>
          <label><span class="small">Method</span><select id="dash_qe_method"><option value="bank">bank</option><option value="cash">cash</option></select></label>
          <label><span class="small">Amount</span><input id="dash_qe_amt" type="number" min="0" step="0.01" placeholder="0.00"></label>
          <label style="flex:1;min-width:260px"><span class="small">Note</span><input id="dash_qe_note" placeholder="Optional note"></label>
          <button id="dash_qe_add" class="primary" type="button" style="align-self:end">Add Expense</button>
        </div>
        <div id="dash_qe_msg" style="margin-top:8px"></div>
      </div>

      <h4>Expenses</h4><div class="tableWrap"><table class="table"><thead><tr><th>Date</th><th>Type</th><th>Method</th><th class="right">Amount</th><th>Note</th><th class="right">Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;

    const addBtn = card.querySelector('#dash_qe_add');
    if(addBtn) addBtn.onclick = addDashboardExpense;
    const cancelBtn = card.querySelector('#dash_qe_cancel');
    if(cancelBtn) cancelBtn.onclick = resetDashboardExpenseForm;
    out.querySelectorAll('[data-dash-exp-edit]').forEach(btn=>{
      btn.onclick = ()=> startDashboardExpenseEdit(btn.getAttribute('data-dash-exp-edit'));
    });
    out.querySelectorAll('[data-dash-exp-del]').forEach(btn=>{
      btn.onclick = ()=> deleteDashboardExpense(btn.getAttribute('data-dash-exp-del'));
    });
  }
  
  card.querySelector('#dash_show').onclick=()=>showResultByReg(card.querySelector('#dash_reg').value);
  card.querySelector('#dash_reg').addEventListener('change',()=>showResultByReg(card.querySelector('#dash_reg').value));
  card.querySelector('#dash_reg').addEventListener('keydown',(e)=>{ if(e.key==='Enter') showResultByReg(card.querySelector('#dash_reg').value); });
  card.querySelector('#dash_exp_sort').addEventListener('change',()=>showResultByReg(card.querySelector('#dash_reg').value));

  return card;
}

    function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

    async function fetchLatestMot(reg){
      const url = db.company.dvsaProxy || '';
      if (!url) throw new Error('Add DVSA / MOT Proxy URL in Settings first.');

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ reg })
      });

      const text = await res.text();
      if (!res.ok) throw new Error('DVSA error ' + res.status + ': ' + text);

      let data;
      try { data = JSON.parse(text); } catch(e){ throw new Error('DVSA returned invalid JSON'); }

      // ✅ Accept both array and single-object formats
      if (!Array.isArray(data)) {
        if (data && typeof data === 'object' && data.motTests) data = [data];
        else if (Array.isArray(data.data)) data = data.data; // if your worker wraps: {data:[...]}
      }

      if (!Array.isArray(data) || !data.length) return null;

      const vehicle = data[0];
      const tests = vehicle.motTests || [];
      const latest = tests[0] || null;

      return { vehicle, latest };
    }

    const bulkBtn = wrap.querySelector('#veh_mot_refresh');
    const progEl = wrap.querySelector('#veh_mot_progress');

    if (bulkBtn) {
      bulkBtn.onclick = async () => {
        if (!confirm('Update MOT expiry for ALL vehicles? (This will take a few minutes)')) return;

        try {
          bulkBtn.disabled = true;

          const list = (db.vehicles || [])
            .filter(v => String(v.reg || '').trim())
            // default: only update in-stock vehicles (status not sold)
            .filter(v => String(v.status || '').toLowerCase() !== 'sold');

          let ok = 0, fail = 0, skipped = 0;

          for (let i = 0; i < list.length; i++) {
            const v = list[i];
            const reg = String(v.reg || '').trim().toUpperCase();

            if (progEl) progEl.textContent = `Checking ${i + 1}/${list.length}: ${reg}`;

            try {
              const out = await fetchLatestMot(reg);

              if (!out || !out.latest) { skipped++; }
              else {
                const latest = out.latest;

                v.lastMotDate = latest.completedDate || v.lastMotDate || '';
                v.lastMotExpiry = latest.expiryDate || v.lastMotExpiry || '';
                v.lastMotMileage = latest.odometerValue || v.lastMotMileage || '';

                // ✅ auto-fill main motExpiry so your warnings/filters work everywhere
                v.motExpiry = latest.expiryDate || v.motExpiry || '';
                v.lastMotExpiry = v.motExpiry || v.lastMotExpiry || '';
                v.motUpdatedAt = new Date().toISOString();
                v.updatedAt = v.motUpdatedAt;

                ok++;
              }
            } catch (e) {
              fail++;
            }

            // ✅ throttle to avoid DVSA/proxy rate limits
            await sleep(1200);
          }

          saveDB();
          try { renderAlertBell(); } catch(e) {}

          alert(`MOT refresh complete.\n\nUpdated: ${ok}\nSkipped (no tests): ${skipped}\nFailed: ${fail}`);
        } finally {
          if (progEl) progEl.textContent = '';
          bulkBtn.disabled = false;
          // refresh the table view
          try { rows(); } catch(e) {}
        }
      };
    }
  }

  }

  originalSaleId: wrap.querySelector('#v_originalSaleId') ? wrap.querySelector('#v_originalSaleId').value : (db.vehicles.find(x=>x.id===editId)?.originalSaleId || null),

  status:wrap.querySelector('#v_status').value,

  readyForSale: !!wrap.querySelector('#v_readyForSale')?.checked,
  prepStage: (wrap.querySelector('#v_prepStage')?.value || 'None'),
  notReadyReason: (wrap.querySelector('#v_notReadyReason')?.value || '').trim(),
  prepNotes: (wrap.querySelector('#v_prepNotes')?.value || '').trim(),

  updatedAt: new Date().toISOString(),
  createdAt:(db.vehicles.find(x=>x.id===editId)?.createdAt)||new Date().toISOString(), 
  lastMotDate: (db.vehicles.find(x=>x.id===editId)?.lastMotDate) || '',
  lastMotExpiry: wrap.querySelector('#v_motExpiry').value || (db.vehicles.find(x=>x.id===editId)?.lastMotExpiry) || '',
  lastMotMileage: (db.vehicles.find(x=>x.id===editId)?.lastMotMileage) || '',
  motUpdatedAt: (db.vehicles.find(x=>x.id===editId)?.motUpdatedAt) || '',
  };
    normalizeVehicleMotFields(v);
    if (v.motExpiry && v.motExpiry !== (db.vehicles.find(x=>x.id===editId)?.motExpiry || '')) {
      v.motUpdatedAt = v.updatedAt;
    }
    if (!v.motExpiry) {

      v.lastMotDate = '';
      v.lastMotMileage = '';
      v.motUpdatedAt = '';
    }
    if(editId){ const i=db.vehicles.findIndex(x=>x.id===editId); db.vehicles[i]=v; saveDB(); try{renderAlertBell();}catch(e){}; addAudit('update','vehicle',v.id,v.reg+' '+(v.make||'')+' '+(v.model||'')); editId=null; }
    else { db.vehicles.unshift(v); saveDB(); try{renderAlertBell();}catch(e){}; addAudit('add','vehicle',v.id,v.reg+' '+(v.make||'')+' '+(v.model||'')); }
    rows(); ['v_reg','v_make','v_model','v_notReadyReason','v_prepNotes','v_colour','v_fuel','v_engineSize','v_mileage','v_purchase','v_purchaseDate','v_firstReg','v_investor','v_supplier','v_vin','v_motExpiry'].forEach(k=>document.getElementById(k).value='');
    
    document.getElementById('v_prepStage').value='None';

// --- Expenses (with REG autocomplete) ---
function viewExpenses(){ if(!canTab('Expenses')) return document.createElement('div'); const wrap=document.createElement('div'); wrap.className='card';
  wrap.innerHTML=`<h2>Expenses (per vehicle)</h2>
  <div class="row">
    <label>Vehicle REG
      <datalist id="e_reg_list">
        ${(db.vehicles||[]).map(v=>`<option value="${(v.reg||'').toUpperCase()}">`).join('')}
      </datalist>
      <input id="e_vehicle" list="e_reg_list" placeholder="Type REG…" style="min-width:220px">
    </label>
    <label id="e_cycleWrap" style="display:none;min-width:260px">
      Cycle
      <select id="e_cycle"></select>
    </label>
    <div id="e_vehicleInfo"  class="small" style="color:#9fb4ff; margin-left:6px;">
      Select a reg to see vehicle details
    </div>
    <input id="e_date" type="date"><input id="e_type" placeholder="Type (MOT/Repairs/Delivery/Advertising/Fuel…)"><select id="e_method"><option>bank</option><option>cash</option></select>
    <input id="e_amt" type="number" placeholder="Amount"><input id="e_note" placeholder="Note"><button id="e_add" class="primary">Add</button></div>
  <div class="row"><input id="e_search" placeholder="Search by reg to total (live calc)"></div>
  <div class="small" id="e_totHint"></div>
  <table class="table" style="margin-top:10px"><thead><tr><th>Reg</th><th>Date</th><th>Type</th><th>Method</th><th class="right">Amount</th><th>Note</th><th>Actions</th></tr></thead><tbody id="e_body"></tbody></table>`;
  const ebody=wrap.querySelector('#e_body'); let editId=null;
  const eCycleWrap = wrap.querySelector('#e_cycleWrap');
  const eCycle = wrap.querySelector('#e_cycle');

  function bestLabelForCycle(v){
    const pd = v.purchaseDate || v.createdAt || '';
    const status = String(v.status||'').toLowerCase();
    // Find sold date if any (for history clarity)
    const sale = (db.sales||[]).find(s => s.vehicleId === v.id);
    const soldDate = sale && sale.date ? sale.date : '';
    const parts = [];
    if(v.stockRef) parts.push(v.stockRef);
    if(pd) parts.push('Buy/PX: ' + ddmmyyyy(pd));
    if(status) parts.push(status.toUpperCase());
    if(soldDate) parts.push('Sold: ' + ddmmyyyy(soldDate));
    return parts.join(' • ') || (v.reg || '');
  }

  function vehiclesForRegSorted(reg){
    const list = vehiclesByReg(reg);
    if(!list.length) return [];
    const score = (v)=>{
      const inStock = String(v.status||'').toLowerCase() !== 'sold';
      const d = v.purchaseDate || v.createdAt || '';
      return (inStock ? 10_000_000_000 : 0) + (d ? (Date.parse(d) || 0) : 0);
    };
    return list.slice().sort((a,b)=> score(b)-score(a));
  }

  function updateCycleSelector(){
    if(!eCycleWrap || !eCycle) return;

    const reg = (wrap.querySelector('#e_vehicle').value || '').trim().toUpperCase();
    const list = vehiclesForRegSorted(reg);

    if(list.length <= 1){
      eCycleWrap.style.display = 'none';
      eCycle.innerHTML = '';
      if(list[0]){
        // keep a hidden selected value so expense attaches correctly
        eCycle.innerHTML = `<option value="${list[0].id}">${bestLabelForCycle(list[0])}</option>`;
        eCycle.value = list[0].id;
      }
      return;
    }

    eCycleWrap.style.display = '';
    eCycle.innerHTML = list.map(v=>`<option value="${v.id}">${bestLabelForCycle(v)}</option>`).join('\n');
    // default = newest in-stock (already sorted)
    eCycle.value = list[0].id;
  }

  function getSelectedVehicle(){
    const reg = (wrap.querySelector('#e_vehicle').value || '').trim().toUpperCase();
    if(!reg) return null;

    // If cycle selector is visible/useful, trust it
    if(eCycle && eCycle.value){
      const v = (db.vehicles||[]).find(x=>x.id===eCycle.value);
      if(v) return v;
    }

    return findVehicleByReg(reg);
  }


  function renderExpenseVehicleInfo(){
    const reg = (wrap.querySelector('#e_vehicle').value || '').trim().toUpperCase();
    const info = wrap.querySelector('#e_vehicleInfo');
    if(!info) return;

    if(!reg){
      info.textContent = 'Select a reg to see vehicle details';
      return;
    }

    const v = getSelectedVehicle(); // supports cycles (re-acquired / PX)
    if(!v){
      info.textContent = 'Reg not found in Vehicles';
      return;
    }

    // Build a nice summary line
    const bits = [
      v.make ? v.make : '',
      v.model ? v.model : '',
      v.colour ? ('| ' + v.colour) : '',
      v.fuel ? ('| ' + v.fuel) : '',
      (v.mileage!=null && v.mileage!=='') ? ('| ' + Number(v.mileage).toLocaleString() + ' miles') : '',
    ].filter(Boolean).join('\n');

    info.textContent = (v.reg||reg) + ' — ' + bits;
  }

  // Update live while typing / selecting
  wrap.querySelector('#e_vehicle').addEventListener('input', ()=>{ updateCycleSelector(); renderExpenseVehicleInfo(); });
  if(eCycle){ eCycle.addEventListener('change', renderExpenseVehicleInfo); }


  // Call once on load (in case field already has a value)
  updateCycleSelector();
  renderExpenseVehicleInfo();

  function rows(list=db.vehicleExpenses){ ebody.innerHTML=''; list.forEach(e=>{ const v=db.vehicles.find(x=>x.id===e.vehicleId)||{}; const tr=document.createElement('tr');
    tr.innerHTML=`<td>${v.reg||''}${v.stockRef?`<div class="small">${escapeHtml(v.stockRef)}</div>`:''}</td><td>${ddmmyyyy(e.date)}</td><td>${e.type||''}</td><td>${e.method||'bank'}</td><td class="right">${fmtMoney(e.amount)}</td><td>${e.note||''}</td>
    <td>${canAction('edit')?`<button data-act="edit" data-id="${e.id}">Edit</button>`:''} ${canAction('del')?`<button class="danger" data-act="del" data-id="${e.id}">Delete</button>`:''}</td>`; ebody.appendChild(tr); }); }
  rows();
  wrap.querySelector('#e_add').onclick=()=>{ if(!canAction('add')) return alert('No permission');
    const regInput=(wrap.querySelector('#e_vehicle').value||'').toUpperCase().trim();
    const selId = (eCycle && eCycle.value) ? eCycle.value : null;
    const vid = selId || findVehicleIdByReg(regInput);
    if(!vid){ return alert('Enter a valid REG from the suggestions');
    // ✅ Block duplicate sales (manual typing protection)
    const vCheck = (db.vehicles || []).find(x => x.id === vid);
    const alreadySold = vCheck && String(vCheck.status || '').toLowerCase() === 'sold';
    const alreadyHasSale = (db.sales || []).some(sx => sx.vehicleId === vid && sx.id !== editId);

      if (!editId && (alreadySold || alreadyHasSale)) {
      return alert('This vehicle is already sold. You cannot record another sale for it.');
      }

    }
    const e={id:editId||uid(),vehicleId:vid,date:wrap.querySelector('#e_date').value,type:wrap.querySelector('#e_type').value.trim(),method:wrap.querySelector('#e_method').value,amount:Number(wrap.querySelector('#e_amt').value||0),note:wrap.querySelector('#e_note').value.trim()};
    if(editId){ db.vehicleExpenses=db.vehicleExpenses.map(x=>x.id===editId?e:x); addAudit('update','vehicleExpense',e.id,(db.vehicles.find(x=>x.id===e.vehicleId)||{}).reg+' '+e.type+' '+e.amount); editId=null; }
    else{ db.vehicleExpenses.unshift(e); addAudit('add','vehicleExpense',e.id,(db.vehicles.find(x=>x.id===e.vehicleId)||{}).reg+' '+e.type+' '+e.amount); }
    saveDB(); try{renderAlertBell();}catch(e){}; rows(); wrap.querySelector('#e_type').value=''; wrap.querySelector('#e_amt').value=''; wrap.querySelector('#e_note').value=''; hint();
  };
  wrap.addEventListener('click',(ev)=>{ const b=ev.target.closest('button'); if(!b) return; const id=b.dataset.id,act=b.dataset.act;
  if(act==='del'){ 
    if(!canAction('del')) return alert('No permission'); 
    const delE = db.vehicleExpenses.find(x=>x.id===id); 
    if(!confirm('Delete expense?')) return; 

    // track vehicle expense deletion
    markDeleted('vehicleExpenses', id);

    db.vehicleExpenses = db.vehicleExpenses.filter(x=>x.id!==id); 
    saveDB(); 
    try{renderAlertBell();}catch(e){}; 
    addAudit('delete','vehicleExpense',id,delE?delE.type+' '+delE.amount:'');

  }
  else if(act==='edit'){ if(!canAction('edit')) return alert('No permission'); const e=db.vehicleExpenses.find(x=>x.id===id); editId=id; const v=db.vehicles.find(x=>x.id===e.vehicleId)||{}; wrap.querySelector('#e_vehicle').value=(v.reg||'').toUpperCase(); updateCycleSelector(); if(eCycle){ eCycle.value = e.vehicleId; } renderExpenseVehicleInfo(); wrap.querySelector('#e_date').value=e.date; wrap.querySelector('#e_type').value=e.type||''; wrap.querySelector('#e_method').value=e.method||'bank'; wrap.querySelector('#e_amt').value=e.amount||0; wrap.querySelector('#e_note').value=e.note||''; document.getElementById('app').scrollIntoView({ behavior: 'smooth' });}
  });
  function hint(){ const bal=calcBalances(); wrap.querySelector('#e_totHint').textContent='Live balance after expenses — Bank: '+fmtMoney(bal.bank)+' | Cash: '+fmtMoney(bal.cash); }
  hint();
  wrap.querySelector('#e_search').addEventListener('input',(e)=>{ const q=(e.target.value||'').toUpperCase().trim(); if(!q){ rows(); return; } const vids=db.vehicles.filter(v=>(v.reg||'').toUpperCase().includes(q)).map(v=>v.id);
    const filtered=(db.vehicleExpenses||[]).filter(x=>vids.includes(x.vehicleId)); rows(filtered); const tot=filtered.reduce((t,x)=>t+Number(x.amount||0),0); const tr=document.createElement('tr'); tr.innerHTML=`<td colspan="7" class="right"><b>Total for ${q}: ${fmtMoney(tot)}</b></td>`; ebody.appendChild(tr); });
  return wrap;
}

  (function initSalesWizard(){
    const panes = [...wrap.querySelectorAll('[data-sale-step]')];
    const pills = [...wrap.querySelectorAll('[data-pill]')];
    const btnPrev = wrap.querySelector('#sales_prev');
    const btnNext = wrap.querySelector('#sales_next');
    const btnEasy = wrap.querySelector('#sales_mode_easy');
    const btnFull = wrap.querySelector('#sales_mode_full');
    const btnQuickNext = wrap.querySelector('#sales_next_from_vehicle');
    const btnSave = wrap.querySelector('#sale_add');
    let step = 1;
    let fullMode = false;
    function updateSalesWizardFocus(){
      const recordingOnly = (!fullMode && step >= 2);
      ['#sales_search_panel','#sales_debtors_panel','#sales_history_table','#sales_summary','#proforma_box'].forEach(sel=>{
        const el = wrap.querySelector(sel);
        if(el){ el.style.display = recordingOnly ? 'none' : ''; }
      });
    }
    function renderWizard(){
      panes.forEach(p=>{
        const n = Number(p.getAttribute('data-sale-step')||0);
        p.classList.toggle('active', fullMode || n === step);
        p.style.display = (fullMode || n === step) ? '' : 'none';
      });
      pills.forEach(p=>{
        const n = Number(p.getAttribute('data-pill')||0);
        p.classList.toggle('active', fullMode ? true : n === step);
      });
      if(btnPrev){ btnPrev.style.display = fullMode ? 'none' : ''; btnPrev.disabled = step <= 1; }
      if(btnNext){ btnNext.style.display = fullMode ? 'none' : ''; btnNext.disabled = step >= 4; btnNext.textContent = step >= 4 ? 'Review complete' : 'Next'; }
      if(btnSave){ btnSave.textContent = 'Record / Update'; }
      if(btnEasy){ btnEasy.className = fullMode ? 'small' : 'primary small'; }
      if(btnFull){ btnFull.className = fullMode ? 'primary small' : 'small'; }
      updateSalesWizardFocus();
    }
    function goToStep(n){
      step = Math.max(1, Math.min(4, Number(n||1)));
      renderWizard();
    }
    if(btnPrev) btnPrev.addEventListener('click', ()=>goToStep(step-1));
    if(btnNext) btnNext.addEventListener('click', ()=>goToStep(step+1));
    if(btnQuickNext) btnQuickNext.addEventListener('click', ()=>goToStep(2));
    pills.forEach(p=>p.addEventListener('click', ()=>{ if(!fullMode) goToStep(p.getAttribute('data-pill')); }));
    if(btnEasy) btnEasy.addEventListener('click', ()=>{ fullMode = false; renderWizard(); });
    if(btnFull) btnFull.addEventListener('click', ()=>{ fullMode = true; renderWizard(); });
    wrap._salesWizard = {
      goToStep,
      setFullMode(v){ fullMode = !!v; renderWizard(); },
      reset(){ step = 1; fullMode = false; renderWizard(); }
    };
    renderWizard();
  })();

  const finSel = wrap.querySelector('#sale_finCoList');
  
  let editId=null;

    let currentFilter = {
    search: '',
    month: '',          // Empty by default instead of current month
    showPending: false  // Proforma / Cancelled / Unwound
  };
  
  // Set default month to empty (show all time)
  wrap.querySelector('#sales_month').value = currentFilter.month;
  
    function getFilteredSales() {
    let sales = (db.sales || []).filter(s => {
      if (!s) return false;
      const st = String(s.status || 'completed').toLowerCase();

      // Always show completed sales (whether refunded or not)
      if (st === 'completed') return true;

      // Only show Proforma / Cancelled / Unwound if toggle is ON
      if (currentFilter.showPending) {
        return st === 'proforma' || st === 'cancelled' || st === 'unwound';
      }

      return false;
    });

    // Apply month filter if specified
    if (currentFilter.month) {
      sales = sales.filter(s => ymStr(s.date) === currentFilter.month);
    }

    // Apply search filter if specified
    if (currentFilter.search) {
      const searchTerm = currentFilter.search.toLowerCase();
      sales = sales.filter(s => {
        const v = (db.vehicles || []).find(x => x.id === s.vehicleId) || {};
        return (
          (v.reg || '').toLowerCase().includes(searchTerm) ||
          (v.make || '').toLowerCase().includes(searchTerm) ||
          (v.model || '').toLowerCase().includes(searchTerm) ||
          (s.buyer || '').toLowerCase().includes(searchTerm) ||
          String(s.invNo || '').toLowerCase().includes(searchTerm) ||
          (s.phone || '').toLowerCase().includes(searchTerm) ||
          (s.email || '').toLowerCase().includes(searchTerm)
        );
      });
    }

    sales.sort((a, b) => {
      const stA = String(a.status || 'completed').toLowerCase();
      const stB = String(b.status || 'completed').toLowerCase();

      const pendA = (stA === 'proforma' || stA === 'cancelled' || stA === 'unwound');
      const pendB = (stB === 'proforma' || stB === 'cancelled' || stB === 'unwound');

      // If toggle is ON: pending group at the top
      if (currentFilter.showPending && pendA !== pendB) {
        return pendA ? -1 : 1;   // pending rows first
      }

      // Inside each group, sort by date (newest first)
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return String(b.date).localeCompare(String(a.date));
    });

    return sales;
  }
