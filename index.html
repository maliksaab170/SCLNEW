  // ===== Finance Sales (Accounts) — full rebuilt version =====
  (function(){
    if(wrap.__rf_wired) return;
    wrap.__rf_wired = true;

    function esc(v){
      return String(v == null ? '' : v)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function yn(v){
      return v ? 'YES' : 'NO';
    }

    function getSaleCreatedUser(saleId){
      const id = String(saleId ?? '');
      const sale = (db.sales || []).find(s => String(s?.id ?? '') === id) || {};
      const audit = (db.audit || []);

      const actionsAdd = new Set(['add','create','new','sale_add']);
      const actionsUpd = new Set(['update','edit','sale_update']);

      let a = audit.find(x =>
        String(x?.entity ?? '').toLowerCase() === 'sale' &&
        String(x?.entityId ?? x?.id ?? '') === id &&
        actionsAdd.has(String(x?.action ?? '').toLowerCase()) &&
        String(x?.user ?? '').trim()
      );

      if(!a){
        a = audit.find(x =>
          String(x?.entity ?? '').toLowerCase() === 'sale' &&
          String(x?.entityId ?? x?.id ?? '') === id &&
          actionsUpd.has(String(x?.action ?? '').toLowerCase()) &&
          String(x?.user ?? '').trim()
        );
      }

      return (
        (a && String(a.user || '').trim()) ||
        String(sale.soldBy || '').trim() ||
        String(sale.salesperson || '').trim() ||
        String(sale.salesPerson || '').trim() ||
        String(sale.createdBy || '').trim() ||
        String(sale.user || '').trim() ||
        'UNKNOWN'
      );
    }

    function getVehicleForSale(s){
      return (db.vehicles || []).find(v => String(v?.id ?? '') === String(s?.vehicleId ?? '')) || {};
    }

    function buildFinanceAccounts(monthKey){
      const allSales = (db.sales || []).filter(s =>
        isRealSale(s) &&
        (s.date || '').slice(0,7) === monthKey
      );

      // finance-related sales only
      const sales = allSales.filter(s =>
        Number(s.finance || 0) > 0 ||
        String(s.financeCompany || '').trim() !== '' ||
        Number(s.financeAdminFee || 0) > 0 ||
        Number(s.financePayoutAmount || 0) > 0 ||
        !!s.financePayoutPaid
      );

      const byCo = {};
      const byUser = {};
      const missing = [];

      sales.forEach(s => {
        const v = getVehicleForSale(s);

        const financeAmt = Number(s.finance || 0);
        const financeCompany = String(s.financeCompany || '').trim();
        const payoutAmt = Number(s.financePayoutAmount || 0);
        const payoutPaid = !!s.financePayoutPaid;
        const adminFee = Number(s.financeAdminFee || 0);
        const user = getSaleCreatedUser(s.id);

        // company summary
        const coKey = financeCompany ? financeCompany.toUpperCase() : '(NOT SET)';
        if(!byCo[coKey]){
          byCo[coKey] = {
            company: coKey,
            deals: 0,
            financeAmt: 0,
            payoutPaid: 0,
            adminFee: 0
          };
        }
        byCo[coKey].deals += 1;
        byCo[coKey].financeAmt += financeAmt;
        byCo[coKey].adminFee += adminFee;
        if(payoutPaid) byCo[coKey].payoutPaid += payoutAmt;

        // user summary
        if(!byUser[user]){
          byUser[user] = {
            user,
            deals: 0,
            financeAmt: 0,
            payoutPaid: 0,
            adminFee: 0
          };
        }
        byUser[user].deals += 1;
        byUser[user].financeAmt += financeAmt;
        byUser[user].adminFee += adminFee;
        if(payoutPaid) byUser[user].payoutPaid += payoutAmt;

        // missing / not set checks
        const issues = [];

        if(!financeCompany) issues.push('Finance company not set');
        if(financeAmt > 0 && payoutAmt <= 0) issues.push('Payout amount not set');
        if(financeAmt > 0 && !payoutPaid) issues.push('Payout not marked paid');

        if(issues.length){
          missing.push({
            saleId: s.id || '',
            invNo: s.invNo || '',
            date: s.date || '',
            reg: v.reg || '',
            make: v.make || '',
            model: v.model || '',
            customer: s.customerName || s.name || '',
            salesperson: user,
            financeCompany: financeCompany || '(NOT SET)',
            financeAmt,
            payoutAmt,
            adminFee,
            payoutPaid: yn(payoutPaid),
            issues: issues.join(' | ')
          });
        }
      });

      const companies = Object.values(byCo).sort((a,b)=>{
        if(b.deals !== a.deals) return b.deals - a.deals;
        return b.financeAmt - a.financeAmt;
      });

      const users = Object.values(byUser).sort((a,b)=>{
        if(b.deals !== a.deals) return b.deals - a.deals;
        return b.financeAmt - a.financeAmt;
      });

      const totals = sales.reduce((acc,s)=>{
        acc.deals += 1;
        acc.financeAmt += Number(s.finance || 0);
        acc.adminFee += Number(s.financeAdminFee || 0);
        if(s.financePayoutPaid) acc.payoutPaid += Number(s.financePayoutAmount || 0);
        return acc;
      }, {deals:0, financeAmt:0, payoutPaid:0, adminFee:0});

      const missingPayoutValue = missing
        .filter(x => x.payoutPaid !== 'YES')
        .reduce((t,x)=> t + Number(x.payoutAmt || 0), 0);

      return {
        monthKey,
        companies,
        users,
        missing,
        totals,
        missingPayoutValue
      };
    }

    function renderFinanceCompanyTable(rows){
      if(!rows.length) return `<div class="small">No finance deals found for this month.</div>`;
      return `
        <div class="tableWrap">
          <table class="table">
            <thead>
              <tr>
                <th>Finance Company</th>
                <th class="right">Deals</th>
                <th class="right">Finance Amount</th>
                <th class="right">Payout Received (Paid)</th>
                <th class="right">Admin Fees</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r=>`
                <tr>
                  <td>${esc(r.company)}</td>
                  <td class="right">${r.deals}</td>
                  <td class="right">${fmtMoney(r.financeAmt)}</td>
                  <td class="right">${fmtMoney(r.payoutPaid)}</td>
                  <td class="right">${fmtMoney(r.adminFee)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFinanceUserTable(rows){
      if(!rows.length) return `<div class="small">No finance deals found for this month.</div>`;
      return `
        <div class="tableWrap">
          <table class="table">
            <thead>
              <tr>
                <th>Salesperson (from Audit)</th>
                <th class="right">Deals</th>
                <th class="right">Finance Amount</th>
                <th class="right">Payout Received (Paid)</th>
                <th class="right">Admin Fees</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r=>`
                <tr>
                  <td>${esc(r.user)}</td>
                  <td class="right">${r.deals}</td>
                  <td class="right">${fmtMoney(r.financeAmt)}</td>
                  <td class="right">${fmtMoney(r.payoutPaid)}</td>
                  <td class="right">${fmtMoney(r.adminFee)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFinanceMissingTable(rows){
      if(!rows.length) return `<div class="small">No cars missing finance setup this month.</div>`;
      return `
        <div class="tableWrap">
          <table class="table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Invoice</th>
                <th>Reg</th>
                <th>Make</th>
                <th>Model</th>
                <th>Customer</th>
                <th>Salesperson</th>
                <th>Finance Company</th>
                <th class="right">Finance Amt</th>
                <th class="right">Payout Amt</th>
                <th class="right">Admin Fee</th>
                <th>Payout Paid</th>
                <th>Issues</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r=>`
                <tr>
                  <td>${esc(r.date)}</td>
                  <td>${esc(r.invNo)}</td>
                  <td>${esc(r.reg)}</td>
                  <td>${esc(r.make)}</td>
                  <td>${esc(r.model)}</td>
                  <td>${esc(r.customer)}</td>
                  <td>${esc(r.salesperson)}</td>
                  <td>${esc(r.financeCompany)}</td>
                  <td class="right">${fmtMoney(r.financeAmt)}</td>
                  <td class="right">${fmtMoney(r.payoutAmt)}</td>
                  <td class="right">${fmtMoney(r.adminFee)}</td>
                  <td>${esc(r.payoutPaid)}</td>
                  <td>${esc(r.issues)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFinanceAccounts(monthKey){
      const res = buildFinanceAccounts(monthKey);

      const alertEl = wrap.querySelector('#rf_alert');
      if(alertEl){
        alertEl.innerHTML = res.missing.length
          ? `<div style="padding:10px 12px;border:1px solid #b91c1c;background:#fee2e2;color:#991b1b;border-radius:10px;font-weight:700">
              ⚠ ${res.missing.length} finance deal(s) need attention
            </div>`
          : `<div style="padding:10px 12px;border:1px solid #166534;background:#dcfce7;color:#166534;border-radius:10px;font-weight:700">
              ✓ All finance deals look fully set for this month
            </div>`;
      }

      const summaryEl = wrap.querySelector('#rf_summary');
      if(summaryEl){
        summaryEl.innerHTML =
          `<b>${res.monthKey}</b> • Deals: <b>${res.totals.deals}</b> • Finance: <b>${fmtMoney(res.totals.financeAmt)}</b> • Payout received: <b>${fmtMoney(res.totals.payoutPaid)}</b> • Admin fees: <b>${fmtMoney(res.totals.adminFee)}</b> • Missing setup: <b>${res.missing.length}</b> • Unpaid / incomplete payout value: <b>${fmtMoney(res.missingPayoutValue)}</b>`;
      }

      const out = wrap.querySelector('#rf_out');
      if(out) out.innerHTML = renderFinanceCompanyTable(res.companies);

      const outU = wrap.querySelector('#rf_by_user');
      if(outU) outU.innerHTML = renderFinanceUserTable(res.users);

      const outM = wrap.querySelector('#rf_missing');
      if(outM) outM.innerHTML = renderFinanceMissingTable(res.missing);

      wrap.__rf_last = res;
      return res;
    }

    const rfRunBtn = wrap.querySelector('#rf_run');
    if(rfRunBtn){
      rfRunBtn.onclick = ()=>{
        const m = (wrap.querySelector('#rf_month')?.value || '').slice(0,7);
        if(!m) return alert('Please select a month');
        renderFinanceAccounts(m);
      };
    }

    const rfExportBtn = wrap.querySelector('#rf_export');
    if(rfExportBtn){
      rfExportBtn.onclick = ()=>{
        const m = (wrap.querySelector('#rf_month')?.value || '').slice(0,7);
        if(!m) return alert('Please select a month');

        const res = wrap.__rf_last && wrap.__rf_last.monthKey === m
          ? wrap.__rf_last
          : renderFinanceAccounts(m);

        const rows = [
          ['FINANCE COMPANY BREAKDOWN'],
          ['Month','Finance Company','Deals','Finance Amount','Payout Received (Paid)','Admin Fees'],
          ...res.companies.map(r => [
            res.monthKey,
            r.company,
            r.deals,
            r.financeAmt,
            r.payoutPaid,
            r.adminFee
          ]),
          [],
          ['CARS NEEDING FINANCE DETAILS SET'],
          ['Date','Invoice','Reg','Make','Model','Customer','Salesperson','Finance Company','Finance Amt','Payout Amt','Admin Fee','Payout Paid','Issues'],
          ...res.missing.map(r => [
            r.date,
            r.invNo,
            r.reg,
            r.make,
            r.model,
            r.customer,
            r.salesperson,
            r.financeCompany,
            r.financeAmt,
            r.payoutAmt,
            r.adminFee,
            r.payoutPaid,
            r.issues
          ])
        ];

        const csv = rows
          .map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(','))
          .join('\n');

        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = `finance_accounts_${res.monthKey}.csv`;
        a.click();
      };
    }
  })();

  // ===== Add-ons Income report =====
  (function(){
    if(wrap.__ra_wired) return;

    function getAddonSaleUser(saleId){
      const id = String(saleId ?? '');
      const sale = (db.sales || []).find(s => String(s?.id ?? '') === id) || {};
      const audit = (db.audit || []);
      const actionsAdd = new Set(['add','create','new','sale_add']);
      const actionsUpd = new Set(['update','edit','sale_update']);
      let a = audit.find(x =>
        String(x?.entity ?? '').toLowerCase() === 'sale' &&
        String(x?.entityId ?? x?.id ?? '') === id &&
        actionsAdd.has(String(x?.action ?? '').toLowerCase()) &&
        String(x?.user ?? '').trim()
      );
      if(!a){
        a = audit.find(x =>
          String(x?.entity ?? '').toLowerCase() === 'sale' &&
          String(x?.entityId ?? x?.id ?? '') === id &&
          actionsUpd.has(String(x?.action ?? '').toLowerCase()) &&
          String(x?.user ?? '').trim()
        );
      }
      return (
        (a && String(a.user || '').trim()) ||
        String(sale.soldBy || '').trim() ||
        String(sale.salesperson || '').trim() ||
        String(sale.salesPerson || '').trim() ||
        String(sale.createdBy || '').trim() ||
        String(sale.user || '').trim() ||
        'UNKNOWN'
      );
    }

    function buildAddonIncomeReport(monthKey){
      const lines = [];
      (db.sales || []).forEach(s => {
        if(!isRealSale(s)) return;
        if((String(s.date || '').slice(0,7)) !== monthKey) return;
        const addons = Array.isArray(s.addons) ? s.addons : [];
        if(!addons.length) return;
        const v = (db.vehicles || []).find(x => String(x?.id ?? '') === String(s?.vehicleId ?? '')) || {};
        const user = getAddonSaleUser(s.id);
        addons.forEach((a, idx) => {
          const type = String(a.type || 'Other').trim() || 'Other';
          const sell = Number(a.sellAmount || 0);
          const cost = Number(a.costAmount || 0);
          lines.push({
            saleId: s.id || '',
            lineNo: idx + 1,
            date: s.date || '',
            invNo: s.invNo || '',
            reg: v.reg || '',
            make: v.make || '',
            model: v.model || '',
            customer: s.buyer || s.customerName || s.name || '',
            salesperson: user,
            type,
            description: a.description || '',
            sell,
            cost,
            profit: sell - cost
          });
        });
      });

      const byType = {};
      const byCustomer = {};
      const byUser = {};
      lines.forEach(r => {
        const tk = r.type || 'Other';
        if(!byType[tk]) byType[tk] = { type: tk, lines: 0, sell: 0, cost: 0, profit: 0 };
        byType[tk].lines += 1;
        byType[tk].sell += r.sell;
        byType[tk].cost += r.cost;
        byType[tk].profit += r.profit;

        const ck = (r.customer || 'UNKNOWN CUSTOMER').trim() || 'UNKNOWN CUSTOMER';
        if(!byCustomer[ck]) byCustomer[ck] = { customer: ck, lines: 0, sell: 0, cost: 0, profit: 0 };
        byCustomer[ck].lines += 1;
        byCustomer[ck].sell += r.sell;
        byCustomer[ck].cost += r.cost;
        byCustomer[ck].profit += r.profit;

        const uk = (r.salesperson || 'UNKNOWN').trim() || 'UNKNOWN';
        if(!byUser[uk]) byUser[uk] = { user: uk, lines: 0, sell: 0, cost: 0, profit: 0 };
        byUser[uk].lines += 1;
        byUser[uk].sell += r.sell;
        byUser[uk].cost += r.cost;
        byUser[uk].profit += r.profit;
      });

      return {
        monthKey,
        lines: lines.sort((a,b)=> (a.date+a.invNo+a.reg).localeCompare(b.date+b.invNo+b.reg)),
        types: Object.values(byType).sort((a,b)=> b.sell - a.sell),
        customers: Object.values(byCustomer).sort((a,b)=> b.sell - a.sell),
        users: Object.values(byUser).sort((a,b)=> b.sell - a.sell),
        totals: {
          lines: lines.length,
          sell: lines.reduce((t,x)=>t + x.sell, 0),
          cost: lines.reduce((t,x)=>t + x.cost, 0),
          profit: lines.reduce((t,x)=>t + x.profit, 0),
          commissionSell: lines.filter(x=> String(x.type).toLowerCase() === 'commission').reduce((t,x)=>t+x.sell,0),
          warrantySell: lines.filter(x=> String(x.type).toLowerCase() === 'warranty').reduce((t,x)=>t+x.sell,0),
          commissionProfit: lines.filter(x=> String(x.type).toLowerCase() === 'commission').reduce((t,x)=>t+x.profit,0),
          warrantyProfit: lines.filter(x=> String(x.type).toLowerCase() === 'warranty').reduce((t,x)=>t+x.profit,0)
        }
      };
    }

    function raTable(headers, rows){
      if(!rows.length) return '<div class="small">No add-ons found for this month.</div>';
      return renderSimpleTable(headers, rows);
    }

    function renderAddonIncome(monthKey){
      const res = buildAddonIncomeReport(monthKey);

        sumEl.innerHTML = `Month: <b>${res.monthKey}</b> • Lines: <b>${res.totals.lines}</b> • Add-on income: <b>${fmtMoney(res.totals.sell)}</b> • Add-on cost: <b>${fmtMoney(res.totals.cost)}</b> • Add-on profit: <b>${fmtMoney(res.totals.profit)}</b> • Commission income: <b>${fmtMoney(res.totals.commissionSell)}</b> • Commission profit: <b>${fmtMoney(res.totals.commissionProfit)}</b> • Warranty income: <b>${fmtMoney(res.totals.warrantySell)}</b> • Warranty profit: <b>${fmtMoney(res.totals.warrantyProfit)}</b>`;
      }

      if(typeEl){

      if(custEl){

          res.customers.map(r => [r.customer, r.lines, fmtMoney(r.sell), fmtMoney(r.cost), fmtMoney(r.profit)])

      }
      const userEl = wrap.querySelector('#ra_user');
      if(userEl){
        userEl.innerHTML = raTable(

    if(raExportBtn){

        const rows = [

          [],

          ['Date','Invoice','Reg','Make','Model','Customer','Salesperson','Type','Description','Income','Cost','Profit'],
          ...res.lines.map(r => [r.date, r.invNo, r.reg, r.make, r.model, r.customer, r.salesperson, r.type, r.description, r.sell, r.cost, r.profit]),
          [],
          ['CUSTOMER TOTALS'],
          ['Customer','Lines','Income','Cost','Profit'],
          ...res.customers.map(r => [r.customer, r.lines, r.sell, r.cost, r.profit]),

  function typeLabel(t){
    t = String(t||'').toLowerCase();
    if(t==='deposit') return 'Deposit';
    if(t==='cash') return 'Cash';
    if(t==='card') return 'Card';
    if(t==='bank') return 'Bank';
    if(t==='finance') return 'Finance';
    return t || 'Other';
  }

  function receiptExpectedAmount(r){
    return Number((r && r.expectedAmount != null) ? r.expectedAmount : (r ? r.amount : 0)) || 0;
  }
  
  function receiptReceivedAmount(r){
    return Number((r && r.receivedAmount != null) ? r.receivedAmount : (r ? r.amount : 0)) || 0;
  }

  function ymKey(isoDate){
    return String(isoDate||'').slice(0,7);
  }

  function buildReceiptsReport(monthKey, mode){
    const linesReceived = [];
    const linesPending = [];

    // Build lists
    (db.sales || []).forEach(s=>{
      if(!isRealSale(s)) return; // your function exists :contentReference[oaicite:3]{index=3}
      const v = (db.vehicles || []).find(x=>x.id===s.vehicleId) || {};
      const inv = s.invNo || s.id || '';

      const receipts = Array.isArray(s.receipts) ? s.receipts : [];

      receipts.forEach(r=>{
        if(!r) return;
        
        const amt = (r.status === 'received')
          ? receiptReceivedAmount(r)
          : receiptExpectedAmount(r);

        // Received lines
        if(r.status === 'received' && r.receivedDate && ymKey(r.receivedDate) === monthKey){
          linesReceived.push({
            saleId: s.id,
            inv,
            saleDate: s.date || '',
            reg: (v.reg||'').toUpperCase(),
            make: v.make || '',
            model: v.model || '',
            customer: s.buyer || '',
            method: typeLabel(r.type),
            date: r.receivedDate,
            amount: amt,
            note: r.note || ''
          });
        }

        // Pending/Expected lines
        if(r.status !== 'received' && r.expectedDate && ymKey(r.expectedDate) === monthKey){
          linesPending.push({
            saleId: s.id,
            inv,
            saleDate: s.date || '',
            reg: (v.reg||'').toUpperCase(),
            make: v.make || '',
            model: v.model || '',
            customer: s.buyer || '',
            method: typeLabel(r.type),
            date: r.expectedDate,
            amount: amt,
            note: r.note || ''
          });
        }
      });
    });

    // Sort by date then reg
    linesReceived.sort((a,b)=> (a.date||'').localeCompare(b.date||'') || (a.reg||'').localeCompare(b.reg||''));
    linesPending.sort((a,b)=> (a.date||'').localeCompare(b.date||'') || (a.reg||'').localeCompare(b.reg||''));

    // Totals by method (received)
    const byMethod = {};
    linesReceived.forEach(x=>{
      if(!byMethod[x.method]) byMethod[x.method] = 0;
      byMethod[x.method] += Number(x.amount||0);
    });

    const totalReceived = linesReceived.reduce((t,x)=>t+Number(x.amount||0),0);
    const totalPending  = linesPending.reduce((t,x)=>t+Number(x.amount||0),0);

    // Summary
    const sumEl = wrap.querySelector('#rr_summary');
    if(sumEl){
      sumEl.innerHTML =
        `<b>${monthKey}</b> • Received lines: <b>${linesReceived.length}</b> • Total received: <b>${fmtMoney(totalReceived)}</b>` +
        ` • Pending lines: <b>${linesPending.length}</b> • Total pending: <b>${fmtMoney(totalPending)}</b>`;
    }

    // Breakdown table (received by method)
    const bdEl = wrap.querySelector('#rr_breakdown');
    if(bdEl){
      const rows = Object.keys(byMethod).sort().map(m=>`
        <tr><td>${m}</td><td class="right">${fmtMoney(byMethod[m])}</td></tr>
      `).join('\n');
      bdEl.innerHTML = `
        <div class="tableWrap">
        <table class="table">
          <thead><tr><th>Method (Received)</th><th class="right">Amount</th></tr></thead>
          <tbody>
            ${rows || `<tr><td colspan="2" class="small">No received lines in this month.</td></tr>`}
            <tr><th>Total</th><th class="right">${fmtMoney(totalReceived)}</th></tr>
          </tbody>
        </table>
        </div>
      `;
    }

    // Detailed lines table (received)
    const linesEl = wrap.querySelector('#rr_lines');
    if(linesEl){
      if(!linesReceived.length){
        linesEl.innerHTML = `<div class="small">No received payments recorded in this month.</div>`;
      } else {
        linesEl.innerHTML = `
          <div class="tableWrap">
          <table class="table">
            <thead>
              <tr>
                <th>Received Date</th>
                <th>Method</th>
                <th>Reg</th>

  (function(){
  // Helpers
  const num = v => Number(v || 0);

  function getMonthRange(ym){
    const start = ym + "-01";
    const end = lastDayOfMonth(ym);          // you already have this
    return { start, end };
  }

  function safeUpper(s){ return String(s||'').trim().toUpperCase(); }

  function getPurchaseDate(v){
    // matches your Monthly Summary logic
    return (v && (v.purchaseDate || v.dateAdded || v.createdAt || '')) || '';
  }

  function getOutwardPostcode(address){
    // tries to find a UK postcode in the address string and returns outward code (e.g. "E4", "IG8", "EN9")
    const s = safeUpper(address);
    if(!s) return '';
    // basic UK postcode pattern: outward + inward
    const m = s.match(/([A-Z]{1,2}\d{1,2}[A-Z]?)\s*\d[A-Z]{2}\b/);
    return m ? m[1] : '';
  }

  function bucketPrice(p){
    p = num(p);
    if(p < 3000) return "£0–£2,999";
    if(p < 5000) return "£3,000–£4,999";
    if(p < 7000) return "£5,000–£6,999";
    if(p < 10000) return "£7,000–£9,999";
    if(p < 15000) return "£10,000–£14,999";
    if(p < 20000) return "£15,000–£19,999";
    return "£20,000+";
  }

  function topN(mapObj, n=10){
    return Object.entries(mapObj)
      .sort((a,b)=> (b[1]||0) - (a[1]||0))
      .slice(0,n);
  }

  function renderSimpleTable(headers, rows){
    return `
      <div class="tableWrap">
      <table class="table">
        <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>

            `<tr><td colspan="${headers.length}">No data</td></tr>`}
        </tbody>
      </table>
      </div>
    `;
  }

  // Core: get REAL sales in month (uses your isRealSale)
  function getSalesInMonth(ym){
    return (db.sales||[]).filter(s => (s.date||'').slice(0,7)===ym && isRealSale(s));
  }

  // Build insights rows (also used for CSV export)
  function buildInsights(ym){
    const sales = getSalesInMonth(ym);

    // counts
    const makeCount = {};
    const modelCount = {};
    const makeModelCount = {}; // "MAKE||MODEL"
    const priceBandCount = {};
    const areaCount = {};

    const rowsForCsv = [];

    for(const s of sales){
      const v = (db.vehicles||[]).find(x=>x.id===s.vehicleId) || {};
      const make = (v.make || '').trim() || 'Unknown';
      const model = (v.model || '').trim() || 'Unknown';
      const mmKey = make + "||" + model;

      makeCount[make] = (makeCount[make]||0) + 1;
      modelCount[model] = (modelCount[model]||0) + 1;
      makeModelCount[mmKey] = (makeModelCount[mmKey]||0) + 1;

      const band = bucketPrice(s.salePrice);
      priceBandCount[band] = (priceBandCount[band]||0) + 1;

      const outward = getOutwardPostcode(s.address || '');
      if(outward) areaCount[outward] = (areaCount[outward]||0) + 1;

      rowsForCsv.push({
        month: ym,
        date: s.date || '',
        invNo: s.invNo || '',
        reg: v.reg || '',
        make, model,
        salePrice: num(s.salePrice).toFixed(2),
        priceBand: band,
        outwardPostcode: outward,
        customer: s.customer || ''
      });
    }

    // Find top single items
    const topMake = topN(makeCount, 1)[0];
    const topModel = topN(modelCount, 1)[0];
    const topBand = topN(priceBandCount, 1)[0];
    const topArea = topN(areaCount, 1)[0];

    // Make/Model table (top 10 combos)
    const mmRows = topN(makeModelCount, 10).map(([k,qty])=>{
      const [mk,md] = k.split('||');
      return [mk, md, qty];
    });

    // Price bands table (all, sorted by count)
    const priceRows = Object.entries(priceBandCount)
      .sort((a,b)=>(b[1]||0)-(a[1]||0))
      .map(([band,qty])=>[band, qty]);

    // Area table (top 10)
    const areaRows = topN(areaCount, 10).map(([pc,qty])=>[pc, qty]);

    return {
      salesCount: sales.length,
      topMake, topModel, topBand, topArea,
      mmRows, priceRows, areaRows,
      csvRows: rowsForCsv
    };
  }

  // Stock “as at” month end (accounting)
  function buildStockAsAt(ym){
    const { end } = getMonthRange(ym);

    // sales up to month end (real sales only)
    const soldIdsUpToEnd = new Set(
      (db.sales||[])
        .filter(s => isRealSale(s))
        .filter(s => (s.date||'') && (s.date <= end))
        .map(s => s.vehicleId)
        .filter(Boolean)
    );

    // vehicles purchased on/before end, and not sold by end
    const stockVehicles = (db.vehicles||[])
      .filter(v=>{
        const pd = getPurchaseDate(v).slice(0,10);
        if(!pd) return false;
        return pd <= end && !soldIdsUpToEnd.has(v.id);
      });

    // expenses up to month end per vehicle
    const expByVeh = {};
    for(const e of (db.vehicleExpenses||[])){
      const d = (e.date||'').slice(0,10);
      if(!d || d > end) continue;
      const vid = e.vehicleId;
      if(!vid) continue;
      expByVeh[vid] = (expByVeh[vid]||0) + num(e.amount);
    }

    const rows = stockVehicles.map(v=>{
      const purchase = num(v.purchase);
      const exp = num(expByVeh[v.id]);
      const total = purchase + exp;

      const supplier = String(v.supplier || '').trim();
      const supplierNote = String(v.supplierNote || '').trim();

      let cameFrom = '';
      if (supplier === 'PART-EX') {
        cameFrom = supplierNote ? `PART-EX - ${supplierNote}` : 'PART-EX';
      } else if (supplier && supplierNote) {
        cameFrom = `${supplier} - ${supplierNote}`;
      } else if (supplier) {
        cameFrom = supplier;
      } else if (supplierNote) {
        cameFrom = supplierNote;
      }

      return {
        reg: v.reg || '',
        make: v.make || '',
        model: v.model || '',
        purchaseDate: (getPurchaseDate(v)||'').slice(0,10),
        cameFrom: cameFrom,
        purchase: purchase.toFixed(2),
        expensesToEnd: exp.toFixed(2),
        stockValue: total.toFixed(2)
      };
    }).sort((a,b)=> (a.make+a.model+a.reg).localeCompare(b.make+b.model+b.reg));

    const totalStockValue = rows.reduce((t,r)=>t + num(r.stockValue), 0);

    return { end, rows, totalStockValue };
  }


  // ---------- Wire it to your Reports UI (IDs from the HTML block) ----------

  /* Month Close */
  function calcMonthClose(k){
    const showroomMonthTotal = (db.showroomExpenses||[]).filter(e=>ymStr(e.date)===k).reduce((t,e)=>t+Number(e.amount||0),0);
    const sold=(db.sales||[]).filter(s=>ymStr(s.date)===k && isRealSale(s));

    const items=sold.map(s=>{
      const v=db.vehicles.find(x=>x.id===s.vehicleId)||{};

      const liveVehicleExp=(db.vehicleExpenses||[])
        .filter(e=>e.vehicleId===s.vehicleId)
        .reduce((t,x)=>t+Number(x.amount||0),0);

      const vehicleCost = Number(v.purchase||0) + liveVehicleExp;

      const addons = Array.isArray(s.addons) ? s.addons : [];
      const addonsSell = addons.reduce((t,x)=>t+Number((x&&x.sellAmount)||0),0);
      const addonsCost = addons.reduce((t,x)=>t+Number((x&&x.costAmount)||0),0);
      const addonProfit = addonsSell - addonsCost;

      const vehicleProfit = Number(s.salePrice || 0) - vehicleCost;
      const gross = vehicleProfit + addonProfit;
      const isInvestor = (v.ownerType === 'investor' && v.investor);

      // Mgmt fees only if car made a profit
      const mgmtFlat = (isInvestor && gross > 0) ? 175 : 0;
      const mgmtBase = Math.max(0, gross - mgmtFlat);
      const mgmtPct  = (isInvestor && gross > 0) ? (0.20 * mgmtBase) : 0;

      let investorShare = 0;
      let afterInvestor = gross;

      if (isInvestor && gross > 0) {
        const baseAfterFees = Math.max(0, gross - mgmtFlat - mgmtPct);
        investorShare = 0.30 * baseAfterFees;
        afterInvestor = Math.max(0, baseAfterFees - investorShare);
      } else {
        afterInvestor = gross;
      }

      return {
        s, v,
        vehicleCost,
        vehicleProfit,
        addonsSell,
        addonsCost,
        addonProfit,
        gross,
        mgmtFlat,
        mgmtPct,
        investorShare,
        afterInvestor,
        isInvestor,
        investorName: v.investor || ''
      };
    });

    const totalVehicleProfit=items.reduce((t,x)=>t+x.vehicleProfit,0);
    const totalAddonProfit=items.reduce((t,x)=>t+x.addonProfit,0);
    const totalGross=items.reduce((t,x)=>t+x.gross,0);
    const totalFlat=items.reduce((t,x)=>t+x.mgmtFlat,0);
    const totalPct=items.reduce((t,x)=>t+x.mgmtPct,0);
    const totalInvestor=items.reduce((t,x)=>t+x.investorShare,0);

    const postExp = (db.vehicleExpenses||[]).filter(e=>ymStr(e.date)===k).map(e=>{
      const v=db.vehicles.find(x=>x.id===e.vehicleId);
      if(!v) return null;
      const s = (db.sales||[]).find(s0=>s0.vehicleId===e.vehicleId && isRealSale(s0));
      if(!s) return null;
      if(ymStr(s.date) >= k) return null;
      return { e, v, amount: Number(e.amount||0) };
    }).filter(Boolean);
    const postExpTotal = postExp.reduce((t,x)=>t + x.amount, 0);

    const remainderBeforeShowroom = items.reduce((t,x)=>t+x.afterInvestor,0) - postExpTotal;
    const remainder = remainderBeforeShowroom - showroomMonthTotal;

    const norm = s => String(s||'').trim().toLowerCase();
    const directorsUnique = (db.partners||[])
      .filter(p => norm(p && p.name))
      .filter((p,i,arr)=> arr.findIndex(x => norm(x.name) === norm(p.name)) === i);

    const directorCount = Math.max(1, directorsUnique.length);
    const directorEach = remainder / directorCount;

    return {
      items,totalVehicleProfit,totalAddonProfit,totalGross,totalFlat,totalPct,totalInvestor,
      remainder,directorEach,directorCount,
      directorHalf: directorEach,
      postExp,postExpTotal,showroomMonthTotal,remainderBeforeShowroom
    }
  };

    function purgeMonthClose(k){
    const marker='MonthClose '+k;
    // Remove prior director profit entries for this month
    (db.partners||[]).forEach(p=>{ p.tx=(p.tx||[]).filter(t=>!(t.type==='profit' && (t.note||'').includes(marker))); p.balance=(p.tx||[]).reduce((bal,x)=> bal+((x.type==='invest'||x.type==='profit')?+x.amount:-x.amount),0); });
    // Remove prior investor postings for this month
    (db.investors||[]).forEach(inv=>{ inv.tx=(inv.tx||[]).filter(t=>!(t.type==='fund_in' && (t.note||'').includes(marker))); inv.balance=(inv.tx||[]).reduce((bal,x)=> bal+((x.type==='fund_in')?+x.amount:-x.amount),0); });
    // Remove showroom mgmt entries dated in that month
    db.showroomExpenses=(db.showroomExpenses||[]).filter(e=>{
      const ym = (e.date||'').slice(0,7);
      if(ym!==k) return true;
      const t=String(e.type||'');
      return !(t.includes('Mgmt flat £175') || t.includes('Mgmt 20%'));
    });
    }
    function alreadyPosted(k){
    // Heuristic: if both directors have a 'profit' tx on k month with same note marker, block.
    const marker = 'MonthClose ' + k;
    const both = (db.partners||[]).some(p => (p.tx||[]).some(t => (t.note||'').includes(marker)));
    return both;
  }

  function postClose(){
    const k=(wrap.querySelector('#mc_month').value||'').slice(0,7); if(!k) return alert('Pick a month');
    if(alreadyPosted(k)) { if(!confirm('This month was already posted. Recalculate and re-post?')) return; purgeMonthClose(k); }
    const c=calcMonthClose(k);

    // 1) Post mgmt fees to Showroom Expenses (175 + 20% for PROFITABLE investor cars only)
    c.items.forEach(x=>{
      if(x.isInvestor && x.gross > 0){  // Only if car made profit
        db.showroomExpenses.unshift({id:mcId(k, 'showroom_flat175', x.v.reg, '', ''),date:lastDayOfMonth(k),type:'Mgmt flat £175',method:'bank',amount:-175,note:(x.v.reg||'')});
        const pct=+(x.mgmtPct||0);
        if(pct>0) db.showroomExpenses.unshift({id:mcId(k, 'showroom_20pct', x.v.reg, '', ''),date:lastDayOfMonth(k),type:'Mgmt 20% (investor car)',method:'bank',amount:-pct,note:(x.v.reg||'')});
      }
    });

    // 2) Post investor 30% total aggregated by investor (only for profitable cars)
    const byInvestor={};
    c.items.forEach(x=>{
      if(x.isInvestor && x.investorShare>0 && x.gross > 0){  // Only if car made profit
        byInvestor[x.investorName]=(byInvestor[x.investorName]||0)+x.investorShare;
      }
    });
    Object.keys(byInvestor).forEach(name=>{
      let inv=(db.investors||[]).find(i=>i.name===name);
      if(!inv){ inv={id:uid(),name,balance:0,tx:[]}; (db.investors=db.investors||[]).push(inv); }
      const amt=byInvestor[name];
      inv.tx.unshift({id:mcId(k, 'investor_30pct', inv.id, '', ''),date:lastDayOfMonth(k),type:'fund_in',method:'bank',amount:amt,note:'MonthClose '+k});
      inv.balance+=(+amt||0);
    });

    // 3) Directors single entry each (split by number of directors)
    const marker='MonthClose '+k;

    const norm = s => String(s||'').trim().toLowerCase();
    const directorsUnique = (db.partners||[])
      .filter(p => norm(p && p.name))
      .filter((p,i,arr)=> arr.findIndex(x => norm(x.name) === norm(p.name)) === i);

    directorsUnique.forEach(p=>{
      const amt = Number(c.directorEach ?? c.directorHalf ?? 0);
      p.tx = p.tx || [];
      p.tx.unshift({
        id: mcId(k, 'director_profit', p.id, '', ''),
        date: lastDayOfMonth(k),
        type: 'profit',
        method: 'bank',
        amount: amt,
        note: marker
      });
      p.balance = (p.tx||[]).reduce((bal,x)=> bal + ((x.type==='invest'||x.type==='profit')? +x.amount : -x.amount), 0);
    });
    
    saveDB(); try{renderAlertBell();}catch(e){}; addAudit('monthClose','reports','monthClose',marker); alert('Month close posted.');
    previewClose();
  }

  // ===== Month Close dirty marker (when old sales are unwound later) =====
  function markMonthCloseDirty(monthKey){
    const k = (monthKey || '').slice(0,7);
    if(!k) return;
    db._monthCloseDirty = db._monthCloseDirty || {};
    db._monthCloseDirty[k] = { dirty:true, at:new Date().toISOString() };
    saveDB();
  }

  function clearMonthCloseDirty(monthKey){
    const k = (monthKey || '').slice(0,7);
    if(!k) return;
    if(db._monthCloseDirty) delete db._monthCloseDirty[k];
    saveDB();
  }

  function isMonthCloseDirty(monthKey){
    const k = (monthKey || '').slice(0,7);
    return !!(db._monthCloseDirty && db._monthCloseDirty[k] && db._monthCloseDirty[k].dirty);
  }

        const sumType = (matchFn) => addons.reduce((acc,a)=>{
          const type = String((a && a.type) || '').trim().toLowerCase();
          if(!matchFn(type)) return acc;
          acc.sell += Number((a && a.sellAmount) || 0);
          acc.cost += Number((a && a.costAmount) || 0);
          return acc;
        }, {sell:0, cost:0});

        const warranty = sumType(type => type === 'warranty');
        const commission = sumType(type => type === 'commission');
        const other = sumType(type => type && type !== 'warranty' && type !== 'commission');

        commission.profit = commission.sell - commission.cost;
        other.profit = other.sell - other.cost;

        const customer = s.buyer || s.customerName || s.name || '';

          warranty.cost,

          commission.sell,

          other.sell,

          x.mgmtPct || 0,
          x.investorShare || 0,
          x.afterInvestor || 0
        ]);

          ]);

      const csv = csvRows
        .map(r => r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(','))

      const a=document.createElement('a');

return wrap;

function viewAlerts(){
  if(!canTab('Alerts')) return document.createElement('div');
  const wrap = document.createElement('div');
  wrap.className = 'card';

  const today = new Date();
  today.setHours(0,0,0,0);

  const daysText = d => {
    d = Number(d || 0);
    if(d < 0) return Math.abs(d) + ' days overdue';
    if(d === 0) return 'Today';
    return d + ' days left';
  };
  const dataAttr = s => escapeHtml(String(s == null ? '' : s).replace(/"/g,'&quot;'));

  const alertRows = [];

  // MOT alerts (stock only)
  (db.vehicles || []).forEach(v => {
    if (String(v.status || '').toLowerCase() === 'sold') return;
    const motDate = v.lastMotExpiry || v.motExpiry || '';
    if(!motDate){
      alertRows.push({
        group:'mot', severity:'missing', date:'', sort:-9999,
        reg:(v.reg||'').toUpperCase(), vehicle:((v.make||'')+' '+(v.model||'')).trim(),
        detail:'No MOT date saved', action:'Add MOT expiry in Vehicles', status:v.status||'',
        mileage:v.mileage || v.miles || '', location:v.location || v.site || '',
        raw:v
      });
      return;
    }
    try{
      const e = new Date(motDate);
      e.setHours(0,0,0,0);
      const diffDays = Math.ceil((e - today)/(1000*60*60*24));
      if(diffDays < 0 || diffDays <= 30){
        alertRows.push({
          group:'mot', severity: diffDays < 0 ? 'expired' : 'due30', date:motDate, sort:diffDays,
          reg:(v.reg||'').toUpperCase(), vehicle:((v.make||'')+' '+(v.model||'')).trim(),
          detail:(diffDays < 0 ? 'MOT expired' : 'MOT due soon') + ' — ' + daysText(diffDays),
          action:'Book MOT / update MOT date', status:v.status||'',
          mileage:v.mileage || v.miles || '', location:v.location || v.site || '',
          raw:v
        });
      }
    }catch(e){}
  });

  // Complaint alerts
  const complaints = (db.complaints || []).slice();
  complaints.forEach(c => {
    const st = (c.status || '').toLowerCase();
    const closed = ['resolved','closed','close','sorted'].includes(st);
    if(c.severity === 'urgent' || c.status === 'escalated'){
      alertRows.push({
        group:'complaint', severity:'urgent', date:c.date || c.followup || '', sort:-500,
        reg:(c.vehicle||'').toUpperCase(), vehicle:c.customer || '',
        detail:'Urgent / escalated complaint' + (c.type ? ' — ' + c.type : ''),
        action:'Open complaint and respond', status:c.status || '', mileage:'', location:c.handler || c.assigned || '', raw:c
      });
    }
    if(c.followup && !closed){
      try{
        const d = new Date(c.followup); d.setHours(0,0,0,0);
        const diff = Math.ceil((d - today)/(1000*60*60*24));
        if(diff < 0){
          alertRows.push({
            group:'complaint', severity:'overdue', date:c.followup, sort:-400 + diff,
            reg:(c.vehicle||'').toUpperCase(), vehicle:c.customer || '',
            detail:'Complaint follow-up overdue — ' + daysText(diff),
            action:'Contact customer / update complaint', status:c.status || '', mileage:'', location:c.handler || c.assigned || '', raw:c
          });
        }
      }catch(e){}
    }
  });

  // To-do alerts
  (db.todo || []).filter(t => !t.done).forEach(t => {
    let diff = 9999;
    if(t.date){
      try{ const d = new Date(t.date); d.setHours(0,0,0,0); diff = Math.ceil((d - today)/(1000*60*60*24)); }catch(e){}
    }
    alertRows.push({
      group:'todo', severity: diff < 0 ? 'overdue' : (diff <= 1 ? 'due' : 'open'), date:t.date || '', sort:1000 + diff,
      reg:t.entityId || '', vehicle:t.entity || '', detail:t.text || 'Open task',

    });

    let shown = 0;

      const okType = type === 'all' || tr.dataset.group === type;
      const okSev = sev === 'all' || tr.dataset.severity === sev;
      const okQ = !q || String(tr.dataset.search || '').includes(q);
      const show = okType && okSev && okQ;

        table{border-collapse:collapse;width:100%;margin-bottom:10px;}
        th,td{border:1px solid #ccc;padding:4px 6px;font-size:12px;vertical-align:top;}
        th{background:#f4f4f4;text-align:left;}
        .right{text-align:right;}
        .small{font-size:11px;color:#666;}
        .section{margin-top:10px;margin-bottom:4px;}
      </style>
    </head><body>`;
    
    html += `<h1>Complaint Evidence Pack</h1>
      <div class="small">Generated: ${nowStr}</div>
      <div class="small">Complaint ID: ${comp.id || ''}</div>`;
    
    // 1. Complaint summary
    html += `<div class="section"><h2>1. Complaint Summary</h2>
      <table>
        <tr><th>Date received</th><td>${ddmmyyyy(comp.date)}</td></tr>
        <tr><th>Customer</th><td>${comp.customer || ''}</td></tr>
        <tr><th>Vehicle</th><td>${reg} ${(v.make||'') ? ' — '+(v.make||'')+' '+(v.model||'') : ''}</td></tr>
        <tr><th>Type</th><td>${comp.type || ''}</td></tr>
        <tr><th>Severity</th><td>${comp.severity || ''}</td></tr>
        <tr><th>Status</th><td>${comp.status || ''}</td></tr>
        <tr><th>Assigned handler</th><td>${comp.handler || comp.assigned || ''}</td></tr>
        <tr><th>Follow-up date</th><td>${ddmmyyyy(comp.followup)}</td></tr>
        <tr><th>Complaint details</th><td>${(comp.details || '').replace(/\n/g,'<br>')}</td></tr>
        <tr><th>Resolution / notes</th><td>${(comp.resolution || '').replace(/\n/g,'<br>')}</td></tr>
      </table>
    </div>`;
    
    // 2. Vehicle & sale details
    html += `<div class="section"><h2>2. Vehicle & Sale Details</h2>
      <table>
        <tr><th>REG</th><td>${reg}</td></tr>
        <tr><th>Make / Model</th><td>${(v.make||'')+' '+(v.model||'')}</td></tr>
        <tr><th>VIN</th><td>${v.vin || ''}</td></tr>
        <tr><th>First registration</th><td>${ddmmyyyy(v.firstReg)}</td></tr>
        <tr><th>MOT expiry (last known)</th><td>${ddmmyyyy(v.lastMotExpiry || v.motExpiry)}</td></tr>
        <tr><th>Status in stock system</th><td>${v.status || ''}</td></tr>
        <tr><th>Sale date</th><td>${saleDate}</td></tr>
        <tr><th>Sale price</th><td>${s ? fmtMoney(s.salePrice || 0) : ''}</td></tr>
        <tr><th>Invoice #</th><td>${s ? (s.invNo || '') : ''}</td></tr>
        <tr><th>Finance company</th><td>${s ? (s.financeCompany || '') : ''}</td></tr>
        <tr><th>Mileage at sale / now</th><td>${milesLine || ''}</td></tr>
        <tr><th>Warranty</th><td>${warrantyText || 'Not recorded'}</td></tr>
      </table>
    </div>`;
    
    // 3. Workshop / repairs from complaint log
    html += `<div class="section"><h2>3. Workshop / Repair Details (Complaint Log)</h2>
      <table>
        <tr><th>Fault reported</th><td>${comp.problem || comp.type || ''}</td></tr>
        <tr><th>Booked with mechanic</th><td>${comp.mechanicBooked || ''}</td></tr>
        <tr><th>Garage / mechanic name</th><td>${comp.mechanicName || ''}</td></tr>
        <tr><th>Vehicle delivered to mechanic</th><td>${comp.deliveredDate || ''}</td></tr>
        <tr><th>Work done</th><td>${(comp.workDone || '').replace(/\n/g,'<br>')}</td></tr>
        <tr><th>Customer collected on</th><td>${comp.collectedDate || ''}</td></tr>
        <tr><th>Mileage at collection</th><td>${comp.collectedMileage || ''}</td></tr>
        <tr><th>Internal handler</th><td>${comp.handler || comp.assigned || ''}</td></tr>
        <tr><th>Company cost / goodwill</th><td>${comp.cost ? fmtMoney(comp.cost) : ''}</td></tr>
      </table>
    </div>`;
    
    // 4. Linked vehicle expenses
    html += `<div class="section"><h2>4. Linked Vehicle Expenses / Repairs</h2>`;
    if(!expenses.length){
      html += `<div class="small">No vehicle expenses recorded for this vehicle.</div>`;
    } else {
      html += `<table>
        <thead><tr><th>Date</th><th>Type</th><th>Note</th><th class="right">Amount</th></tr></thead>
        <tbody>${expRows}</tbody>
        <tfoot><tr><th colspan="3" class="right">Total</th><th class="right">${fmtMoney(expTotal)}</th></tr></tfoot>
      </table>`;
    }
    html += `</div>`;
    
    html += `</body></html>`;
    openPrintable(html);
  }

  function renderComplaints(filter = {}) {
    body.innerHTML = '';
    
    let complaints = db.complaints || [];
    
    // Filters
    if (filter.search) {
      const searchTerm = filter.search.toLowerCase();
      complaints = complaints.filter(c => 
        (c.customer || '').toLowerCase().includes(searchTerm) ||
        (c.vehicle || '').toLowerCase().includes(searchTerm) ||
        (c.make || '').toLowerCase().includes(searchTerm) ||
        (c.model || '').toLowerCase().includes(searchTerm) ||
        (c.details || '').toLowerCase().includes(searchTerm) ||
        (c.resolution || '').toLowerCase().includes(searchTerm)
      );
    }
    if (filter.status) {
      complaints = complaints.filter(c => c.status === filter.status);
    }
    if (filter.severity) {
      complaints = complaints.filter(c => c.severity === filter.severity);
    }
    
    // Sort open complaints first, then newest first
    const statusRank = { urgent:0, escalated:1, new:2, investigating:3, resolved:4, sorted:5, closed:6 };
    complaints.sort((a, b) => {
      const ar = statusRank[String(a.status||'new').toLowerCase()] ?? 99;
      const br = statusRank[String(b.status||'new').toLowerCase()] ?? 99;
      if (ar !== br) return ar - br;
      return new Date(b.date || 0) - new Date(a.date || 0);
    });
    
    if (complaints.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td colspan="10" class="small" style="text-align: center; padding: 20px;">No complaints found${filter.search ? ' for "' + filter.search + '"' : ''}</td>`;
      body.appendChild(tr);
      return;
    }
    
    complaints.forEach(c => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${ddmmyyyy(c.date)}</td>
        <td>${c.customer || ''}<br><small style="color:var(--mut)">${(c.details || '').substring(0, 50)}${(c.details || '').length > 50 ? '...' : ''}</small></td>
        <td>${c.vehicle || ''}</td>
        <td>${c.type || ''}</td>
        <td>${c.severity || ''}</td>
        <td>${c.status || ''}</td>
        <td>${c.assigned || ''}</td>
        <td>${ddmmyyyy(c.followup)}</td>
        <td class="right">${c.cost ? fmtMoney(c.cost) : ''}</td>
        <td>
          <button data-act="view" data-id="${c.id}" title="View Details">View</button>
          <button data-act="pack" data-id="${c.id}" title="Export evidence pack">Evidence</button>
          ${c.status !== 'sorted' && c.status !== 'closed' ? `<button class="success" data-act="sorted" data-id="${c.id}">Mark Sorted</button>` : ''}
          ${c.status !== 'closed' ? `<button class="warn" data-act="close" data-id="${c.id}">Close</button>` : ''}
          ${canAction('edit') ? `<button data-act="edit" data-id="${c.id}">Edit</button>` : ''}
          ${canAction('del') ? `<button class="danger" data-act="del" data-id="${c.id}">Delete</button>` : ''}
        </td>
      `;
      body.appendChild(tr);
    });
  }

  // Initial table
  renderComplaints();

  // Add/Update complaint
  wrap.querySelector('#comp_add').onclick = () => {
    if(!canAction('add')) return alert('No permission');
    
    const compReg = (wrap.querySelector('#comp_vehicle').value || '').toUpperCase().trim();
    const current = editId ? (db.complaints||[]).find(x => x.id === editId) : null;

    const baseDate = wrap.querySelector('#comp_date').value || (current && current.date) || new Date().toISOString().split('T')[0];
    const mechRaw = wrap.querySelector('#comp_mechBook').value || '';
    const delRaw  = wrap.querySelector('#comp_delivered').value || '';
    const colRaw  = wrap.querySelector('#comp_collected').value || '';

    const comp = {
      id: editId || uid(),
      date: baseDate,
      customer: wrap.querySelector('#comp_customer').value.trim(),
      vehicle: compReg,
      type: wrap.querySelector('#comp_type').value,
      severity: wrap.querySelector('#comp_severity').value,
      details: wrap.querySelector('#comp_details').value.trim(),
      resolution: wrap.querySelector('#comp_resolution').value.trim(),
      status: wrap.querySelector('#comp_status').value,
      assigned: wrap.querySelector('#comp_assigned').value.trim(),
      followup: wrap.querySelector('#comp_followup').value,
      cost: Number(wrap.querySelector('#comp_cost').value || 0),

      // LOG FIELDS
      mileageNow: Number(wrap.querySelector('#comp_mileageNow').value || 0),
      mechanicBooked: mechRaw ? mechRaw.substring(0,10) : '',
      mechanicName: wrap.querySelector('#comp_mechName').value.trim(),
      deliveredDate: delRaw ? delRaw.substring(0,10) : '',
      workDone: wrap.querySelector('#comp_work').value.trim(),
      collectedDate: colRaw ? colRaw.substring(0,10) : '',
      collectedMileage: Number(wrap.querySelector('#comp_collectedMileage').value || 0),
      handler: wrap.querySelector('#comp_handler').value.trim(),

      createdAt: editId && current ? current.createdAt : new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };

    // Snapshot sale info when adding (optional but useful)
    const found = findSaleByReg(compReg);
    if (found && found.sale){
      comp.saleId = found.sale.id;
      comp.saleDate = found.sale.date || '';
      comp.saleMileage = Number(found.sale.mileage || 0);
      comp.salePrice = Number(found.sale.salePrice || 0);
      comp.saleInvNo = found.sale.invNo || '';
    }

    if(!comp.customer || !comp.details) {
      return alert('Customer name and complaint details are required');
    }

    if(editId) {
      db.complaints = db.complaints.map(x => x.id === editId ? comp : x);
      addAudit('update', 'complaint', comp.id, `${comp.customer} - ${comp.type} - ${comp.status}`);
      editId = null;
    } else {
      db.complaints.unshift(comp);
      addAudit('add', 'complaint', comp.id, `${comp.customer} - ${comp.type} - ${comp.severity}`);

      // Auto notification: create TODO when urgent/escalated
      if (comp.severity === 'urgent' || comp.status === 'escalated') {
        db.todo = db.todo || [];
        const task = {
          id: uid(),
          date: comp.date,
          text: `URGENT complaint: ${comp.customer} / ${comp.vehicle} — ${comp.type}`,
          assignedTo: comp.assigned || '',
          entity: 'complaint',
          entityId: comp.id,
          done: false
        };
        db.todo.unshift(task);
        addAudit('add', 'todo', task.id, task.text);
      }
    }
    
    saveDB();
    try{renderAlertBell();}catch(e){}
    renderComplaints();

    // Clear form
    wrap.querySelector('#comp_customer').value = '';
    wrap.querySelector('#comp_vehicle').value = '';
    wrap.querySelector('#comp_type').value = '';
    wrap.querySelector('#comp_details').value = '';
    wrap.querySelector('#comp_resolution').value = '';
    wrap.querySelector('#comp_assigned').value = '';
    wrap.querySelector('#comp_followup').value = '';
    wrap.querySelector('#comp_cost').value = '';
    wrap.querySelector('#comp_mileageNow').value = '';
    wrap.querySelector('#comp_mechBook').value = '';
    wrap.querySelector('#comp_mechName').value = '';
    wrap.querySelector('#comp_delivered').value = '';
    wrap.querySelector('#comp_work').value = '';
    wrap.querySelector('#comp_collected').value = '';
    wrap.querySelector('#comp_collectedMileage').value = '';
    wrap.querySelector('#comp_handler').value = '';
    wrap.querySelector('#comp_saleHint').textContent = '';
  };

  // Search / filter / clear
  wrap.querySelector('#comp_search').addEventListener('input', () => {
    renderComplaints({
      search: wrap.querySelector('#comp_search').value,
      status: wrap.querySelector('#comp_filter_status').value,
      severity: wrap.querySelector('#comp_filter_severity').value
    });
  });
  wrap.querySelector('#comp_filter_status').addEventListener('change', () => {
    renderComplaints({
      search: wrap.querySelector('#comp_search').value,
      status: wrap.querySelector('#comp_filter_status').value,
      severity: wrap.querySelector('#comp_filter_severity').value
    });
  });
  wrap.querySelector('#comp_filter_severity').addEventListener('change', () => {
    renderComplaints({
      search: wrap.querySelector('#comp_search').value,
      status: wrap.querySelector('#comp_filter_status').value,
      severity: wrap.querySelector('#comp_filter_severity').value
    });
  });
  wrap.querySelector('#comp_clear').onclick = () => {
    wrap.querySelector('#comp_search').value = '';
    wrap.querySelector('#comp_filter_status').value = '';
    wrap.querySelector('#comp_filter_severity').value = '';
    renderComplaints();
  };

  // Auto-fill from sale
  wrap.querySelector('#comp_autofill').onclick = () => {
    const reg = (wrap.querySelector('#comp_vehicle').value || '').toUpperCase().trim();
    if (!reg) return alert('Enter vehicle REG first.');
    const found = findSaleByReg(reg);
    if (!found || !found.sale) {
      alert('No sale found for this REG.');
      return;
    }
    const s = found.sale;
    if (!wrap.querySelector('#comp_customer').value.trim()) {
      wrap.querySelector('#comp_customer').value = s.buyer || '';
    }
    // Put the mileage at sale as a starting point (you can then overwrite with current mileage)
    if (!wrap.querySelector('#comp_mileageNow').value) {
      wrap.querySelector('#comp_mileageNow').value = s.mileage || 0;
    }
    buildSaleHint(reg, {
      date: wrap.querySelector('#comp_date').value || new Date().toISOString().slice(0,10),
      mileageNow: Number(wrap.querySelector('#comp_mileageNow').value || 0)
    });
  };

  // Update hint when REG changes
  wrap.querySelector('#comp_vehicle').addEventListener('change', () => {
    const reg = (wrap.querySelector('#comp_vehicle').value || '').toUpperCase().trim();
    if (!reg) {
      wrap.querySelector('#comp_saleHint').textContent = '';
      return;
    }
    buildSaleHint(reg, {
      date: wrap.querySelector('#comp_date').value || new Date().toISOString().slice(0,10),
      mileageNow: Number(wrap.querySelector('#comp_mileageNow').value || 0)
    });
  });

  // Export CSV
  wrap.querySelector('#comp_export').onclick = () => {
    const rows = (db.complaints||[]).map(c => ([
      c.date || '',
      c.customer || '',
      c.vehicle || '',
      c.type || '',
      c.severity || '',
      c.status || '',
      c.assigned || '',
      c.followup || '',
      c.cost || 0,
      c.mileageNow || '',
      c.mechanicBooked || '',
      c.mechanicName || '',
      c.deliveredDate || '',
      c.workDone || '',
      c.collectedDate || '',
      c.collectedMileage || '',
      c.handler || '',
      c.saleDate || '',
      c.saleMileage || '',
      c.salePrice || '',
      c.saleInvNo || ''
    ]));

    const header = [
      'Complaint Date','Customer','Vehicle REG','Type','Severity','Status','Assigned',
      'Follow-up','Cost','Mileage Now','Mechanic Booked','Mechanic Name',
      'Delivered Date','Work Done','Collected Date','Collected Mileage',
      'Handled By','Sale Date','Sale Mileage','Sale Price','Sale Invoice'
    ];

    const csv = [header].concat(rows)
      .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
      .join('\n');

    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'complaints_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  };

  // Print summary
  wrap.querySelector('#comp_print').onclick = () => {
    const list = db.complaints || [];
    if (!list.length) {
      alert('No complaints to print.');
      return;
    }
    let html = `<!doctype html><html><head><meta charset="utf-8"><title>Complaints</title>
    <style>
      body{font-family:Arial;font-size:11px;color:#111}
      table{width:100%;border-collapse:collapse}
      th,td{border:1px solid #000;padding:4px 6px;vertical-align:top}
      th{background:#f0f0f0}
      h2{margin:0 0 10px 0}
      .small{font-size:10px;color:#666}
      .no-print{margin:8px 0}
      @media print{.no-print{display:none}}
    </style>
    
<style id="fca-reporting-patch-style">
.fcaBadge{display:inline-block;padding:3px 9px;border-radius:999px;border:1px solid rgba(90,176,255,.30);background:rgba(90,176,255,.10);font-size:11px;font-weight:900;color:#cfe6ff}
.fcaGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.fcaMetric{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03)}
.fcaMetric .lbl{font-size:11px;color:var(--mut);font-weight:900;text-transform:uppercase;letter-spacing:.05em}
.fcaMetric .val{font-size:24px;font-weight:950;margin-top:6px}
.fcaSmall{font-size:12px;color:var(--mut)}
.fcaIssueGood{color:#9ef0b8}
.fcaIssueWarn{color:#ffd694}
.fcaIssueBad{color:#ffb4b4}
.fcaSectionTitle{font-size:12px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin:0 0 8px}
.fcaInlineChecks{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fcaInlineChecks label{display:flex;flex-direction:row;align-items:center;gap:6px;background:rgba(255,255,255,.03);padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
.fcaNote{padding:10px 12px;border-radius:12px;background:rgba(90,176,255,.08);border:1px solid rgba(90,176,255,.18);font-size:12px}
</style>

</head><body>
    <button class="no-print" onclick="window.print()">Print / Save PDF</button>
    <h2>Complaints Log</h2>
    <table><thead><tr>
      <th>Date</th><th>Customer</th><th>Vehicle</th><th>Summary</th><th>Status</th>
      <th>Severity</th><th>Handler</th><th>Log (mileage/mechanic)</th>
    </tr></thead><tbody>`;

    list.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).forEach(c => {
      const reg = (c.vehicle||'').toUpperCase();
      const found = findSaleByReg(reg);
      const v = found && found.vehicle ? found.vehicle : {};
      const s = found && found.sale ? found.sale : null;

      const soldBit = s && s.date ? `Sold ${ddmmyyyy(s.date)}${s.mileage ? ' @ ' + s.mileage + ' miles' : ''}` : '';
      const mileageBit = (c.mileageNow || c.collectedMileage) ? 
        `Mileage now: ${c.mileageNow||''} • At collection: ${c.collectedMileage||''}` : '';
      const mechBit = (c.mechanicName || c.workDone) ? 
        `${c.mechanicName||''} — ${c.workDone||''}` : '';
      
      html += `<tr>
        <td>${ddmmyyyy(c.date)}</td>
        <td>${c.customer||''}</td>
        <td>${reg}<br><span class="small">${v.make||''} ${v.model||''}</span></td>
        <td>${(c.details||'').replace(/\n/g,'<br>')}</td>
        <td>${c.status||''}</td>
        <td>${c.severity||''}</td>
        <td>${c.handler || c.assigned || ''}</td>
        <td class="small">
          ${soldBit ? soldBit + '<br>' : ''}
          ${mileageBit ? mileageBit + '<br>' : ''}
          ${c.mechanicBooked ? 'Booked: '+c.mechanicBooked+'<br>' : ''}
          ${c.deliveredDate ? 'Delivered: '+c.deliveredDate+'<br>' : ''}
          ${c.collectedDate ? 'Collected: '+c.collectedDate+'<br>' : ''}
          ${mechBit}
        </td>
      </tr>`;
    });

    html += '</tbody></table></body></html>';
    openPrintable(html);
  };

  // Row buttons (view/edit/delete)
  wrap.addEventListener('click', (ev) => {
    const b = ev.target.closest('button');
    if(!b || !b.dataset.act) return;
    const id = b.dataset.id;
    const act = b.dataset.act;
    const comp = (db.complaints||[]).find(x => x.id === id);
    if(!comp) return;
    
    if(act === 'view') {
      const reg = (comp.vehicle||'').toUpperCase();
      const found = findSaleByReg(reg);
      const v = found && found.vehicle ? found.vehicle : {};
      const s = found && found.sale ? found.sale : null;

      let headerRow = '';
      if (s && v) {
        const buyer = s.buyer || comp.customer || '';
        const soldDate = s.date ? ddmmyyyy(s.date) : '';
        const soldMileage = Number(s.mileage || 0);

        const compMileage = Number(comp.mileageNow || comp.collectedMileage || 0) || 0;
        let daysSinceSale = '';
        if (s.date) {
          const dSale = new Date(s.date);
          const dComp = comp.date ? new Date(comp.date) : new Date();
          const diff = Math.round((dComp - dSale) / (1000*60*60*24));
          daysSinceSale = isNaN(diff) ? '' : `${diff} days`;
        }
        const diffMiles = (compMileage && soldMileage) ? (compMileage - soldMileage) : null;

        // warranty from settings
        let warrantyText = '';
        const wMonths = Number((db.company||{}).defaultWarrantyMonths || 0);
        if (s.date && wMonths > 0) {
          const d = new Date(s.date);
          d.setMonth(d.getMonth()+wMonths);
          const iso = d.toISOString().slice(0,10);
          warrantyText = `• Warranty approx until ${ddmmyyyy(iso)} (${wMonths} months)`;
        }

        let bits = [];
        if (soldDate) bits.push(`Sold: ${soldDate}${daysSinceSale ? ' ('+daysSinceSale+' before complaint)' : ''}`);
        if (soldMileage) bits.push(`Mileage at sale: ${soldMileage.toLocaleString()} miles`);
        if (compMileage) bits.push(`Mileage now: ${compMileage.toLocaleString()} miles` + (diffMiles!=null ? ` (${diffMiles.toLocaleString()} since sale)` : ''));
        if (warrantyText) bits.push(warrantyText);

        const headerLine = `Logging for: ${buyer || 'Unknown'} — ${reg} (${v.make||''} ${v.model||''})`;
        headerRow = `<tr><td colspan="2" style="padding:8px 4px;background:#0f1628;color:#cbd4ff;font-size:12px;border-bottom:1px solid var(--line);">
            ${headerLine}<br>
            <span style="color:#cbd4ffb3;font-size:11px">${bits.join(' • ')}</span>
          </td></tr>`;
      }

      const html = `
        <div style="padding:10px;max-width:700px">
          <h3>Complaint Details</h3>
          <table style="width:100%;border-collapse:collapse">
            ${headerRow}
            <tr><th style="text-align:left;padding:6px 4px;width:130px">Date:</th><td style="padding:6px 4px">${ddmmyyyy(comp.date)}</td></tr>
            <tr><th style="text-align:left;padding:6px 4px">Customer:</th><td style="padding:6px 4px">${comp.customer}</td></tr>
            <tr><th style="text-align:left;padding:6px 4px">Vehicle:</th><td style="padding:6px 4px">${(comp.vehicle||'')}${v.make||v.model ? ' — ' + (v.make||'') + ' ' + (v.model||'') : ''}</td></tr>

            <tr><th style="text-align:left;padding:6px 4px">Customer collected:</th><td style="padding:6px 4px">${ddmmyyyy(comp.collectedDate) || ''}</td></tr>
            <tr><th style="text-align:left;padding:6px 4px">Mileage at collection:</th><td style="padding:6px 4px">${comp.collectedMileage || ''}</td></tr>
            <tr><th style="text-align:left;padding:6px 4px">Handled by:</th><td style="padding:6px 4px">${comp.handler || comp.assigned || ''}</td></tr>

            <tr><th style="text-align:left;padding:6px 4px;vertical-align:top">Details:</th><td style="padding:6px 4px">${(comp.details || '').replace(/\n/g, '<br>')}</td></tr>
            <tr><th style="text-align:left;padding:6px 4px;vertical-align:top">Resolution:</th><td style="padding:6px 4px">${(comp.resolution || '').replace(/\n/g, '<br>') || 'None recorded'}</td></tr>
          </table>
        </div>`;
      alert(html);
    }

    else if(act === 'pack') {
      openComplaintEvidence(comp);
    }

    else if(act === 'sorted') {
      if(!canAction('edit')) return alert('No permission');
      comp.status = 'sorted';
      comp.followup = '';
      comp.updatedAt = new Date().toISOString();
      if(!comp.resolution) comp.resolution = 'Complaint marked as sorted.';
      saveDB();
      try{renderAlertBell();}catch(e){}
      addAudit('update', 'complaint', comp.id, `${comp.customer || ''} marked sorted`);
      renderComplaints();
    }

    else if(act === 'close') {
      if(!canAction('edit')) return alert('No permission');
      comp.status = 'closed';
      comp.followup = '';
      comp.updatedAt = new Date().toISOString();
      if(!comp.resolution) comp.resolution = 'Complaint closed.';
      saveDB();
      try{renderAlertBell();}catch(e){}
      addAudit('update', 'complaint', comp.id, `${comp.customer || ''} closed`);
      renderComplaints();
    }

    else if(act === 'edit') {
      if(!canAction('edit')) return alert('No permission');
      editId = comp.id;

      wrap.querySelector('#comp_date').value = comp.date || '';
      wrap.querySelector('#comp_customer').value = comp.customer || '';
      wrap.querySelector('#comp_vehicle').value = comp.vehicle || '';
      wrap.querySelector('#comp_type').value = comp.type || '';
      wrap.querySelector('#comp_severity').value = comp.severity || 'medium';
      wrap.querySelector('#comp_details').value = comp.details || '';
      wrap.querySelector('#comp_resolution').value = comp.resolution || '';
      wrap.querySelector('#comp_status').value = comp.status || 'new';
      wrap.querySelector('#comp_assigned').value = comp.assigned || '';
      wrap.querySelector('#comp_followup').value = comp.followup || '';
      wrap.querySelector('#comp_cost').value = comp.cost || '';

      wrap.querySelector('#comp_mileageNow').value = comp.mileageNow || '';
      wrap.querySelector('#comp_mechBook').value = (comp.mechanicBooked || '').substring(0,10);
      wrap.querySelector('#comp_mechName').value = comp.mechanicName || '';
      wrap.querySelector('#comp_delivered').value = (comp.deliveredDate || '').substring(0,10);
      wrap.querySelector('#comp_work').value = comp.workDone || '';
      wrap.querySelector('#comp_collected').value = (comp.collectedDate || '').substring(0,10);
      wrap.querySelector('#comp_collectedMileage').value = comp.collectedMileage || '';
      wrap.querySelector('#comp_handler').value = comp.handler || '';

      buildSaleHint(comp.vehicle, comp);
      document.getElementById('app').scrollIntoView({ behavior: 'smooth' });
    }
    else if(act === 'del') {
      if(!canAction('del')) return alert('No permission');
      if(!confirm('Delete this complaint?')) return;

      // track complaint deletion
      markDeleted('complaints', id);
      db.complaints = (db.complaints||[]).filter(x => x.id !== id);

      saveDB();
      try{renderAlertBell();}catch(e){}
      addAudit('delete', 'complaint', id, comp.customer || '');
      renderComplaints();
    }
  });

  return wrap;
}

/* ========= Users ========= */
function viewUsers(){ if(!canTab('Users')) return document.createElement('div'); const wrap=document.createElement('div'); wrap.className='card'; const tabs=DEFAULT_TABS;
  function renderTable(){ wrap.innerHTML=`<h2>Users</h2>
<div class="row"><button id="u_reset_admin" class="danger">Reset admin password</button></div>
<div class="row"><input id="u_name" placeholder="username"><input id="u_pass" placeholder="password"><select id="u_role"><option value="user">user</option><option value="admin">admin</option></select><button id="u_add" class="primary">Add user</button></div>
  <table class="table" style="margin-top:10px"><thead><tr><th>User</th><th>Role</th><th>Permissions</th><th>Actions</th></tr></thead><tbody id="u_body"></tbody></table>`;
    
  /* users dedupe */
  (function(){
    const seen=new Set(); const out=[];
    (db.users||[]).forEach(u=>{ const key=(u.username||u.name||'')+'|'+(u.role||''); if(!seen.has(key)){ seen.add(key); out.push(u); }});
    if(out.length !== (db.users||[]).length){ db.users=out; saveDB(); }
  })();
    const body=wrap.querySelector('#u_body'); (db.users||[]).forEach(u=>{ const p=normalizePerms(u.perms);
      const tabChecks=tabs.map(t=>`<label class="small" style="display:inline-block;min-width:110px"><input data-user="${u.id}" data-k="tab" data-tab="${t}" type="checkbox" ${p.tabs[t]?'checked':''}> ${t}</label>`).join('\n');
      const actionChecks=['view','add','edit','del'].map(a=>`<label class="small"><input data-user="${u.id}" data-k="act" data-act="${a}" type="checkbox" ${p.actions[a]?'checked':''}> ${a}</label>`).join('\n');
      const extraChecks=`<label class="small"><input data-user="${u.id}" data-k="profit" type="checkbox" ${p.profit?'checked':''}> can see profit</label> <label class="small"><input data-user="${u.id}" data-k="settings" type="checkbox" ${p.settings?'checked':''}> can edit settings</label>`;
      const tr=document.createElement('tr'); tr.innerHTML=`<td>${u.username}</td><td>${u.role}</td><td>${tabChecks}<div style="margin-top:6px">${actionChecks} &nbsp; ${extraChecks}</div></td>
      <td><button data-act="chpass" data-id="${u.id}">Change Password</button> <button data-act="reset" data-id="${u.id}">Reset pass to '1234'</button> <button class="danger" data-act="del" data-id="${u.id}">Delete</button></td>`; body.appendChild(tr); });
    wrap.addEventListener('change',(ev)=>{ const el=ev.target; if(!el.dataset||!el.dataset.user) return; const u=(db.users||[]).find(x=>x.id===el.dataset.user); if(!u) return; u.perms=normalizePerms(u.perms);
      if(el.dataset.k==='tab'){ u.perms.tabs[el.dataset.tab]=el.checked; } if(el.dataset.k==='act'){ u.perms.actions[el.dataset.act]=el.checked; } if(el.dataset.k==='profit'){ u.perms.profit=el.checked; } if(el.dataset.k==='settings'){ u.perms.settings=el.checked; } saveDB(); try{renderAlertBell();}catch(e){}; if(u.username===session.username) render(); });
    wrap.addEventListener('click', async (ev)=>{ const b=ev.target.closest('button'); if(!b) return; const u=(db.users||[]).find(x=>x.id===b.dataset.id);
      if(b.dataset.act==='chpass'){
        const p1=prompt("New password for '"+u.username+"':"); if(p1===null) return;
        if(!p1.trim()) return alert('Password cannot be empty');

        if(!isStrongPassword(p1)){
          return alert('Password too weak.\nUse at least 10 chars with: Upper + lower + number + symbol.');
        }

        const p2=prompt('Confirm new password:'); if(p2===null) return;
        if(p1!==p2) return alert('Passwords do not match');

        await setUserPasswordHashed(u, p1);
        saveDB();
        try{renderAlertBell();}catch(e){}
        addAudit('update','userPass',u.id,'Admin changed for '+u.username);
        alert('Password updated for '+u.username);
        return;
      }
      if(b.dataset.act==='reset'){ await setUserPasswordHashed(u, '1234'); saveDB(); try{renderAlertBell();}catch(e){}; addAudit('update','user',u.id,u.username+' reset'); alert("Password reset to '1234'"); return; }
      
      if(b.dataset.act==='del'){ 
        if(u.username==='admin') return alert('Cannot delete admin'); 

        // track user deletion
        markDeleted('users', u.id);

        db.users = db.users.filter(x=>x.id!==u.id); 
        saveDB(); 
        try{renderAlertBell();}catch(e){}; 
        addAudit('delete','user',u.id,u.username); 
        renderTable(); 
        return; 
      }
    });
    wrap.querySelector('#u_add').onclick=async ()=>{ const name=wrap.querySelector('#u_name').value.trim(); if(!name) return alert('Username required'); const plainPass = (wrap.querySelector('#u_pass').value || '1234'); const u = {id:uid(), username:name, role:wrap.querySelector('#u_role').value, perms:defaultPerms()}; await setUserPasswordHashed(u, plainPass); (db.users=db.users||[]).push(u); saveDB(); try{renderAlertBell();}catch(e){}; addAudit('add','user',u.id,u.username); renderTable(); };
  }
  renderTable(); return wrap;
}

    const logoUpload = wrap.querySelector('#c_logoUpload');
    if (logoUpload) {
      logoUpload.parentNode.parentNode.style.display = 'none';
    }
  }
  
  return wrap;
}

function applyAutoTodayAndMandatoryDate(){
  const today = new Date().toISOString().slice(0,10);

  // Helper to wire multiple date fields
  function wireDate(inputId, buttonId, message){
    const d = document.getElementById(inputId);
    if (d && !d.value) d.value = today;

    const btn = document.getElementById(buttonId);
    if (btn && !btn.dataset.checked){
      btn.dataset.checked = "1";
      btn.addEventListener('click', e=>{
        const d2 = document.getElementById(inputId);
        if (d2 && !d2.value){
          alert(message);
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
    }
  }

  // Sale
  wireDate('sale_date', 'sale_add', 'Please select Sale Date');

  // Purchase
  wireDate('pi_date', 'pi_add', 'Please select Purchase Date');

  // Credit / Refund
  wireDate('cr_date', 'cr_add', 'Please select Credit / Refund Date');

  // 🔹 Expenses
  wireDate('e_date', 'e_add', 'Please select Expense Date');

  // 🔹 Showroom
  wireDate('s_date', 's_add', 'Please select Showroom Date');

  // 🔹 Customer Complaint
  wireDate('comp_date', 'comp_add', 'Please select Complaint Date');
}

// Light server monitor: keeps local server data available WITHOUT rebuilding the current screen.
// IMPORTANT: The old monitor called render() after pulling remote data. That caused Reports,
// Sales Wizard, filters, opened details and scroll position to disappear every few seconds.
// This version merges server data quietly and only updates small header/status widgets.
let localServerMonitorTimer = null;
function startLocalServerMonitor(){
  try{ if(localServerMonitorTimer) clearInterval(localServerMonitorTimer); }catch(_){ }
  localServerMonitorTimer = setInterval(function(){
    try{
      const remote = tryPullServerDB();
      if(remote){
        stopAutoSync();
        const rv = Number(remote._sync && remote._sync.version || 0);
        const lv = Number(db._sync && db._sync.loadedVersion || db._sync && db._sync.version || 0);
        if(rv > lv){
          db = mergeDbForNetwork(db || {}, remote);
          db._sync.loadedVersion = rv;
          window.db = db;
          persistLocalSnapshot(db);
          // DO NOT call render() here. User's current page must remain stable.
          try{ if(typeof initHeader === 'function') initHeader(); }catch(_){ }
        }
      }
      try{ if(typeof renderBackupInfo === 'function') renderBackupInfo(); }catch(_){ }
      try{ if(typeof renderAlertBell === 'function') renderAlertBell(); }catch(_){ }
    }catch(e){ console.warn('local server monitor failed', e); }
  }, 8000);
}
startLocalServerMonitor();
render();
try{ renderBackupInfo(); }catch(_){ }
