<!doctype html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Cars — v48 Upgraded</title>
<style>
:root{
  --bg1:#0b1020;--bg2:#0e1a36;--card:#131a2b;--ink:#e9eef7;--mut:#a3b2cc;
  --pri:#53a8ff;--ok:#2ecc71;--bad:#ff6b6b;--line:#26324a
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;color:var(--ink);
  background:radial-gradient(1200px 800px at 10% -10%,#1a2e5f 0%,rgba(26,46,95,0.0) 60%),
             radial-gradient(900px 700px at 120% 0%,#0a5ea1 0%,rgba(10,94,161,0.0) 60%),
             linear-gradient(160deg,var(--bg1),var(--bg2))
}
a{color:var(--pri)}
header{
  display:flex;gap:12px;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--line);
  background:rgba(10,16,30,.7);backdrop-filter:blur(6px);position:sticky;top:0;z-index:5
}
#logoBox{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#53a8ff,#7a5cff);display:grid;place-items:center;font-weight:900;overflow:hidden}
#logoBox img{width:100%;height:100%;object-fit:contain}
.hdr-actions button{margin-left:6px}
nav{
  display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line);
  background:rgba(10,16,30,0.55);backdrop-filter:blur(6px);position:sticky;top:64px;z-index:4
}
nav button{
  border-radius: 999px;
  padding: 8px 12px;
  box-shadow: none;
  background: rgba(255,255,255,.05);
  border-color: rgba(255,255,255,.10);
}
nav button:hover{ filter: brightness(1.10); }
nav button.active{
  background: linear-gradient(135deg, rgba(83,168,255,.95), rgba(122,92,255,.92));
  color: #061225;
  font-weight: 900;
}
main{padding:16px;max-width:1200px;margin:auto}
.card{background:rgba(19,26,43,.92);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
input,select,textarea{background:#0f1628;border:1px solid var(--line);color:var(--ink);padding:8px;border-radius:10px;min-width:120px}
label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--mut)}
textarea{min-height:88px;width:100%}
small,.small{color:var(--mut);font-size:12px}
button{background:#182845;border:1px solid var(--line);color:var(--ink);padding:8px 10px;border-radius:10px;cursor:pointer}
button.primary{background:var(--pri);border-color:#2b7be0;color:#031226}
button.danger{background:#321722;border-color:#5a2a3d;color:#ffc9c9}

/* =========================
   PRO BUTTON SYSTEM (v1)
   Works with existing: <button>, .primary, .danger
   Add optional: .soft, .outline, .ghost, .small, .lg, .block
========================= */

/* Base */
button{
  -webkit-tap-highlight-color: transparent;
  appearance: none;
  user-select: none;
  border-radius: 12px;
  padding: 9px 12px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(255,255,255,.06);
  color: var(--ink);
  font-weight: 750;
  letter-spacing: .1px;
  cursor: pointer;
  transition: transform .08s ease, filter .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
  box-shadow: 0 6px 18px rgba(0,0,0,.20);
}
button:hover{
  filter: brightness(1.08);
}
button:active{
  transform: translateY(1px);
  filter: brightness(1.02);
}
button:focus-visible{
  outline: none;
  box-shadow: 0 0 0 3px rgba(83,168,255,.25), 0 10px 30px rgba(0,0,0,.22);
}

/* Sizes */
button.small{ padding: 6px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; }
button.lg{ padding: 11px 14px; border-radius: 14px; font-size: 14px; }
button.block{ width: 100%; }

/* Variants */
button.primary{
  background: linear-gradient(135deg, rgba(83,168,255,.95), rgba(122,92,255,.92));
  border-color: rgba(83,168,255,.55);
  color: #061225;
  box-shadow: 0 10px 26px rgba(83,168,255,.20), 0 10px 30px rgba(0,0,0,.20);
}
button.primary:hover{ filter: brightness(1.06); }
button.primary:active{ transform: translateY(1px); }

button.danger{
  background: linear-gradient(135deg, rgba(255,107,107,.20), rgba(255,107,107,.12));
  border-color: rgba(255,107,107,.35);
  color: #ffd5d5;
  box-shadow: 0 10px 26px rgba(255,107,107,.10), 0 10px 30px rgba(0,0,0,.20);
}

button.success{
  background: linear-gradient(135deg, rgba(46,204,113,.22), rgba(46,204,113,.12));
  border-color: rgba(46,204,113,.38);
  color: #d8ffe8;
}

button.warn{
  background: linear-gradient(135deg, rgba(255,196,87,.22), rgba(255,196,87,.12));
  border-color: rgba(255,196,87,.40);
  color: #ffe9b8;
}

/* Outline / Ghost */
button.outline{
  background: transparent;
  border-color: rgba(255,255,255,.18);
  box-shadow: none;
}
button.ghost{
  background: transparent;
  border-color: transparent;
  box-shadow: none;
}
button.ghost:hover{
  background: rgba(255,255,255,.06);
  border-color: rgba(255,255,255,.10);
}

/* Icon button helper */
button.icon{
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 12px;
  display: inline-grid;
  place-items: center;
}

.table{width:100%;border-collapse:collapse}
.table th,.table td{border:1px solid var(--line);padding:6px 8px}
.table th{background:#0c1526;text-align:left}
.right{text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:#0f1a2d}
footer{padding:30px 0;color:#8ea3c6;text-align:center}
#loginOverlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(3,6,12,.7);z-index:10}
.loginCard{width:360px;max-width:90vw}
kbd{background:#0b1230;border:1px solid #22325e;border-radius:6px;padding:1px 6px}
.stat{font-size:28px;font-weight:800}
.previewStrip{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.previewStrip img{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: #0a1420 !important;
  border-color: #1a2438 !important;
  color: #6b7a99 !important;
}

button.primary:disabled {
  background: #1a4a7a !important;
  border-color: #1a4a7a !important;
  color: #6b7a99 !important;
}

/* ===== Pro Top Nav ===== */
.topnav{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);
  background:rgba(10,16,30,0.55);backdrop-filter:blur(8px);
  position:sticky;top:64px;z-index:4
}
.topnav-left{
  display:flex;gap:8px;align-items:center;
  overflow:auto;white-space:nowrap;
  scrollbar-width:thin;
  padding-bottom:2px;
}
.topnav-left::-webkit-scrollbar{height:8px}
.topnav-left::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.10);border-radius:999px}
.topnav-left button{
  background:#17233a;border:1px solid var(--line);color:var(--ink);
  padding:8px 12px;border-radius:999px;cursor:pointer;
  flex:0 0 auto;
}
.topnav-left button.active{
  background:var(--pri);border-color:transparent;color:#001029;font-weight:800
}
.appsBtn{border-radius:12px;padding:8px 12px;font-weight:800}

/* ===== App Launcher ===== */
.appsOverlay{
  position:fixed;inset:0;z-index:20;
  background:rgba(2,6,12,0.75);backdrop-filter:blur(6px);
  display:grid;place-items:start center;padding:90px 12px 20px;
}
.appsPanel{
  width:min(980px, 95vw);
  background:rgba(19,26,43,0.96);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
}
.appsHead{display:flex;align-items:center;justify-content:space-between}
#appsGrid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:10px;
}
.appsGroupTitle{
  grid-column:1/-1;
  margin-top:10px;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mut);
}
.appsTile{
  display:flex;align-items:center;gap:10px;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#0f1628;
  cursor:pointer;
}
.appsTile:hover{filter:brightness(1.08)}
.appsIco{
  width:34px;height:34px;border-radius:12px;
  background:rgba(255,255,255,0.06);
  display:grid;place-items:center;font-weight:900;
}
@media(max-width:900px){ #appsGrid{grid-template-columns:repeat(2,minmax(0,1fr));} }

/* =========================
   PRO TABLES (v1)
   Works with your existing class="table"
========================= */

.table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,.22);
}

.table thead th{
  position:sticky;
  top:0;                        /* ✅ sticky header */
  z-index:2;
  background:rgba(15,22,40,.95);
  backdrop-filter:blur(8px);
  color:rgba(230,240,255,.95);
  font-weight:900;
  font-size:12px;
  letter-spacing:.03em;
  text-transform:none;
  border-bottom:1px solid rgba(255,255,255,.10);
}

.table th, .table td{
  padding:10px 10px;
  border-bottom:1px solid rgba(255,255,255,.07);
  vertical-align:top;
}

.table tbody tr{
  transition:filter .12s ease, background .12s ease;
}
.table tbody tr:nth-child(odd){
  background:rgba(255,255,255,.015);    /* ✅ zebra */
}
.table tbody tr:hover{
  background:rgba(83,168,255,.08);      /* ✅ hover */
  filter:brightness(1.04);
}

.table td.right, .table th.right{ text-align:right; }

/* nicer action buttons inside tables */
.table td button{ box-shadow:none; }
.table td button.small{ padding:6px 10px; }

/* compact mode option */
.table.compact th, .table.compact td{ padding:8px 8px; }

/* make tables scrollable on small screens */
.tableWrap{
  width:100%;
  overflow:auto;
  border-radius:14px;
}
.tableWrap::-webkit-scrollbar{ height:10px; }
.tableWrap::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:999px; }

/* highlight search matches (optional class) */
tr.hl{
  outline:2px solid rgba(83,168,255,.35);
  outline-offset:-2px;
  background:rgba(83,168,255,.10) !important;
}

/* =========================
   PRO FORMS (v1)
   Upgrades: input/select/textarea/label + rows + help text
========================= */

/* Form rows spacing */
.row{
  gap:10px;                 /* a bit more breathing room */
  align-items:flex-end;     /* labels + inputs align nicely */
}

/* Labels */
label{
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:12px;
  color:var(--mut);
  font-weight:700;
}
label .req::after{ content:" *"; color:var(--bad); font-weight:900; }

/* Inputs */
input, select, textarea{
  width:auto;
  min-height:40px;
  padding:9px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  color:var(--ink);
  outline:none;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
  transition: border-color .15s ease, box-shadow .15s ease, filter .15s ease, background .15s ease;
}

/* Full-width in labels + when you set flex:1 */
label input, label select, label textarea{ width:100%; }

/* Focus ring */
input:focus, select:focus, textarea:focus{
  border-color: rgba(83,168,255,.50);
  box-shadow: 0 0 0 3px rgba(83,168,255,.22), inset 0 0 0 1px rgba(0,0,0,.12);
  filter: brightness(1.03);
}

/* Placeholder */
input::placeholder, textarea::placeholder{
  color: rgba(163,178,204,.75);
}

/* Select dropdown arrow styling (simple + safe) */
select{
  appearance:none;
  background-image:
    linear-gradient(45deg, transparent 50%, rgba(233,238,247,.85) 50%),
    linear-gradient(135deg, rgba(233,238,247,.85) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) 50%,
    calc(100% - 12px) 50%;
  background-size: 6px 6px, 6px 6px;
  background-repeat:no-repeat;
  padding-right:32px;
}

/* Textarea */
textarea{
  min-height:92px;
  resize: vertical; /* change to 'none' if you want no resizing */
}

/* Small helper text */
.help, .hint, .smallHelp{
  font-size:12px;
  color:var(--mut);
  opacity:.9;
  margin-top:4px;
}

/* Inline field group for compact layouts */
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:180px;
}

/* Error look (you can apply class="invalid") */
.invalid{
  border-color: rgba(255,107,107,.55) !important;
  box-shadow: 0 0 0 3px rgba(255,107,107,.18) !important;
}

/* Readonly/disabled nicer */
input:disabled, select:disabled, textarea:disabled{
  opacity:.60;
  cursor:not-allowed;
  background:rgba(255,255,255,.03);
}

/* Make dense rows wrap cleaner */
.row > input, .row > select, .row > textarea{ flex:0 0 auto; }
.row > input[style*="flex:1"], .row > textarea[style*="flex:1"]{ flex:1 1 320px; }

/* =========================
   PRO CARD SYSTEM (v1)
   Upgrades existing .card everywhere
========================= */

.card{
  position:relative;
  background:
    radial-gradient(1200px 600px at -10% -20%, rgba(83,168,255,.10), transparent 40%),
    linear-gradient(180deg, rgba(18,26,46,.96), rgba(14,20,36,.98));
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:14px 14px 16px;
  box-shadow:
    0 18px 46px rgba(0,0,0,.32),
    inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter: blur(10px);
}

/* Card hover (very subtle, professional) */
.card:hover{
  border-color: rgba(83,168,255,.28);
  box-shadow:
    0 22px 60px rgba(0,0,0,.38),
    inset 0 1px 0 rgba(255,255,255,.05);
}

/* Card header line */
.card .card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}

/* Card title */
.card h3{
  margin:0;
  font-size:15px;
  font-weight:900;
  letter-spacing:.2px;
}

/* Small subtitle */
.card .card-sub{
  font-size:12px;
  color:var(--mut);
  margin-top:2px;
}

/* Divider inside cards */
.card .card-divider{
  height:1px;
  background:rgba(255,255,255,.08);
  margin:10px 0;
}

/* Section titles inside cards */
.card .section-title{
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--mut);
  margin:12px 0 6px;
}

/* Dense cards (optional class) */
.card.dense{ padding:10px 10px 12px; }

/* Flat cards (optional) */
.card.flat{
  background:rgba(18,26,46,.92);
  box-shadow:none;
}

/* =========================
   PRO MODAL SYSTEM
========================= */
.modalOverlay{
  position:fixed;
  inset:0;
  z-index:9999;
  background:rgba(2,6,12,.65);
  backdrop-filter:blur(6px);
  display:grid;
  place-items:center;
  padding:20px;
}

.modalBox{
  width:min(520px, 96vw);
  background: linear-gradient(180deg, rgba(18,26,46,.98), rgba(12,18,34,.98));
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.55);
  padding:14px;
  animation:modalIn .18s ease-out;
}

@keyframes modalIn{
  from{ transform:translateY(8px) scale(.98); opacity:.6; }
  to{ transform:none; opacity:1; }
}

.modalHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
  font-weight:900;
}

.modalBody{
  font-size:14px;
  line-height:1.5;
  margin:10px 0 14px;
  color:var(--ink);
}

.modalActions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  flex-wrap:wrap;
}

/* ===== Fix white dropdown menus (options) ===== */
select, option, optgroup{
  background-color:#0f1628;
  color:var(--ink);
}

optgroup{
  color:rgba(230,240,255,.85);
}

/* Windows high-contrast / forced-colors safety */
@media (forced-colors: active){
  select, option, optgroup{
    forced-color-adjust:auto;
  }
}

/* =========================================
   PREMIUM HYBRID SKIN (A + B) — v1
   Luxury dark + modern clean cards/tables
   Paste at END of your <style>
========================================= */

/* slightly richer palette */
:root{
  --bg1:#070b16;
  --bg2:#0b1633;
  --card:#0f182c;
  --ink:#eef4ff;
  --mut:#9fb1d1;
  --line:rgba(255,255,255,.10);
  --pri:#5ab0ff;
}

/* background = “luxury” */
body{
  background:
    radial-gradient(1200px 800px at 10% -10%, rgba(90,176,255,.22) 0%, rgba(90,176,255,0.0) 60%),
    radial-gradient(900px 700px at 120% 0%, rgba(122,92,255,.18) 0%, rgba(122,92,255,0.0) 60%),
    radial-gradient(900px 700px at 40% 120%, rgba(46,204,113,.10) 0%, rgba(46,204,113,0.0) 55%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
}

/* page width + spacing */
main{ max-width:1320px; padding:20px 18px 28px; }

/* header = premium glass + subtle border */
header{
  background:rgba(6,10,22,.72) !important;
  border-bottom:1px solid rgba(255,255,255,.10) !important;
  backdrop-filter: blur(12px) saturate(1.15);
}

/* tabs bar = cleaner */
.topnav{
  background:rgba(6,10,22,.55) !important;
  border-bottom:1px solid rgba(255,255,255,.10) !important;
}

/* cards = luxury glass + soft glow */
.card{
  border:1px solid rgba(255,255,255,.10) !important;
  box-shadow:
    0 18px 50px rgba(0,0,0,.42),
    inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.card::after{
  content:"";
  position:absolute; inset:0;
  pointer-events:none;
  border-radius:16px;
  background: radial-gradient(900px 300px at 10% 0%, rgba(90,176,255,.10), transparent 55%);
  opacity:.9;
}

/* modern inputs (Autotrader-ish) */
input,select,textarea{
  background:rgba(255,255,255,.045) !important;
  border:1px solid rgba(255,255,255,.12) !important;
}
input:hover,select:hover,textarea:hover{
  border-color: rgba(90,176,255,.35) !important;
  background: rgba(255,255,255,.06) !important;
}

/* KPI stat look (use .stat already in your file) */
.stat{
  font-size:32px;
  letter-spacing:.2px;
  text-shadow: 0 10px 30px rgba(0,0,0,.35);
}

/* tables = cleaner lines, less “boxy” */
.table{
  border:1px solid rgba(255,255,255,.10) !important;
}
.table th,.table td{
  border-bottom:1px solid rgba(255,255,255,.07) !important;
}
.table tbody tr:hover{
  background: rgba(90,176,255,.085) !important;
}

/* buttons = premium gradient primary */
button.primary{
  background: linear-gradient(135deg, rgba(90,176,255,.98), rgba(122,92,255,.90)) !important;
  border-color: rgba(90,176,255,.55) !important;
}

/* nicer scrollbar (desktop) */
@media (hover:hover){
  *::-webkit-scrollbar{ width:12px; height:12px; }
  *::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:999px; border:3px solid rgba(0,0,0,0.0); background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.18); border:3px solid rgba(0,0,0,0.0); background-clip: padding-box; }
}

.pageTitle{ font-size:22px; font-weight:950; margin:4px 0 10px; }
.pageSub{ font-size:12px; color:var(--mut); margin:-6px 0 14px; }

.kpiGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:14px}
.kpiCard{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:14px;box-shadow:0 18px 45px rgba(0,0,0,.35)}
.kpiLabel{font-size:12px;color:var(--mut);font-weight:800}
.kpiValue{font-size:30px;font-weight:950;margin-top:6px}

/* ===== Reports Professional Pack (v1) ===== */
.reportsWrap{ display:flex; flex-direction:column; gap:12px; }
.reportsWrap .reportCard{ margin:0; }
.reportsWrap .card{ margin:0; } /* stop random spacing differences */

.repSum{
  cursor:pointer;
  font-weight:950;
  font-size:14px;
  list-style:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.repSum::-webkit-details-marker{ display:none; }
.repSum::after{
  content:'▼';
  font-size:12px;
  color:var(--mut);

(function(){
  if (window.__starcars_bootstrap__) return;
  window.__starcars_bootstrap__ = true;

  // Safe CSV helper (fixed regex + quotes escaping)
  function toCSV(rows, headers){
    const esc = v => {
      const s = (v == null) ? '' : String(v);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    };
    const head = headers || ((rows && rows[0]) ? Object.keys(rows[0]) : []);
    const lines = [head.join(",")];
    for (const r of (rows || [])) lines.push(head.map(h => esc(r && r[h])).join(","));
    return lines.join("\n");
  }

  // Full JSON backup (includes audit + user passwords)
  window.backupJSON = function(){
    try{
      const data = JSON.stringify(window.db || {}, null, 2);
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([data], {type:"application/json"}));
      a.download = "starcars_backup_" + new Date().toISOString().slice(0,19).replace(/[:T]/g,"-") + ".json";
      a.click();
      if (typeof window.addAudit === "function") window.addAudit("export","backup","","Full JSON backup");
    }catch(e){ alert("Backup failed: " + (e.message||e)); }
  };

// Merge-from-backup with id-based merge for ALL arrays
window.restoreJSONMerge = function () {
  const i = document.createElement('input');
  i.type = 'file';
  i.accept = '.json,application/json';

  i.onchange = () => {
    const f = i.files && i.files[0];
    if (!f) return;

    const fr = new FileReader();
    fr.onload = () => {
      try {
        const incoming = JSON.parse(fr.result || '{}');
        const db = (window.db = window.db || {});

        for (const k of Object.keys(incoming)) {
          const val = incoming[k];

          if (k === 'audit') {
            // Replace audit log
            db.audit = Array.isArray(val) ? val.slice() : (db.audit || []);
            continue;
          }

          if (Array.isArray(val)) {
            // 🔁 Same id-merge logic as Gist pull – works for:
            // vehicles, vehicleExpenses, showroomExpenses, sales, credits,
            // partners (directors), investors, users, todo, etc.
            const localArr = Array.isArray(db[k]) ? db[k] : [];
            const byId = Object.create(null);
            const noId = [];

            for (const item of localArr) {
              if (item && item.id) {
                byId[item.id] = item;
              } else {
                noId.push(item);
              }
            }

            for (const item of val) {
              if (item && item.id) {
                byId[item.id] = item; // backup wins
              } else {
                noId.push(item);
              }
            }

            db[k] = [...noId, ...Object.values(byId)];

            // Fix users & directors special rules
            if (k === 'users' && typeof window.normalizePerms === 'function') {
              db.users = (db.users || []).map(u => {
                u.perms = window.normalizePerms(u.perms);
                return u;
              });
            }

            if (k === 'partners') {
              db.partners = (db.partners || []).filter((p, i, arr) =>
                arr.findIndex(pp =>
                  String(pp.name || '').trim().toLowerCase() ===
                  String(p.name || '').trim().toLowerCase()
                ) === i
              );
            }

            continue;
          }

          if (val && typeof val === 'object') {
            db[k] = Object.assign({}, db[k] || {}, val);
          } else {
            db[k] = val;
          }
        }

        if (typeof window.saveDB === 'function') window.saveDB();
        try {
          if (typeof window.renderAlertBell === 'function') window.renderAlertBell();
        } catch (_) {}
        if (typeof window.addAudit === 'function') {
          window.addAudit('import', 'backup', '', 'Merged JSON backup (id-merge)');
        }
        alert('Merged from backup');
        markPullUsed();
        if (typeof window.render === 'function') window.render();
    } catch (e) {
      alert(e.message || e);
    }
  };
  fr.readAsText(f);
};

  i.click();
};

  // Replace-from-backup
  window.restoreJSONReplace = function(){
    const i = document.createElement("input"); i.type = "file"; i.accept = ".json,application/json";
    i.onchange = () => {
      const f = i.files && i.files[0]; if(!f) return;
      const fr = new FileReader();
      fr.onload = () => {
        try{
          const incoming = JSON.parse(fr.result || "{}");
          window.db = (incoming && typeof incoming === "object") ? incoming : {};
          window.db.audit = window.db.audit || [];
          if (Array.isArray(window.db.users) && typeof window.normalizePerms === "function"){
            window.db.users = window.db.users.map(u => { u.perms = window.normalizePerms(u.perms); return u; });
          }
          window.saveDB && window.saveDB();
          try{ window.renderAlertBell && window.renderAlertBell(); }catch(_){}
          if (typeof window.addAudit === "function") window.addAudit("import","backup","","Replaced from JSON backup");
          alert("Replaced from backup");
          markPullUsed();
          window.render && window.render();
        }catch(e){ alert("Bad JSON: " + (e.message||e)); }
      };
      fr.readAsText(f);
    };
    i.click();
  };

  // Export everything as a single CSV (sectioned)
  window.exportAllCSV = function(){
    const db = window.db || {};
    const parts = [];
    parts.push("=== Vehicles ===");         parts.push(toCSV(db.vehicles||[]));
    parts.push(""); parts.push("=== Sales ==="); parts.push(toCSV(db.sales||[]));
    parts.push(""); parts.push("=== ShowroomExpenses ==="); parts.push(toCSV(db.showroomExpenses||[]));
    parts.push(""); parts.push("=== Investors ==="); parts.push(toCSV(db.investors||[]));
    parts.push(""); parts.push("=== Audit ==="); parts.push(toCSV(db.audit||[]));
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([parts.join("\n")], {type:"text/csv"}));
    a.download = "starcars_export_all_" + new Date().toISOString().slice(0,19).replace(/[:T]/g,"-") + ".csv";
    a.click();
    if (typeof window.addAudit === "function") window.addAudit("export","csv","","Export all CSV (sections)");
  };
})();
</script>

<script>
/* ========= Core utils ========= */
const DBKEY='starcars_db_v48u'; const GHTOKENKEY='starcars_github_token';

/* ========= Multi-PC Local Server Sync =========
   This fixes the old problem where each PC used only its own browser localStorage.
   To use true shared data, run the included server.js and open the app by IP, e.g.
   http://PC1-IP:8787/index.html on all PCs. If the /api/db server is not available,
   the app falls back to localStorage so it still opens, but it will NOT be multi-PC safe.
*/
const SERVER_DB_API = '/api/db';
const CLIENT_ID_KEY = 'starcars_client_id';
const SYNC_ENABLED_KEY = 'starcars_server_sync_enabled';
function getClientId(){
  let id = localStorage.getItem(CLIENT_ID_KEY);
  if(!id){ id = 'pc_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem(CLIENT_ID_KEY, id); }
  return id;
}
function cloneObj(o){ return JSON.parse(JSON.stringify(o || {})); }
function ensureSyncMeta(obj){
  obj = obj || {};
  obj._sync = obj._sync || {};
  if(!obj._sync.clientId) obj._sync.clientId = getClientId();
  if(!obj._sync.updatedAt) obj._sync.updatedAt = new Date().toISOString();
  if(typeof obj._sync.version === 'undefined') obj._sync.version = 0;
  if(typeof obj._sync.loadedVersion === 'undefined') obj._sync.loadedVersion = Number(obj._sync.version || 0);
  return obj;
}
function isRecordObj(x){ return x && typeof x === 'object' && !Array.isArray(x); }
function recStamp(x){ return String((x && (x._updatedAt || x.updatedAt || x.modifiedAt || x.createdAt || x.dateCreated || x.saleCreatedAt || x.date || x.ts)) || ''); }
function sameRecord(a,b){ try{ return JSON.stringify(a||{}) === JSON.stringify(b||{}); }catch(_){ return false; } }


// ========= Network deletion/tombstone helpers =========
// When one PC deletes a record, we keep a small "deleted" map (tombstone).
// This prevents an older open PC from re-sending the old record and bringing it back.
function networkNowIso(){ return new Date().toISOString(); }
function safeClone(o){ try{ return JSON.parse(JSON.stringify(o || {})); }catch(_){ return {}; } }
function mergeDeletedMapsSafe(a, b){
  const out = safeClone(a || {});
  const src = b && typeof b === 'object' ? b : {};
  Object.keys(src).forEach(section => {
    out[section] = out[section] || {};
    const sm = src[section] || {};
    Object.keys(sm).forEach(id => {
      if(!out[section][id] || String(out[section][id]) < String(sm[id])) out[section][id] = sm[id];
    });
  });
  return out;
}
function isDeletedInMap(deletedMap, section, id){
  return !!(id && deletedMap && deletedMap[section] && deletedMap[section][id]);
}
function applyDeletedMapToDbObject(obj){
  obj = obj || {};
  const del = obj.deleted || {};
  Object.keys(del).forEach(section => {
    if(Array.isArray(obj[section])) {
      obj[section] = obj[section].filter(item => !item || !item.id || !isDeletedInMap(del, section, item.id));
    }
  });
  // Relationship clean-up: when a vehicle is deleted, old PCs must not bring back its prep expenses.
  const deletedVehicleIds = del.vehicles ? new Set(Object.keys(del.vehicles)) : new Set();
  if(deletedVehicleIds.size && Array.isArray(obj.vehicleExpenses)){
    obj.vehicleExpenses = obj.vehicleExpenses.filter(e => !e || (!deletedVehicleIds.has(e.vehicleId) && !deletedVehicleIds.has(e.vid)));
  }
  return obj;
}
function markRecordForNetworkDelete(section, id){
  if(!window.db) window.db = db = {};
  db.deleted = db.deleted || {};
  db.deleted[section] = db.deleted[section] || {};
  db.deleted[section][id] = networkNowIso();
}
function mergeDbForNetwork(localDb, remoteDb){
  localDb = ensureSyncMeta(cloneObj(localDb || {}));
  remoteDb = ensureSyncMeta(cloneObj(remoteDb || {}));

  const mergedDeleted = mergeDeletedMapsSafe(localDb.deleted || {}, remoteDb.deleted || {});
  localDb.deleted = mergedDeleted;
  remoteDb.deleted = mergedDeleted;
  applyDeletedMapToDbObject(localDb);
  applyDeletedMapToDbObject(remoteDb);

  const out = cloneObj(remoteDb);
  out.deleted = mergedDeleted;
  const conflicts = [];

  Object.keys(localDb).forEach(k => {
    if(k === '_sync') return;
    const lv = localDb[k], rv = remoteDb[k];

    if(Array.isArray(lv) || Array.isArray(rv)){
      const localArr = Array.isArray(lv) ? lv : [];
      const remoteArr = Array.isArray(rv) ? rv : [];
      const byId = Object.create(null);
      const noId = [];
      remoteArr.forEach(item => {
        if(item && item.id){
          if(!isDeletedInMap(mergedDeleted, k, item.id)) byId[item.id] = cloneObj(item);
        } else noId.push(cloneObj(item));
      });
      localArr.forEach(item => {
        if(item && item.id){
          if(isDeletedInMap(mergedDeleted, k, item.id)) return;
          const cur = byId[item.id];
          if(!cur){ byId[item.id] = cloneObj(item); return; }
          if(sameRecord(cur,item)) return;
          const ls = recStamp(item), rs = recStamp(cur);
          if(ls && rs && ls > rs){ byId[item.id] = cloneObj(item); }
          else {
            conflicts.push(k + ':' + item.id);
            // remote wins when this browser was stale, preventing old PC overwrite
          }
        } else noId.push(cloneObj(item));
      });
      out[k] = [...noId, ...Object.values(byId)];
      return;
    }

    if(k === 'deleted') { out.deleted = mergedDeleted; return; }
    if(isRecordObj(lv) && isRecordObj(rv)) out[k] = Object.assign({}, rv, lv);
    else if(typeof rv === 'undefined') out[k] = lv;
  });

  out.deleted = mergedDeleted;
  applyDeletedMapToDbObject(out);
  out._sync = Object.assign({}, remoteDb._sync || {}, localDb._sync || {});
  out._sync.version = Number((remoteDb._sync && remoteDb._sync.version) || 0);
  out._sync.loadedVersion = out._sync.version;
  out._sync.clientId = getClientId();
  out._sync.lastConflictCount = conflicts.length;
  out._sync.lastConflictAt = conflicts.length ? new Date().toISOString() : (out._sync.lastConflictAt || '');
  out._sync.lastConflicts = conflicts.slice(0,20);
  return out;
}

// Merge used only when SAVING from a PC. Remote records are kept, but this PC's
// current edited records win by id so PC2/PC3 can save even if PC1 changed data first.
function mergeDbForSave(localDb, remoteDb){
  localDb = ensureSyncMeta(cloneObj(localDb || {}));
  remoteDb = ensureSyncMeta(cloneObj(remoteDb || {}));

  const mergedDeleted = mergeDeletedMapsSafe(localDb.deleted || {}, remoteDb.deleted || {});
  localDb.deleted = mergedDeleted;
  remoteDb.deleted = mergedDeleted;
  applyDeletedMapToDbObject(localDb);
  applyDeletedMapToDbObject(remoteDb);

  const out = cloneObj(remoteDb);
  out.deleted = mergedDeleted;

  Object.keys(localDb).forEach(k => {
    if(k === '_sync') return;
    const lv = localDb[k], rv = remoteDb[k];

    if(Array.isArray(lv) || Array.isArray(rv)){
      const byId = Object.create(null);
      const noId = [];
      (Array.isArray(rv) ? rv : []).forEach(item => {
        if(item && item.id){
          if(!isDeletedInMap(mergedDeleted, k, item.id)) byId[item.id] = cloneObj(item);
        } else noId.push(cloneObj(item));
      });
      (Array.isArray(lv) ? lv : []).forEach(item => {
        if(item && item.id){
          if(isDeletedInMap(mergedDeleted, k, item.id)) return;
          byId[item.id] = cloneObj(item); // local edit wins on save, but deleted IDs stay deleted
        } else noId.push(cloneObj(item));
      });
      out[k] = [...noId, ...Object.values(byId)];
      return;
    }

    if(k === 'deleted') { out.deleted = mergedDeleted; return; }
    if(isRecordObj(lv) && isRecordObj(rv)) out[k] = Object.assign({}, rv, lv);
    else if(typeof lv !== 'undefined') out[k] = lv;
  });

  out.deleted = mergedDeleted;
  applyDeletedMapToDbObject(out);
  out._sync = Object.assign({}, remoteDb._sync || {}, localDb._sync || {});
  out._sync.version = Number((remoteDb._sync && remoteDb._sync.version) || 0);
  out._sync.loadedVersion = out._sync.version;
  out._sync.clientId = getClientId();
  out._sync.saveMergedAt = new Date().toISOString();
  return out;
}
function serverRequestSync(method, url, body, headers){
  try{
    const x = new XMLHttpRequest();
    x.open(method, url, false); // sync on purpose: existing app calls saveDB() synchronously
    x.setRequestHeader('Accept','application/json');
    if(body !== undefined && body !== null) x.setRequestHeader('Content-Type','application/json');
    if(headers){ Object.keys(headers).forEach(h => x.setRequestHeader(h, headers[h])); }
    x.send(body !== undefined && body !== null ? JSON.stringify(body) : null);
    if(x.status >= 200 && x.status < 300) return {ok:true,status:x.status,json: x.responseText ? JSON.parse(x.responseText) : null};
    return {ok:false,status:x.status,text:x.responseText};
  }catch(e){ return {ok:false,status:0,error:e}; }
}

let __serverSyncStatusCache = null;
function serverSyncStatus(force){
  // Do not trust the old localStorage flag by itself. Test the real PC1 server endpoint.
  // Cache it shortly so rendering/header updates do not keep downloading the whole DB.
  if(!force && __serverSyncStatusCache && (Date.now() - __serverSyncStatusCache.ts) < 8000){
    return __serverSyncStatusCache.value;
  }
  if(String(location.protocol || '').toLowerCase() === 'file:'){
    localStorage.setItem(SYNC_ENABLED_KEY, 'false');
    localStorage.setItem('starcars_server_sync_last_error', 'Opened as file:// - use http://PC1-IP:8787/index.html');
    __serverSyncStatusCache = {ts:Date.now(), value:{ok:false, message:'Opened as file://'}};
    return __serverSyncStatusCache.value;
  }
  const r = serverRequestSync('GET', SERVER_DB_API + '?status=1&t=' + Date.now());
  if(r.ok && r.json && typeof r.json === 'object'){
    localStorage.setItem(SYNC_ENABLED_KEY, 'true');
    localStorage.removeItem('starcars_server_sync_last_error');
    __serverSyncStatusCache = {ts:Date.now(), value:{ok:true, db: ensureSyncMeta(r.json)}};
    return __serverSyncStatusCache.value;
  }
  localStorage.setItem(SYNC_ENABLED_KEY, 'false');
  localStorage.setItem('starcars_server_sync_last_error', 'Cannot reach /api/db from ' + location.href + ' status=' + (r.status || 0));
  __serverSyncStatusCache = {ts:Date.now(), value:{ok:false, message:'Cannot reach /api/db', raw:r}};
  return __serverSyncStatusCache.value;
}

  const st = serverSyncStatus(true);

function persistLocalSnapshot(obj){
  try { localStorage.setItem(DBKEY, JSON.stringify(obj || {})); }
  catch(e){ console.error('local snapshot save failed', e); }
}
function loadDB(){
  let local = {};
  try{ local = JSON.parse(localStorage.getItem(DBKEY)||'{}') || {}; }catch(e){ local = {}; }
  local = ensureSyncMeta(local);

  const remote = tryPullServerDB();
  if(remote){
    const merged = mergeDbForNetwork(local, remote);
    // First-time setup: if the server database is empty but this PC has existing data,
    // push it to PC1 server automatically so PC2/PC3 do not see a blank system.
    try{
      if(!dbHasBusinessData(remote) && dbHasBusinessData(local)){
        const post = serverRequestSync('POST', SERVER_DB_API, merged, {'If-Match': String((remote._sync && remote._sync.version) || 0)});
        if(post.ok && post.json){
          const saved = ensureSyncMeta(post.json);
          saved._sync.loadedVersion = Number(saved._sync.version || 0);
          persistLocalSnapshot(saved);
          return saved;
        }
      }
    }catch(e){ console.warn('Initial server bootstrap failed:', e); }
    persistLocalSnapshot(merged);
    return merged;
  }
  return local;
}
function trimDbForStorage(source){
  const slim = cloneObj(source || {});
  if (Array.isArray(slim.audit) && slim.audit.length > 1000) slim.audit = slim.audit.slice(0, 1000);
  if (slim.deleted && typeof slim.deleted === 'object') {
    Object.keys(slim.deleted).forEach(section => {
      const entries = Object.entries(slim.deleted[section] || {});
      if (entries.length > 1000) {
        entries.sort((a,b)=>String(b[1]).localeCompare(String(a[1])));
        const newMap = {};
        entries.slice(0,1000).forEach(([id, ts]) => newMap[id] = ts);
        slim.deleted[section] = newMap;
      }
    });
  }
  return slim;
}
function saveDB(){
  try {
    db = ensureSyncMeta(db || {});
    db._sync.updatedAt = new Date().toISOString();
    db._sync.clientId = getClientId();
    if(typeof applyDeletedMapToDbObject === 'function') applyDeletedMapToDbObject(db);

    // 1) Always save a local safety snapshot first
    persistLocalSnapshot(db);

    // 2) Pull latest server data before pushing, so stale PCs do not wipe newer records
    const remote = tryPullServerDB();
    if(remote){
      const remoteVersion = Number((remote._sync && remote._sync.version) || 0);
      const loadedVersion = Number((db._sync && db._sync.loadedVersion) || 0);
      let outgoing = db;
      if(remoteVersion > loadedVersion){
        outgoing = mergeDbForSave(db, remote);
        outgoing._sync.refreshedBeforeSave = true;
      }
      outgoing._sync.updatedAt = new Date().toISOString();
      outgoing._sync.clientId = getClientId();
      if(typeof applyDeletedMapToDbObject === 'function') applyDeletedMapToDbObject(outgoing);

      const post = serverRequestSync('POST', SERVER_DB_API, outgoing, {'If-Match': String(remoteVersion)});
      if(post.ok && post.json){
        db = ensureSyncMeta(post.json);
        db._sync.loadedVersion = Number(db._sync.version || 0);
        window.db = db;
        persistLocalSnapshot(db);
      } else if(post.status === 409){
        // Server changed between pull and push. Merge once and retry.
        let latest = null;
        try{ latest = JSON.parse(post.text || '{}').latest || null; }catch(_){ latest = null; }
        latest = latest || tryPullServerDB();
        if(latest){
          const merged = mergeDbForSave(outgoing, latest);
          merged._sync.updatedAt = new Date().toISOString();
          if(typeof applyDeletedMapToDbObject === 'function') applyDeletedMapToDbObject(merged);
          const retry = serverRequestSync('POST', SERVER_DB_API, merged, {'If-Match': String((latest._sync && latest._sync.version) || 0)});
          if(retry.ok && retry.json){
            db = ensureSyncMeta(retry.json);
            db._sync.loadedVersion = Number(db._sync.version || 0);
            window.db = db;
            persistLocalSnapshot(db);
          } else {
            console.warn('Server changed again during save; local snapshot kept and will retry on next save.');
            // Do not block the user from working. Their change is saved locally and will merge on the next save/refresh.
            return;
          }
        }
      } else {
        console.warn('Server save failed; local snapshot saved only.', post);
        alert('Warning: saved on this PC only. Server database was not reachable. Check local server.');
      }
    }

    try{ document.dispatchEvent(new CustomEvent('starcars:dataChanged', { detail: { ts: new Date().toISOString() } })); }catch(_){ }
    try{ if(typeof renderBackupInfo === 'function') renderBackupInfo(); }catch(_){ }
  } catch (e) {
    console.error('saveDB error:', e);
    try { localStorage.removeItem('starcars_last_snapshot'); } catch (_) {}
    try { persistLocalSnapshot(trimDbForStorage(db)); alert('Local storage was nearly full. Old history was trimmed but your main data was saved.'); }
    catch (e2) { alert('Save failed:\n' + (e2.message || e2)); }
  }
}

function getDashboardKpis(){
  const vehicles = db.vehicles || [];
  const sales = db.sales || [];
  const complaints = db.complaints || [];
  const today = new Date();
  const thisMonth = today.toISOString().slice(0,7);

  const inStock = vehicles.filter(v => String(v.status || '').toLowerCase() !== 'sold').length;

  const soldThisMonth = sales.filter(s => {
    const st = String(s.saleStatus || s.status || 'completed').toLowerCase();
    return (st === 'completed' || st === 'complete' || st === 'sold') &&
           String(s.date || '').startsWith(thisMonth);
  }).length;

  const openComplaints = complaints.filter(c => {
    const st = String(c.status || '').toLowerCase().trim();
    return st && !['closed','close','sorted','resolved'].includes(st);
  }).length;

  const financeOutstanding = sales.filter(s => {
    const st = String(s.saleStatus || s.status || 'completed').toLowerCase();
    const isLiveSale = (st === 'completed' || st === 'complete' || st === 'sold');

    const expected = Number(s.financePayout || s.sale_finPayout || s.financeAmount || 0);
    const received = Number(s.financePayoutAmount || 0);
    const paid = !!s.financePayoutPaid;

    return isLiveSale && expected > 0 && (!paid || received + 0.01 < expected);
  }).length;

  const mot30 = (typeof filterByMotDays === 'function')
    ? filterByMotDays(vehicles.filter(v => String(v.status || '').toLowerCase() !== 'sold'), 30).length
    : 0;

  const monthRevenue = sales
    .filter(s => {
      const st = String(s.saleStatus || s.status || 'completed').toLowerCase();
      return (st === 'completed' || st === 'complete' || st === 'sold') &&
             String(s.date || '').startsWith(thisMonth);
    })
    .reduce((t,s) => t + Number(s.salePrice || 0), 0);

  return {
    inStock,
    soldThisMonth,
    openComplaints,
    financeOutstanding,
    mot30,
    monthRevenue
  };
}

function getCCR009YearPack(year){
  const y = Number(year || new Date().getFullYear());
  const sales = (db.sales || [])
    .filter(s => isCompletedSaleForFCA(s))
    .filter(s => yearFromDate(s.date) === y)
    .map(s => autoPopulateFCASale(Object.assign({}, s)));

  const brokered = sales.filter(s => lowerTxt(s.fcaIsCreditBrokered) === 'yes');

  const totals = {
    year: y,
    totalSales: sales.length,
    totalBrokered: brokered.length,
    totalCreditBrokingRevenue: 0,
    totalCommissionEarned: 0,
    totalFeesFromIndividuals: 0,
    totalOtherRevenue: 0,
    totalCommissionPaid: 0
  };

  const lenders = {};
  const brokers = {};
  const channels = {};
  const issues = [];

  brokered.forEach(s => {
    const commission = Number(s.fcaCommissionEarned || 0);
    const feeFromCustomer = Number(s.fcaFeeFromIndividual || 0);
    const otherRevenue = Number(s.fcaOtherRevenue || 0);
    const commissionPaid = Number(s.fcaCommissionPaid || 0);
    const revenue = commission + feeFromCustomer + otherRevenue;

    totals.totalCreditBrokingRevenue += revenue;
    totals.totalCommissionEarned += commission;
    totals.totalFeesFromIndividuals += feeFromCustomer;
    totals.totalOtherRevenue += otherRevenue;
    totals.totalCommissionPaid += commissionPaid;

    const channel = normTxt(s.fcaCustomerChannel) || inferFCAChannelFromSale(s);
    channels[channel] = (channels[channel] || 0) + 1;

    const relType = normTxt(s.fcaIntroducerType) || inferIntroducerType(s);
    const firmName = normTxt(s.financeCompany) || '(No finance company entered)';

    const bucket = relType === 'Broker' ? brokers : lenders;
    if (!bucket[firmName]) {
      bucket[firmName] = {
        name: firmName,
        count: 0,
        revenue: 0,
        commissionPaid: 0
      };
    }

    bucket[firmName].count += 1;
    bucket[firmName].revenue += revenue;
    bucket[firmName].commissionPaid += commissionPaid;

    const reg = ((db.vehicles || []).find(v => v.id === s.vehicleId) || {}).reg || '';

    if (!normTxt(s.financeCompany)) {
      issues.push({date:s.date, inv:s.invNo || '', reg, customer:s.buyer || '', issue:'Missing finance company'});
    }
    if (!normTxt(s.fcaCustomerChannel)) {
      issues.push({date:s.date, inv:s.invNo || '', reg, customer:s.buyer || '', issue:'Customer channel not set (auto fallback used)'});
    }
    if (!normTxt(s.fcaRemuneration)) {
      issues.push({date:s.date, inv:s.invNo || '', reg, customer:s.buyer || '', issue:'Remuneration not set (auto fallback used)'});
    }
    if (Number(s.fcaCommissionEarned || 0) === 0 &&
        Number(s.fcaFeeFromIndividual || 0) === 0 &&
        Number(s.fcaOtherRevenue || 0) === 0) {
      issues.push({date:s.date, inv:s.invNo || '', reg, customer:s.buyer || '', issue:'No broking revenue entered'});
    }
  });

  const topLenders = Object.values(lenders)
    .sort((a,b) => b.revenue - a.revenue || b.count - a.count || a.name.localeCompare(b.name))
    .slice(0,5);

  const topBrokers = Object.values(brokers)
    .sort((a,b) => b.revenue - a.revenue || b.count - a.count || a.name.localeCompare(b.name))
    .slice(0,5);

  const channelRows = Object.keys(channels)
    .sort((a,b) => channels[b] - channels[a] || a.localeCompare(b))
    .map(k => ({channel:k, count:channels[k]}));

  return {
    year: y,
    sales,
    brokered,
    totals,
    topLenders,
    topBrokers,
    channelRows,
    issues
  };
}

function ensureSaleFCA(s){
  s = s || {};
  if (typeof s.fcaIsCreditBrokered === 'undefined') s.fcaIsCreditBrokered = '';
  if (typeof s.fcaRemuneration === 'undefined') s.fcaRemuneration = '';
  if (typeof s.fcaCommissionEarned === 'undefined') s.fcaCommissionEarned = 0;
  if (typeof s.fcaFeeFromIndividual === 'undefined') s.fcaFeeFromIndividual = 0;
  if (typeof s.fcaOtherRevenue === 'undefined') s.fcaOtherRevenue = 0;
  if (typeof s.fcaCommissionPaid === 'undefined') s.fcaCommissionPaid = 0;
  if (typeof s.fcaCustomerChannel === 'undefined') s.fcaCustomerChannel = '';
  if (typeof s.fcaCommissionDisclosure === 'undefined') s.fcaCommissionDisclosure = '';
  if (typeof s.fcaCommissionValueDisclosure === 'undefined') s.fcaCommissionValueDisclosure = '';
  if (typeof s.fcaIntroducerType === 'undefined') s.fcaIntroducerType = '';
  return s;
}

function normTxt(v){
  return String(v || '').trim();
}

function lowerTxt(v){
  return normTxt(v).toLowerCase();
}

function isCompletedSaleForFCA(s){
  const st = lowerTxt(s.saleStatus || s.status || 'completed');
  return st === 'completed' || st === 'complete' || st === 'sold';
}

function yearFromDate(d){
  return Number(String(d || '').slice(0,4)) || 0;
}

function inferFCAChannelFromSale(s){
  const manual = normTxt(s.fcaCustomerChannel);
  if (manual) return manual;

  const lead = lowerTxt(s.leadSource);
  if (['website','web','online','autotrader','auto trader','car gurus','cargurus','motors','ebay'].includes(lead)) return 'Website';
  if (['facebook','instagram','social','social media','tiktok'].includes(lead)) return 'Social media';
  if (['phone','telephone','call'].includes(lead)) return 'Phone';
  if (['email'].includes(lead)) return 'Email';

  return 'In person';
}

function inferCreditBrokeredFromSale(s){
  if (normTxt(s.fcaIsCreditBrokered)) return lowerTxt(s.fcaIsCreditBrokered) === 'yes';
  return Number(s.finance || 0) > 0 || normTxt(s.financeCompany) !== '';
}

function inferRemunerationFromSale(s){
  if (normTxt(s.fcaRemuneration)) return s.fcaRemuneration;

  const comm = Number(s.fcaCommissionEarned || 0);
  const fee  = Number(s.fcaFeeFromIndividual || 0);
  const oth  = Number(s.fcaOtherRevenue || 0);

  if (comm > 0 && fee > 0) return 'Commission + fee';
  if (comm > 0) return 'Commission from lender';
  if (fee > 0) return 'Fee from individual';
  if (oth > 0) return 'Other revenue';
  if (inferCreditBrokeredFromSale(s)) return 'Commission from lender';
  return 'No remuneration';
}

function inferDisclosureFlag(s, which){
  const current = which === 'value'
    ? normTxt(s.fcaCommissionValueDisclosure)
    : normTxt(s.fcaCommissionDisclosure);

  if (current) return current;

  // Your filled return says "Always" for both disclosures
  return 'Yes';
}

function inferIntroducerType(s){
  if (normTxt(s.fcaIntroducerType)) return s.fcaIntroducerType;

  const lead = lowerTxt(s.leadSource);
  if (['dsg finance','motion finance','broker','broker referral','credit broker'].includes(lead)) {
    return 'Broker';
  }
  return 'Lender';
}

function sumCommissionFromAddons(s){
  const addons = Array.isArray(s.addons) ? s.addons : [];
  return addons.reduce((t, a) => {
    const name = lowerTxt(a.name || a.type || a.label);
    if (name.includes('commission')) return t + Number(a.sellAmount || a.amount || 0);
    return t;
  }, 0);
}

function autoPopulateFCASale(s){
  s = ensureSaleFCA(s || {});

  const brokered = inferCreditBrokeredFromSale(s);
  s.fcaIsCreditBrokered = brokered ? 'yes' : 'no';

  if (!normTxt(s.fcaRemuneration)) {
    s.fcaRemuneration = inferRemunerationFromSale(s);
  }

  if (!normTxt(s.fcaCustomerChannel)) {
    s.fcaCustomerChannel = inferFCAChannelFromSale(s);
  }

  if (!normTxt(s.fcaCommissionDisclosure)) {
    s.fcaCommissionDisclosure = inferDisclosureFlag(s, 'commission');
  }

  if (!normTxt(s.fcaCommissionValueDisclosure)) {
    s.fcaCommissionValueDisclosure = inferDisclosureFlag(s, 'value');
  }

  if (!normTxt(s.fcaIntroducerType)) {
    s.fcaIntroducerType = inferIntroducerType(s);
  }

  if (!Number(s.fcaCommissionEarned || 0)) {
    const addonCommission = sumCommissionFromAddons(s);
    if (addonCommission > 0) s.fcaCommissionEarned = addonCommission;
  }

  return s;
}

  const o = document.getElementById('modalOverlay');

function ddmmyyyy(d){
  if(!d) return '';
  let t = String(d).trim();
  t = (t.split('T')[0] || t).slice(0,10);

  // If already DD/MM/YYYY, keep it
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(t)) return t;

  // Support YYYY/MM/DD or YYYY-MM-DD
  t = t.replace(/\//g,'-'); // normalize slashes to hyphen

  const a = t.split('-'); // yyyy-mm-dd
  if(a.length === 3 && a[0].length === 4) return `${a[2]}/${a[1]}/${a[0]}`;

  return t;
}

function highlightMatches(tbody, query){
  if(!tbody) return;
  const q = (query||'').toLowerCase().trim();
  [...tbody.querySelectorAll('tr')].forEach(tr=>{
    if(!q){ tr.classList.remove('hl'); return; }
    tr.classList.toggle('hl', tr.textContent.toLowerCase().includes(q));
  });
}

function isoFromDMY(dmy){
  // Accepts "DD/MM/YYYY" or "D/M/YYYY"
  dmy = String(dmy||'').trim();
  const m = dmy.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(!m) return '';
  const dd = String(m[1]).padStart(2,'0');
  const mm = String(m[2]).padStart(2,'0');
  const yy = m[3];
  return `${yy}-${mm}-${dd}`; // ISO
}

function dmyFromISO(iso){
  // Accepts "YYYY-MM-DD"
  iso = String(iso||'').trim();
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return '';
  return `${m[3]}/${m[2]}/${m[1]}`;
}

function ymStr(d){ return (d||'').slice(0,7); } // yyyy-mm

function lastDayOfMonth(ym) {
  // ym = "YYYY-MM"
  const [y, m] = ym.split('-').map(Number);
  // Day 0 of next month = last day of current month
  const d = new Date(y, m, 0);
  return d.toISOString().slice(0, 10); // YYYY-MM-DD
}

function escapeHtml(s){
  s = (s==null) ? '' : String(s);
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function normalizeReg(reg){
  return String(reg||'').replace(/\s+/g,'').trim().toUpperCase();
}

/** Return all vehicle records for a REG (supports re-acquired / PX / re-sold cycles) */
function vehiclesByReg(reg){
  const r = normalizeReg(reg);
  if(!r) return [];
  return (db.vehicles||[]).filter(v => normalizeReg(v && v.reg) === r);
}

/**
 * Backwards-compatible: returns the "best" match for a reg.
 * - Prefer in-stock (not sold) and newest purchaseDate/createdAt
 * - Otherwise newest overall
 */
function findVehicleByReg(reg){
  const list = vehiclesByReg(reg);
  if(!list.length) return null;

  const score = (v)=>{
    const inStock = String(v.status||'').toLowerCase() !== 'sold';
    const d = v.purchaseDate || v.createdAt || '';
    return (inStock ? 10_000_000_000 : 0) + (d ? (Date.parse(d) || 0) : 0);
  };

  return list.slice().sort((a,b)=> score(b)-score(a))[0] || null;
}

function makeStockRef(reg, purchaseDate){
  const r = normalizeReg(reg);
  const d = String(purchaseDate || new Date().toISOString().slice(0,10)).slice(0,10).replace(/-/g,'');
  const rand = Math.random().toString(36).slice(2,6).toUpperCase();
  return `${r}-${d}-${rand}`;
}

function vehicleTotalCostByVehicleId(vehicleId){
  const v = (db.vehicles||[]).find(x=>x.id===vehicleId) || {};
  const purchase = Number(v.purchase||0);
  const exp = (db.vehicleExpenses||[])
    .filter(e => e.vehicleId === vehicleId)
    .reduce((t,e)=> t + Number(e.amount||0), 0);
  return { purchase, exp, total: purchase + exp };
}

function mcId(ym, type, a, b, c) {
  // stable, deterministic IDs for MonthClose postings
  const safe = (x) => String(x || '').trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,60);
  return `mc_${safe(ym)}_${safe(type)}_${safe(a)}_${safe(b)}_${safe(c)}`;
}

function _parseDateSafe(s){
  if(!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function daysToDate(dateStr){
  const d = _parseDateSafe(dateStr);
  if(!d) return null;
  const now = new Date();
  return Math.ceil((d - now) / (1000*60*60*24));
}

function getMotExpiry(v){
  // support different keys your DB may have
  return v.motExpiry || v.lastMotExpiry || v.mot || v.motDue || v.mot_expiry || '';
}

function motBucketsFromVehicles(list){
  let expired=0, d30=0, d60=0, d90=0, noMot=0;
  (list||[]).forEach(v=>{
    const exp = getMotExpiry(v);
    const dt = daysToDate(exp);
    if(dt===null){ noMot++; return; }
    if(dt < 0) expired++;
    else if(dt <= 30) d30++;
    else if(dt <= 60) d60++;
    else if(dt <= 90) d90++;
  });
  return {expired,d30,d60,d90,noMot};
}

function filterByMotDays(list, maxDays){
  // maxDays = -1 means expired only
  return (list||[]).filter(v=>{
    const exp = getMotExpiry(v);
    const dt = daysToDate(exp);
    if(dt===null) return false;
    if(maxDays === -1) return dt < 0;
    return dt >= 0 && dt <= maxDays;
  });
}

function removeMonthCloseMgmtForSale(sale){
  try{
    if(!sale || !sale.vehicleId || !sale.date) return;

    const k = (sale.date || '').slice(0,7); // month of sale (e.g. 2025-12)
    const v = (db.vehicles||[]).find(x=>x.id===sale.vehicleId) || {};
    const reg = (v.reg || '').trim();
    if(!k || !reg) return;

    // If you have mcId() in your file (you do, used by Month Close), remove those exact entries:
    const idFlat = (typeof mcId === 'function') ? mcId(k, 'showroom_flat175', reg, '', '') : null;
    const idPct  = (typeof mcId === 'function') ? mcId(k, 'showroom_20pct',   reg, '', '') : null;

    db.showroomExpenses = (db.showroomExpenses||[]).filter(e=>{
      const ym = (e.date||'').slice(0,7);
      if(ym !== k) return true;

      const t = String(e.type||'');
      const n = String(e.note||'');

      // Remove by ID if available, otherwise fall back to matching "type + note(reg)"
      if(idFlat && e.id === idFlat) return false;
      if(idPct  && e.id === idPct)  return false;

      if((t.includes('Mgmt flat £175') || t.includes('Mgmt 20%')) && n.trim() === reg) return false;

      return true;
    });

  } catch(e){}
}

    const instockOnly = document.getElementById('veh_instock')?.checked;
    const soldOnly = document.getElementById('veh_soldonly')?.checked;
    const investorOnly = document.getElementById('veh_investoronly')?.checked;
    const pxOnly = document.getElementById('veh_pxonly')?.checked;
    const motFilter = document.getElementById('veh_motFilter')?.value || '';
    
    let filteredVehicles = vehicles.filter(v => {
        // Stock status
        if (instockOnly && v.status === 'sold') return false;
        if (soldOnly && v.status !== 'sold') return false;
        
        // Investor stock only
        if (investorOnly) {
          if (v.ownerType !== 'investor') return false;
          if (v.status === 'sold') return false;
        }
        
        // Part-ex only
        if (pxOnly && v.supplier !== 'PART-EX') return false;
        
        // Search (reg / make / model / supplier)
        if (searchTerm) {
            const hay = (
                (v.reg    || '') + ' ' +
                (v.make   || '') + ' ' +
                (v.model  || '') + ' ' +
                (v.supplier || '')
            ).toLowerCase();
            if (!hay.includes(searchTerm)) return false;
        }
        
        // MOT expiry filter – SAME logic as viewVehicles()
        if (motFilter) {
            const motDate = v.motExpiry || v.lastMotExpiry || '';
            if (!motDate) return false;
            
            const expiry = new Date(motDate);
            const today  = new Date();
            today.setHours(0, 0, 0, 0);
            expiry.setHours(0, 0, 0, 0);
            const diffMs   = expiry - today;
            const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
            
            switch (motFilter) {
                case 'expired':
                    if (diffDays >= 0) return false;   // only truly expired
                    break;
                case '30':
                    if (diffDays <= 0 || diffDays > 30) return false;
                    break;
                case '60':
                    if (diffDays <= 0 || diffDays > 60) return false;
                    break;
                case '90':
                    if (diffDays <= 0 || diffDays > 90) return false;
                    break;
                case 'valid':
                    if (diffDays < 0) return false;    // skip expired
                    break;
            }
        }
        
        return true;
    });
    
    // CSV headers
    const headers = [
        'REG', 'Make', 'Model', 'Colour', 'Fuel', 'Mileage', 
        'First Registration', 'Purchase Date', 'Days In Stock', 'Purchase Price', 
        'Owner Type', 'Investor', 'Status', 'Supplier', 'Supplier Note',
        'VIN', 'Created At', 'Last MOT Date', 'Last MOT Expiry', 'Last MOT Mileage'
    ];

    function calcDaysInStock(v) {
      const pd = v.purchaseDate || v.createdAt || '';
      if (!pd) return '';
      const d1 = new Date(pd);
      const d2 = new Date();
      d1.setHours(0,0,0,0); d2.setHours(0,0,0,0);
      if (isNaN(d1) || isNaN(d2)) return '';
      return Math.max(0, Math.ceil((d2 - d1)/(1000*60*60*24)));
    }
    
    // Rows
    const rows = filteredVehicles.map(v => [
        v.reg || '',
        v.make || '',
        v.model || '',
        v.colour || '',
        v.fuel || '',
        v.mileage || 0,
        ddmmyyyy(v.firstReg || ''),
        ddmmyyyy(v.purchaseDate || ''),
        calcDaysInStock(v),
        Number(v.purchase || 0).toFixed(2),
        v.ownerType || 'owned',
        v.investor || '',
        v.status || '',
        v.supplier || '',
        v.supplierNote || '',
        v.vin || '',
        v.createdAt || '',
        v.lastMotDate || '',
        v.lastMotExpiry || '',
        v.lastMotMileage || ''
    ]);
    
    const csvContent = [
      headers.join(','),
      ...rows.map(row => row.map(cell => 
          (typeof cell === 'string' && (cell.includes(',') || cell.includes('"') || cell.includes('\n')))
            ? `"${cell.replace(/"/g,'""')}"`
            : cell
      ).join(','))
    ].join('\n');
    
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url  = URL.createObjectURL(blob);
    link.href = url;
    link.download = `vehicles_export_${new Date().toISOString().slice(0, 10)}.csv`;
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    if (typeof addAudit === 'function') {
        addAudit('export', 'vehicles', '', `Exported ${filteredVehicles.length} vehicles to CSV`);
    }
}

// Export Sales as CSV (RESPECTS Sales filters: month + search + pending toggle)
function exportSalesCSV() {
  const allSales = db.sales || [];
  const vehicles = db.vehicles || [];

  const q = (document.getElementById('sales_search')?.value || '').toUpperCase().trim();
  const month = (document.getElementById('sales_month')?.value || '').trim(); // "YYYY-MM"
  const showPending = !!document.getElementById('sales_show_pending')?.checked;

  // Filter like the Sales screen
  const filtered = allSales.filter(s => {
    // If pending toggle is OFF, export only completed sales
    if (!showPending) {
      const st = String(s.saleStatus || s.status || 'completed').toLowerCase();
      if (st !== 'completed' && st !== 'complete' && st !== 'sold') return false;
    }

    // Month filter (uses sale date)
    if (month) {
      const d = String(s.date || '');
      if (!d.startsWith(month)) return false;
    }

    // Search filter (REG / Customer / Invoice / Phone)
    if (q) {
      const v = vehicles.find(v => v.id === s.vehicleId) || {};
      const hay = (
        (v.reg || '') + ' ' +
        (v.make || '') + ' ' +
        (v.model || '') + ' ' +
        (s.buyer || '') + ' ' +
        (s.phone || '') + ' ' +
        (s.invNo || '')
      ).toUpperCase();

      if (!hay.includes(q)) return false;
    }

    return true;
  });

  const headers = [
    'Date',
    'Collected Date',
    'Invoice #',
    'Reg',
    'Make',
    'Model',
    'Customer',
    'Phone',
    'Email',
    'Sale Price',
    'Advertised Price',
    'Lead Source',
    'Finance Company',
    'Warranty Type',
    'Warranty Months',
    'Finance Payout Paid',
    'Finance Payout Date',
    'Finance Payout Amount'
  ];

  const esc = (cell) => {
    const str = String(cell == null ? '' : cell);
    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };

  const lines = [];
  lines.push(headers.join(','));

  filtered.forEach(s => {
    const v = vehicles.find(v => v.id === s.vehicleId) || {};

    const row = [
      ddmmyyyy(s.date),
      ddmmyyyy(s.collectedDate || ''),
      s.invNo || '',
      v.reg || '',
      v.make || '',
      v.model || '',
      s.buyer || '',
      s.phone || '',
      s.email || '',
      Number(s.salePrice || 0).toFixed(2),
      Number(s.advertisedPrice || 0).toFixed(2),
      s.leadSource || '',
      s.financeCompany || '',
      s.warrantyType || '',
      s.warrantyMonths || 0,
      (s.financePayoutPaid ? 'yes' : 'no'),
      s.financePayoutDate || '',
      Number(s.financePayoutAmount || 0).toFixed(2)
    ].map(esc);

    lines.push(row.join(','));
  });

  const csv = lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;

  const stamp = month ? month : new Date().toISOString().slice(0, 10);
  a.download = 'sales_export_' + stamp + '.csv';

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  setTimeout(() => URL.revokeObjectURL(url), 10000);

  if (typeof addAudit === 'function') {
    addAudit('export', 'sales', '', `Exported ${filtered.length} sales to CSV`);
  }
}

// DVLA Response Validation Helper
function validateDVLAResponse(data) {
  if (!data || typeof data !== 'object') {
    return { isValid: false, error: 'Invalid response format' };
  }
  
  // Check if we have at least some vehicle data
  const hasData = data.make || data.colour || data.fuel || data.vin || 
                 (data.raw && (data.raw.make || data.raw.colour || data.raw.fuelType));
  
  return { 
    isValid: !!hasData, 
    fieldsFound: {
      make: !!data.make,
      model: !!data.model,
      colour: !!data.colour,
      fuel: !!data.fuel,
      vin: !!data.vin
    }
  };
}

// Add to the core utils section
let changeTracker = {
  lastSnapshot: null,
  changes: {},
  init: function() {
    // Start with no persisted snapshot to save space in localStorage
    this.lastSnapshot = null;
    this.changes = {};

    // Clean up old big snapshot key from previous versions (one-time)
    try {
      localStorage.removeItem('starcars_last_snapshot');
    } catch(e) {
      console.warn('Could not remove old snapshot key:', e);
    }
  },
  
  saveSnapshot: function() {
    // Keep snapshot only in memory (not in localStorage) to avoid quota issues
    this.lastSnapshot = JSON.parse(JSON.stringify(window.db || {}));
  },
  
  trackChange: function(section, id, operation, data) {
    // Track a change (add, update, delete)
    if (!this.changes[section]) {
      this.changes[section] = [];
    }
    
    this.changes[section].push({
      id: id,
      operation: operation,
      data: data,
      timestamp: new Date().toISOString(),
      user: session ? session.username : 'unknown'
    });
  },
  
  getChanges: function() {
    return this.changes;
  },
  
  clearChanges: function() {
    this.changes = {};
  },
  
  // Compare current state with last snapshot to find all changes
  detectAllChanges: function() {
    if (!this.lastSnapshot) {
      return null; // No baseline to compare against
    }
    
    const current = window.db || {};
    const previous = this.lastSnapshot;
    const changes = {};
    
    // Track array changes
    const sections = ['vehicles', 'sales', 'vehicleExpenses', 'showroomExpenses', 
                     'credits', 'purchaseInvoices', 'complaints', 'investors', 
                     'partners', 'todo', 'users', 'audit'];
    
    sections.forEach(section => {
      const currentArr = current[section] || [];
      const previousArr = previous[section] || [];
      
      // Create maps for easy comparison
      const currentMap = new Map(currentArr.map(item => [item.id, item]));
      const previousMap = new Map(previousArr.map(item => [item.id, item]));
      
      const sectionChanges = [];
      
      // Find new items
      currentArr.forEach(item => {
        if (!previousMap.has(item.id)) {
          sectionChanges.push({
            id: item.id,
            operation: 'add',
            data: item
          });
        }
      });
      
      // Find modified items
      currentArr.forEach(item => {
        if (previousMap.has(item.id)) {
          const prevItem = previousMap.get(item.id);
          if (JSON.stringify(item) !== JSON.stringify(prevItem)) {
            sectionChanges.push({
              id: item.id,
              operation: 'update',
              data: item
            });
          }
        }
      });
      
      // Find deleted items (only if we're tracking deletions)
      if (db.deleted && db.deleted[section]) {
        Object.keys(db.deleted[section] || {}).forEach(id => {
          if (previousMap.has(id) && !currentMap.has(id)) {
            sectionChanges.push({
              id: id,
              operation: 'delete',
              data: { id: id, deletedAt: db.deleted[section][id] }
            });
          }
        });
      }
      
      if (sectionChanges.length > 0) {
        changes[section] = sectionChanges;
      }
    });
    
    // Track object changes (company settings)
    if (JSON.stringify(current.company || {}) !== JSON.stringify(previous.company || {})) {
      changes.company = {
        operation: 'update',
        data: current.company || {}
      };
    }
    
    return changes;
  }
};

async function doLogin(){
  const u = document.getElementById('li_user').value.trim();
  const p = document.getElementById('li_pass').value;

  // Multi-PC fix: always pull the latest user list/passwords from the server BEFORE checking login.
  // This prevents PC2/PC3 using an old local cached user record.
  try{
    const remote = tryPullServerDB && tryPullServerDB();
    if(remote){
      db = mergeDbForNetwork(db || {}, remote);
      db._sync.loadedVersion = Number((remote._sync && remote._sync.version) || 0);
      window.db = db;
      persistLocalSnapshot(db);
    }
  }catch(e){ console.warn('Login server refresh failed:', e); }

  const user = (db.users||[]).find(x => String(x.username || '').trim().toLowerCase() === u.toLowerCase());
  if(!user){ alert('Wrong login'); return; }

  let ok = false;
  try{
    ok = await verifyUserPassword(user, p);
  }catch(e){
    console.error('Login password check failed:', e);
    alert('Login check failed: ' + (e.message || e) + '\n\nPlease refresh the page once. If it continues, use the latest fixed file from the package.');
    return;
  }
  if(!ok){ alert('Wrong login'); return; }

  // ✅ auto-upgrade old plain passwords to hashed (one-time)
  if(user.password && !user.passHash){
    try{
      await setUserPasswordHashed(user, p);
      saveDB();
      try{renderAlertBell();}catch(e){}
      addAudit('update','userPass',user.id,'Auto-upgraded password hash for '+user.username);
    }catch(e){
      console.warn('Password upgrade failed:', e);
      // don't block login
    }
  }

  if ((db.company && db.company.requireGist === true) && !db.company.gistBootstrapped) {
    alert('Please go to Settings → Integrations and Pull Users from your Gist first.');
    return;
  }
  if (user.role==='admin' && (db.company && db.company.disableAdminLogin === true)) {
    alert('Admin login is disabled on this build.');
    return;
  }

  session = {username:user.username, role:user.role};
  sessionStorage.setItem('starcars_sess', JSON.stringify(session));

  showLogin(false);
  initHeader();
  render();
  checkPullStatusOnLogin();

  // Disable push button on login
  disablePushButton();
}

  let bin = '';

}

  const bin = atob(b64);

  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);

}

function _hmacSha256Bytes(key, msg){
  let k=key;
  if(k.length>64) k=_sha256Bytes(k);
  if(k.length<64){ const kk=new Uint8Array(64); kk.set(k); k=kk; }
  const o=new Uint8Array(64), i=new Uint8Array(64);
  for(let x=0;x<64;x++){ o[x]=k[x]^0x5c; i[x]=k[x]^0x36; }
  return _sha256Bytes(_concatBytes(o, _sha256Bytes(_concatBytes(i, msg))));
}
function _pbkdf2Sha256Fallback(password, saltB64, iterations){
  const pass=_utf8Bytes(password);
  const salt=_bytesFromB64(saltB64);
  const c=Number(iterations || PASS_ITER_DEFAULT);
  let u=_hmacSha256Bytes(pass, _concatBytes(salt, _u32(1)));
  const out=new Uint8Array(u);
  for(let i=2;i<=c;i++){
    u=_hmacSha256Bytes(pass, u);
    for(let j=0;j<32;j++) out[j]^=u[j];
  }
  return _b64FromBytes(out);
}

async function hashPasswordPBKDF2(password, saltB64, iterations){
  if(window.crypto && crypto.subtle){
    const salt = _bytesFromB64(saltB64);
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      enc.encode(String(password)),
      { name: 'PBKDF2' },
      false,
      ['deriveBits']
    );

    const bits = await crypto.subtle.deriveBits(
      {
        name: 'PBKDF2',
        hash: 'SHA-256',
        salt,
        iterations: Number(iterations || PASS_ITER_DEFAULT)
      },
      keyMaterial,
      256
    );

    return _b64FromBytes(new Uint8Array(bits));
  }

  // LAN fallback for PC2/PC3 when opened as http://192.168.x.x:8787
  return _pbkdf2Sha256Fallback(String(password), saltB64, iterations);
}

function isStrongPassword(p){
  p = String(p || '');
  if(p.length < 10) return false;
  const hasUpper = /[A-Z]/.test(p);
  const hasLower = /[a-z]/.test(p);
  const hasNum   = /[0-9]/.test(p);
  const hasSym   = /[^A-Za-z0-9]/.test(p);
  return hasUpper && hasLower && hasNum && hasSym;
}

async function setUserPasswordHashed(user, plainPassword){
  const salt = _randSaltB64(16);
  const iter = PASS_ITER_DEFAULT;
  const hash = await hashPasswordPBKDF2(plainPassword, salt, iter);

  user.passSalt = salt;
  user.passIter = iter;
  user.passHash = hash;

  // Keep old plain password as LAN fallback for PC2/PC3 when opened by IP over HTTP.
  // Do not delete user.password in this local-network build.
}

async function verifyUserPassword(user, plainPassword){
  // LAN friendly: if a plain fallback exists, use it first. This avoids Chrome
  // secure-origin issues on PC2/PC3 and keeps switch-user working over local IP.
  if(user && typeof user.password === 'string' && user.password === plainPassword){
    return true;
  }

  // hashed password method, with pure-JS fallback when crypto.subtle is unavailable
  if(user && user.passHash && user.passSalt){
    const iter = user.passIter || PASS_ITER_DEFAULT;
    const hash = await hashPasswordPBKDF2(plainPassword, user.passSalt, iter);
    return hash === user.passHash;
  }

  return false;
}
